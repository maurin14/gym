landing.services.users=Manage clients and trainers with better order and information control.
landing.services.payments=Register, review, and track payments made by clients.
landing.services.classes=Manage schedules, capacity, trainers, descriptions, and enrollments.
landing.services.routines=Browse training routines designed around different goals.
landing.services.inventoryTitle=Inventory and equipment
landing.services.inventory=Control products, stock, and available equipment across branches.
landing.benefits.title=More control, better experience
landing.benefits.text=A solution designed to reduce disorder, centralize processes, and improve gym administration.
landing.benefits.centralizationTitle=Centralization
landing.benefits.centralization=All gym information organized inside one platform.
landing.benefits.organizationTitle=Organization
landing.benefits.organization=Clearer control of clients, payments, classes, routines, and resources.
landing.benefits.efficiencyTitle=Efficiency
landing.benefits.efficiency=Fewer manual processes and better administrative tracking.
landing.benefits.growthTitle=Growth
landing.benefits.growth=A foundation ready for future improvements such as reservations, reports, and notifications.
landing.why.tag=Why SAM GYM FITNESS?
landing.why.text=More than a system, SAM GYM FITNESS supports gym modernization, improves the client experience, and simplifies daily operations control.
landing.audience.clientsTitle=For clients
landing.audience.clients=Allows clients to review payments, classes, routines, branches, and other available services. Username and password are assigned directly by gym administration.
landing.audience.trainersTitle=For trainers
landing.audience.trainers=Provides access to classes, routines, and user tracking inside the system.
landing.audience.adminTitle=For administration
landing.audience.admin=Helps make decisions with better organization, control, and information clarity.
landing.cta.title=Access SAM GYM FITNESS
landing.cta.text=Sign in to access the platform. If you do not have a user yet, request it directly at the gym reception.

