<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de pago - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('payments')}"></div>

<main class="detail-page">
    <nav class="client-breadcrumb" aria-label="Ruta de navegaci&oacute;n">
        <a th:href="@{/client/home}">Inicio</a>
        <span>/</span>
        <a th:href="@{/payments}">Pagos</a>
        <span>/</span>
        <strong>Detalle</strong>
    </nav>

    <section class="routine-detail-shell payment-detail-shell">
        <a th:href="@{/payments}" class="back-link">Volver a pagos</a>

        <div class="routine-detail-head">
            <div>
                <span class="section-kicker">Detalle de pago</span>
                <h1 th:text="${'Pago #' + payment.id}">Pago</h1>
                <p th:text="${payment.description != null and not #strings.isEmpty(payment.description) ? payment.description : 'Movimiento registrado en tu historial de pagos.'}">
                    Movimiento registrado en tu historial de pagos.
                </p>
            </div>

            <span th:text="${payment.status}"
                  th:class="${payment.status == 'Pagado' ? 'status-badge status-paid detail-status' :
                           (payment.status == 'Pendiente' ? 'status-badge status-pending detail-status' : 'status-badge status-cancelled detail-status')}">
            </span>
        </div>

        <div class="detail-meta routine-meta">
            <div class="meta-item price-item">
                <span>Monto</span>
                <strong th:text="${'CRC ' + payment.amount}">CRC 0</strong>
            </div>
            <div class="meta-item">
                <span>Fecha</span>
                <strong th:text="${#temporals.format(payment.paymentDate, 'dd/MM/yyyy')}">Fecha</strong>
            </div>
            <div class="meta-item">
                <span>M&eacute;todo</span>
                <strong th:text="${payment.paymentMethod}">Metodo</strong>
            </div>
            <div class="meta-item">
                <span>Sucursal</span>
                <strong th:text="${payment.branch != null ? payment.branch.name : 'Sin sucursal'}">Sucursal</strong>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
