<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.payment.detail}">Detalle de pago - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeaderActive('payments')}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('payments')}"></div>

<main class="detail-page">
    <nav class="client-breadcrumb" th:aria-label="#{breadcrumb.navigation}">
        <a th:href="@{/client/home}" th:text="#{label.common.home}">Inicio</a>
        <span>/</span>
        <a th:href="@{/payments}" th:text="#{label.payment.payments}">Pagos</a>
        <span>/</span>
        <strong th:text="#{label.common.detail}">Detalle</strong>
    </nav>

    <section class="routine-detail-shell payment-detail-shell">
        <a th:href="@{/payments}" class="back-link" th:text="#{button.backPayments}">Volver a pagos</a>

        <div class="routine-detail-head">
            <div>
                <span class="section-kicker" th:text="#{label.payment.detail}">Detalle de pago</span>
                <h1 th:text="${#messages.msg('label.payment.payment') + ' #' + payment.id}">Pago</h1>
                <p th:text="${payment.description != null and not #strings.isEmpty(payment.description) ? payment.description : #messages.msg('label.payment.defaultDescription')}">
                    Movimiento registrado en tu historial de pagos.
                </p>
            </div>

            <span th:text="${payment.status == 'Pagado' ? #messages.msg('label.payment.status.paid') :
                           (payment.status == 'Pendiente' ? #messages.msg('label.payment.status.pending') :
                           (payment.status == 'Anulado' ? #messages.msg('label.payment.status.cancelled') : payment.status))}"
                  th:class="${payment.status == 'Pagado' ? 'status-badge status-paid detail-status' :
                           (payment.status == 'Pendiente' ? 'status-badge status-pending detail-status' : 'status-badge status-cancelled detail-status')}">
            </span>
        </div>

        <div class="detail-meta routine-meta">
            <div class="meta-item price-item">
                <span th:text="#{label.payment.amount}">Monto</span>
                <strong th:text="${'CRC ' + payment.amount}">CRC 0</strong>
            </div>
            <div class="meta-item">
                <span th:text="#{label.gym.date}">Fecha</span>
                <strong th:text="${#temporals.format(payment.paymentDate, 'dd/MM/yyyy')}">Fecha</strong>
            </div>
            <div class="meta-item">
                <span th:text="#{label.payment.client}">Cliente</span>
                <strong th:text="${payment.clientName != null ? payment.clientName : #messages.msg('label.payment.clientNotFound')}">Cliente</strong>
            </div>
            <div class="meta-item">
                <span th:text="#{label.payment.methodShort}">Método</span>
                <strong th:text="${payment.paymentMethod == 'Efectivo' ? #messages.msg('label.payment.method.cash') :
                                 (payment.paymentMethod == 'Tarjeta' ? #messages.msg('label.payment.method.card') :
                                 (payment.paymentMethod == 'SINPE' ? #messages.msg('label.payment.method.sinpe') :
                                 (payment.paymentMethod == 'Transferencia' ? #messages.msg('label.payment.method.transfer') : payment.paymentMethod)))}">Método</strong>
            </div>
            <div class="meta-item">
                <span th:text="#{label.payment.branch}">Sucursal</span>
                <strong th:text="${payment.branch != null ? payment.branch.name : #messages.msg('label.gym.none')}">Sucursal</strong>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
