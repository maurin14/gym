<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis pagos - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('payments')}"></div>

<main>
    <section class="client-hero compact-hero payments-hero">
        <div>
            <span class="section-kicker">Mi cuenta</span>
            <h1>Mis pagos</h1>
            <p>Consulta el historial de pagos asociados a tu usuario y filtra por estado o m&eacute;todo.</p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" aria-label="Ruta de navegaci&oacute;n">
            <a th:href="@{/client/home}">Inicio</a>
            <span>/</span>
            <strong>Pagos</strong>
        </nav>

        <div class="client-table-card">
            <form class="catalog-toolbar payment-toolbar" method="get" th:action="@{/payments}">
                <div class="toolbar-field">
                    <label for="filterStatus">Estado</label>
                    <select id="filterStatus" name="status">
                        <option value="">Todos los estados</option>
                        <option value="Pagado" th:selected="${status == 'Pagado'}">Pagado</option>
                        <option value="Pendiente" th:selected="${status == 'Pendiente'}">Pendiente</option>
                        <option value="Anulado" th:selected="${status == 'Anulado'}">Anulado</option>
                    </select>
                </div>

                <div class="toolbar-field">
                    <label for="filterPaymentMethod">M&eacute;todo</label>
                    <select id="filterPaymentMethod" name="paymentMethod">
                        <option value="">Todos los m&eacute;todos</option>
                        <option value="Efectivo" th:selected="${paymentMethod == 'Efectivo'}">Efectivo</option>
                        <option value="Tarjeta" th:selected="${paymentMethod == 'Tarjeta'}">Tarjeta</option>
                        <option value="SINPE" th:selected="${paymentMethod == 'SINPE'}">SINPE</option>
                        <option value="Transferencia" th:selected="${paymentMethod == 'Transferencia'}">Transferencia</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary">Buscar</button>
                <a th:href="@{/payments}" class="btn-secondary">Limpiar</a>
            </form>

            <div class="table-responsive">
                <table class="client-table">
                    <thead>
                    <tr>
                        <th>Fecha pago</th>
                        <th>Cliente</th>
                        <th>Sucursal</th>
                        <th>Monto</th>
                        <th>M&eacute;todo</th>
                        <th>Estado</th>
                        <th>Descripci&oacute;n</th>
                        <th>Detalle</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${payments.content.size() == 0}">
                        <td colspan="8" class="empty-message">No se encontraron pagos.</td>
                    </tr>

                    <tr th:each="p : ${payments.content}">
                        <td th:text="${#temporals.format(p.paymentDate, 'dd/MM/yyyy')}"></td>
                        <td th:text="${p.idUser}"></td>
                        <td th:text="${p.branch != null ? p.branch.name : 'Sin sucursal'}"></td>
                        <td th:text="${'CRC ' + p.amount}"></td>
                        <td th:text="${p.paymentMethod}"></td>
                        <td>
                            <span th:text="${p.status}"
                                  th:class="${p.status == 'Pagado' ? 'status-badge status-paid' :
                                           (p.status == 'Pendiente' ? 'status-badge status-pending' : 'status-badge status-cancelled')}">
                            </span>
                        </td>
                        <td th:text="${p.description}"></td>
                        <td>
                            <a th:href="@{/payments/{id}(id=${p.id})}" class="btn-primary table-action">Ver detalle</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="client-pagination" th:if="${payments.totalPages > 1}">
                <a class="pagination-link"
                   th:if="${payments.hasPrevious()}"
                   th:href="@{/payments(page=${payments.number - 1}, status=${status}, paymentMethod=${paymentMethod})}">
                    Anterior
                </a>

                <a th:each="i : ${#numbers.sequence(0, payments.totalPages - 1)}"
                   th:text="${i + 1}"
                   th:href="@{/payments(page=${i}, status=${status}, paymentMethod=${paymentMethod})}"
                   th:class="${i == payments.number ? 'pagination-link active' : 'pagination-link'}">
                </a>

                <a class="pagination-link"
                   th:if="${payments.hasNext()}"
                   th:href="@{/payments(page=${payments.number + 1}, status=${status}, paymentMethod=${paymentMethod})}">
                    Siguiente
                </a>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
