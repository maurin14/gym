<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.payment.userList}">Mis pagos - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeaderActive('payments')}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('payments')}"></div>

<main>
    <section class="client-section">
        <div class="client-table-card">
            <form class="catalog-toolbar payment-toolbar" method="get" th:action="@{/payments}">
                <div class="toolbar-field">
                    <label for="filterStatus" th:text="#{label.payment.status}">Estado</label>
                    <select id="filterStatus" name="status">
                        <option value="" th:text="#{label.payment.allStatus}">Todos los estados</option>
                        <option value="Pagado" th:selected="${status == 'Pagado'}" th:text="#{label.payment.status.paid}">Pagado</option>
                        <option value="Pendiente" th:selected="${status == 'Pendiente'}" th:text="#{label.payment.status.pending}">Pendiente</option>
                        <option value="Anulado" th:selected="${status == 'Anulado'}" th:text="#{label.payment.status.cancelled}">Anulado</option>
                    </select>
                </div>

                <div class="toolbar-field">
                    <label for="filterPaymentMethod" th:text="#{label.payment.methodShort}">Método</label>
                    <select id="filterPaymentMethod" name="paymentMethod">
                        <option value="" th:text="#{label.payment.allMethods}">Todos los métodos</option>
                        <option value="Efectivo" th:selected="${paymentMethod == 'Efectivo'}" th:text="#{label.payment.method.cash}">Efectivo</option>
                        <option value="Tarjeta" th:selected="${paymentMethod == 'Tarjeta'}" th:text="#{label.payment.method.card}">Tarjeta</option>
                        <option value="SINPE" th:selected="${paymentMethod == 'SINPE'}" th:text="#{label.payment.method.sinpe}">SINPE</option>
                        <option value="Transferencia" th:selected="${paymentMethod == 'Transferencia'}" th:text="#{label.payment.method.transfer}">Transferencia</option>
                    </select>
                </div>

                <button type="submit" class="btn-primary" th:text="#{button.search}">Buscar</button>
                <a th:href="@{/payments}" class="btn-secondary" th:text="#{button.clean}">Limpiar</a>
            </form>

            <div class="table-responsive">
                <table class="client-table">
                    <thead>
                    <tr>
                        <th th:text="#{label.payment.dateShort}">Fecha pago</th>
                        <th th:text="#{label.payment.client}">Cliente</th>
                        <th th:text="#{label.payment.branch}">Sucursal</th>
                        <th th:text="#{label.payment.amount}">Monto</th>
                        <th th:text="#{label.payment.methodShort}">Método</th>
                        <th th:text="#{label.payment.status}">Estado</th>
                        <th th:text="#{label.payment.description}">Descripción</th>
                        <th th:text="#{label.common.detail}">Detalle</th>
                    </tr>
                    </thead>

                    <tbody>
                    <tr th:if="${payments.content.size() == 0}">
                        <td colspan="8" class="empty-message" th:text="#{label.payment.noUserPayments}">No se encontraron pagos.</td>
                    </tr>

                    <tr th:each="p : ${payments.content}">
                        <td th:text="${#temporals.format(p.paymentDate, 'dd/MM/yyyy')}"></td>
                        <td th:text="${p.clientName != null ? p.clientName : #messages.msg('label.payment.clientNotFound')}"></td>
                        <td th:text="${p.branch != null ? p.branch.name : #messages.msg('label.gym.none')}"></td>
                        <td th:text="${'CRC ' + p.amount}"></td>
                        <td th:text="${p.paymentMethod == 'Efectivo' ? #messages.msg('label.payment.method.cash') :
                                     (p.paymentMethod == 'Tarjeta' ? #messages.msg('label.payment.method.card') :
                                     (p.paymentMethod == 'SINPE' ? #messages.msg('label.payment.method.sinpe') :
                                     (p.paymentMethod == 'Transferencia' ? #messages.msg('label.payment.method.transfer') : p.paymentMethod)))}"></td>
                        <td>
                            <span th:text="${p.status == 'Pagado' ? #messages.msg('label.payment.status.paid') :
                                           (p.status == 'Pendiente' ? #messages.msg('label.payment.status.pending') :
                                           (p.status == 'Anulado' ? #messages.msg('label.payment.status.cancelled') : p.status))}"
                                  th:class="${p.status == 'Pagado' ? 'status-badge status-paid' :
                                           (p.status == 'Pendiente' ? 'status-badge status-pending' : 'status-badge status-cancelled')}">
                            </span>
                        </td>
                        <td th:text="${p.description}"></td>
                        <td>
                            <a th:href="@{/payments/{id}(id=${p.id})}" class="btn-primary table-action" th:text="#{button.viewDetail}">Ver detalle</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="client-pagination" th:if="${payments.totalPages > 1}">
                <a class="pagination-link"
                   th:if="${payments.hasPrevious()}"
                   th:href="@{/payments(page=${payments.number - 1}, status=${status}, paymentMethod=${paymentMethod})}"
                   th:text="#{button.previous}">
                    Anterior
                </a>

                <a th:each="i : ${#numbers.sequence(0, payments.totalPages - 1)}"
                   th:text="${i + 1}"
                   th:href="@{/payments(page=${i}, status=${status}, paymentMethod=${paymentMethod})}"
                   th:class="${i == payments.number ? 'pagination-link active' : 'pagination-link'}">
                </a>

                <a class="pagination-link"
                   th:if="${payments.hasNext()}"
                   th:href="@{/payments(page=${payments.number + 1}, status=${status}, paymentMethod=${paymentMethod})}"
                   th:text="#{button.next}">
                    Siguiente
                </a>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
