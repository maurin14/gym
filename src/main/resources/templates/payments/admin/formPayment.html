<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de pago</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/payment.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('payments')}"></div>


<main class="container form-container portal-card admin-page-card">
    <div th:if="${messageError}" class="status-cancelled" th:text="${messageError}"></div>

    <form id="paymentForm"
          class="portal-form"
          th:action="@{/admin/payments/save}"
          th:object="${payment}"
          method="post"
          novalidate>

        <input type="hidden" th:field="*{id}">

        <label>Fecha de pago</label>
        <input type="date" th:field="*{paymentDate}" required>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['paymentDate'] != null}" th:text="${fieldErrors['paymentDate']}"></small>

        <label>Cliente</label>
        <select th:field="*{idUser}" required>
            <option value="">Seleccione un cliente</option>
            <option th:each="client : ${clients}"
                    th:value="${client.userId}"
                    th:text="${client.fullName}">
            </option>
        </select>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['idUser'] != null}" th:text="${fieldErrors['idUser']}"></small>

        <label>Sucursal</label>
        <select name="branchId" required>
            <option value="">Seleccione una sucursal</option>
            <option th:each="b : ${branches}"
                    th:value="${b.id}"
                    th:text="${b.name}"
                    th:selected="${payment.branch != null and payment.branch.id == b.id}">
            </option>
        </select>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['branch'] != null}" th:text="${fieldErrors['branch']}"></small>

        <label>Monto</label>
        <input type="number" th:field="*{amount}" required min="0.01" step="0.01" placeholder="Ejemplo: 15000">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['amount'] != null}" th:text="${fieldErrors['amount']}"></small>

        <label>Método de pago</label>
        <select th:field="*{paymentMethod}" required>
            <option value="">Seleccione</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Tarjeta">Tarjeta</option>
            <option value="SINPE">SINPE</option>
            <option value="Transferencia">Transferencia</option>
        </select>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['paymentMethod'] != null}" th:text="${fieldErrors['paymentMethod']}"></small>

        <label>Estado del pago</label>
        <select th:field="*{status}" required>
            <option value="">Seleccione</option>
            <option value="Pagado">Pagado</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Anulado">Anulado</option>
        </select>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['status'] != null}" th:text="${fieldErrors['status']}"></small>

        <label>Descripción</label>
        <input type="text" th:field="*{description}" maxlength="255" placeholder="Ejemplo: Pago de mensualidad">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['description'] != null}" th:text="${fieldErrors['description']}"></small>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="confirmSavePayment()">Guardar</button>
            <button type="button" class="btn-secondary" onclick="confirmCancelPayment()">Cancelar</button>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
