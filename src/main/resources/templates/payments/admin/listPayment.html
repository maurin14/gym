<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Administración de Pagos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/payment.js}"></script>
</head>
<body class="page-portal">

<header class="portal-header">
    <div class="portal-brand">
        <a th:href="@{/admin/home}">
            <img th:src="@{/images/logo.jpeg}" alt="SAM GYM FITNESS" class="portal-logo">
        </a>
        <div>
            <span class="portal-title">SAM GYM FITNESS</span>
            <span class="portal-subtitle">Panel administrador</span>
        </div>
    </div>

    <nav class="portal-nav">
        <a th:href="@{/admin/home}">Inicio</a>
        <a th:href="@{/admin/branches}">Sucursales</a>
        <a th:href="@{/admin/payments}">Pagos</a>
        <a th:href="@{/admin/routines}">Rutinas</a>
        <a th:href="@{/admin/classes}">Clases</a>
        <a th:href="@{/admin/products}">Productos</a>
        <a th:href="@{/admin/schedules}">Horarios</a>
        <a th:href="@{/logout}">Cerrar sesión</a>
    </nav>
</header>

<main class="portal-main">

    <section class="portal-head">
        <span class="portal-tag">Gestión administrativa</span>
        <h1>Administración de pagos</h1>
        <p>Consulta, registra, modifica y cambia el estado de los pagos del gimnasio.</p>
    </section>

    <section class="portal-card">

        <div class="portal-filters">
            <select id="filterStatus">
                <option value="">Todos los estados</option>
                <option value="Pagado" th:selected="${status == 'Pagado'}">Pagado</option>
                <option value="Pendiente" th:selected="${status == 'Pendiente'}">Pendiente</option>
                <option value="Anulado" th:selected="${status == 'Anulado'}">Anulado</option>
            </select>

            <select id="filterPaymentMethod">
                <option value="">Todos los métodos</option>
                <option value="Efectivo" th:selected="${paymentMethod == 'Efectivo'}">Efectivo</option>
                <option value="Tarjeta" th:selected="${paymentMethod == 'Tarjeta'}">Tarjeta</option>
                <option value="SINPE" th:selected="${paymentMethod == 'SINPE'}">SINPE</option>
                <option value="Transferencia" th:selected="${paymentMethod == 'Transferencia'}">Transferencia</option>
            </select>

            <select id="filterBranch">
                <option value="">Todas las sucursales</option>
                <option th:each="b : ${branches}"
                        th:value="${b.id}"
                        th:text="${b.name}"
                        th:selected="${branchId != null and branchId == b.id}">
                </option>
            </select>

            <button type="button" class="btn-primary" onclick="filterPayments()">Buscar</button>
            <a th:href="@{/admin/payments}" class="btn-secondary">Limpiar filtros</a>
        </div>

        <div id="payment-table-container">
            <div th:replace="payments/admin/tablePayment :: tablePayment"></div>
        </div>

        <div class="buttons">
            <a th:href="@{/admin/payments/new}" class="btn-primary">Agregar pago</a>
        </div>

    </section>

</main>

<script th:inline="javascript">
    const success = [[${param.success}]];

    if (success != null) {
        let message = "Acción realizada correctamente.";

        if (success[0] === "save") message = "Pago registrado correctamente.";
        if (success[0] === "edit") message = "Pago modificado correctamente.";
        if (success[0] === "delete") message = "Pago eliminado correctamente.";
        if (success[0] === "status") message = "Estado del pago modificado correctamente.";

        Swal.fire({
            icon: "success",
            title: message,
            confirmButtonText: "OK"
        });
    }
</script>

</body>
</html>
