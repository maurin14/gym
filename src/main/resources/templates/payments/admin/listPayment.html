<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administración de Pagos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/payment.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('payments')}"></div>

<section class="hero-section portal-head">
    <div class="hero-overlay">
        <span class="hero-badge">GESTIÓN ADMINISTRATIVA</span>
        <h1>Administración de pagos</h1>
        <p class="hero-text">Consulta, registra, modifica y cambia el estado de los pagos del gimnasio.</p>
    </div>
</section>

<main class="container portal-card admin-page-card">
    <form class="admin-filter-row portal-filters" onsubmit="filterPayments(); return false;">
        <select id="filterStatus">
            <option value="">Todos los estados</option>
            <option value="Pagado" th:selected="${status == 'Pagado'}">Pagado</option>
            <option value="Pendiente" th:selected="${status == 'Pendiente'}">Pendiente</option>
            <option value="Anulado" th:selected="${status == 'Anulado'}">Anulado</option>
        </select>

        <select id="filterPaymentMethod">
            <option value="">Todos los métodos</option>
            <option value="Efectivo" th:selected="${paymentMethod == 'Efectivo'}">Efectivo</option>
            <option value="Tarjeta" th:selected="${paymentMethod == 'Tarjeta'}">Tarjeta</option>
            <option value="SINPE" th:selected="${paymentMethod == 'SINPE'}">SINPE</option>
            <option value="Transferencia" th:selected="${paymentMethod == 'Transferencia'}">Transferencia</option>
        </select>

        <select id="filterBranch">
            <option value="">Todas las sucursales</option>
            <option th:each="b : ${branches}"
                    th:value="${b.id}"
                    th:text="${b.name}"
                    th:selected="${branchId != null and branchId == b.id}">
            </option>
        </select>

        <button type="submit" class="btn-primary">Buscar</button>
        <a th:href="@{/admin/payments}" class="btn-secondary">Limpiar filtros</a>
    </form>

    <div id="payment-table-container">
        <div th:replace="payments/admin/tablePayment :: tablePayment"></div>
    </div>

    <div class="buttons">
        <a th:href="@{/admin/payments/new}" class="btn-primary">Agregar pago</a>
    </div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    const success = [[${param.success}]];

    if (success != null) {
        let message = "Acción realizada correctamente.";

        if (success[0] === "save") message = "Pago registrado correctamente.";
        if (success[0] === "edit") message = "Pago actualizado correctamente.";
        if (success[0] === "delete") message = "Pago eliminado correctamente.";
        if (success[0] === "status") message = "Estado del pago actualizado correctamente.";

        Swal.fire({
            icon: "success",
            title: message,
            confirmButtonText: "OK"
        });
    }
</script>

</body>
</html>
