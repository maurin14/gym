<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.payment.admin}">Administracion de Pagos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
    <script th:src="@{/js/payment.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('payments')}"></div>

<main class="container portal-card admin-page-card">
    <div class="buttons admin-action-row">
        <a th:href="@{/admin/payments/new}" class="btn-primary" th:text="#{button.newPayment}">Nuevo pago</a>
    </div>

    <form class="admin-filter-row portal-filters" th:action="@{/admin/payments}" method="get">
        <select id="filterStatus" name="status">
            <option value="" th:text="#{label.payment.allStatus}">Todos los estados</option>
            <option value="Pagado" th:selected="${status == 'Pagado'}" th:text="#{label.payment.status.paid}">Pagado</option>
            <option value="Pendiente" th:selected="${status == 'Pendiente'}" th:text="#{label.payment.status.pending}">Pendiente</option>
            <option value="Anulado" th:selected="${status == 'Anulado'}" th:text="#{label.payment.status.cancelled}">Anulado</option>
        </select>

        <select id="filterPaymentMethod" name="paymentMethod">
            <option value="" th:text="#{label.payment.allMethods}">Todos los metodos</option>
            <option value="Efectivo" th:selected="${paymentMethod == 'Efectivo'}" th:text="#{label.payment.method.cash}">Efectivo</option>
            <option value="Tarjeta" th:selected="${paymentMethod == 'Tarjeta'}" th:text="#{label.payment.method.card}">Tarjeta</option>
            <option value="SINPE" th:selected="${paymentMethod == 'SINPE'}" th:text="#{label.payment.method.sinpe}">SINPE</option>
            <option value="Transferencia" th:selected="${paymentMethod == 'Transferencia'}" th:text="#{label.payment.method.transfer}">Transferencia</option>
        </select>

        <select id="filterBranch" name="branchId">
            <option value="" th:text="#{label.gym.allBranches}">Todas las sucursales</option>
            <option th:each="b : ${branches}"
                    th:value="${b.id}"
                    th:text="${b.name}"
                    th:selected="${branchId != null and branchId == b.id}">
            </option>
        </select>

        <button type="submit" class="btn-primary" th:text="#{button.search}">Buscar</button>
        <a th:href="@{/admin/payments}" class="btn-secondary" th:text="#{button.cleanFilters}">Limpiar filtros</a>
    </form>

    <div id="payment-table-container">
        <div th:replace="payments/admin/tablePayment :: tablePayment"></div>
    </div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    window.paymentMessages = {
        deleteTitle: /*[[#{confirm.payment.delete}]]*/ "Eliminar pago?",
        deleteText: /*[[#{confirm.delete.text}]]*/ "Esta accion no se puede deshacer.",
        deleteConfirm: /*[[#{button.delete}]]*/ "Eliminar",
        deleteLoading: /*[[#{confirm.loading.delete}]]*/ "Eliminando...",
        statusTitle: /*[[#{confirm.status.change}]]*/ "Cambiar estado?",
        statusText: /*[[#{confirm.payment.statusText}]]*/ "El estado cambiara entre Pagado, Pendiente y Anulado.",
        yes: /*[[#{button.yes}]]*/ "Si",
        processing: /*[[#{message.processing}]]*/ "Procesando..."
    };

    const success = [[${param.success}]];

    if (success != null) {
        let message = /*[[#{message.action.success}]]*/ "Accion realizada correctamente.";

        if (success[0] === "save") message = /*[[#{message.payment.saved}]]*/ "Pago registrado correctamente.";
        if (success[0] === "edit") message = /*[[#{message.payment.updated}]]*/ "Pago actualizado correctamente.";
        if (success[0] === "delete") message = /*[[#{message.payment.deleted}]]*/ "Pago eliminado correctamente.";
        if (success[0] === "status") message = /*[[#{message.payment.statusUpdated}]]*/ "Estado del pago actualizado correctamente.";

        showAdminSuccess(message);
    }
</script>

</body>
</html>
