<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tablePayment">

    <table class="portal-table admin-table is-wide">
        <thead>
        <tr>
            <th th:text="#{label.payment.dateShort}">Fecha pago</th>
            <th th:text="#{label.payment.client}">Cliente</th>
            <th th:text="#{label.payment.branch}">Sucursal</th>
            <th th:text="#{label.payment.amount}">Monto</th>
            <th th:text="#{label.payment.methodShort}">Metodo</th>
            <th th:text="#{label.payment.status}">Estado</th>
            <th th:text="#{label.payment.description}">Descripcion</th>
            <th th:text="#{label.payment.actions}">Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${payments.content.size() == 0}">
            <td colspan="8" th:text="#{label.payment.noPayments}">No se encontraron pagos registrados.</td>
        </tr>

        <tr th:each="p : ${payments.content}">
            <td th:text="${#temporals.format(p.paymentDate, 'dd/MM/yyyy')}"></td>
            <td th:text="${p.clientName != null ? p.clientName : #messages.msg('label.payment.clientNotFound')}"></td>
            <td th:text="${p.branch != null ? p.branch.name : #messages.msg('label.gym.none')}"></td>
            <td th:text="${'CRC ' + p.amount}"></td>
            <td th:text="${p.paymentMethod == 'Efectivo' ? #messages.msg('label.payment.method.cash') :
                         (p.paymentMethod == 'Tarjeta' ? #messages.msg('label.payment.method.card') :
                         (p.paymentMethod == 'SINPE' ? #messages.msg('label.payment.method.sinpe') :
                         (p.paymentMethod == 'Transferencia' ? #messages.msg('label.payment.method.transfer') : p.paymentMethod)))}"></td>

            <td>
                <span th:text="${p.status == 'Pagado' ? #messages.msg('label.payment.status.paid') :
                               (p.status == 'Pendiente' ? #messages.msg('label.payment.status.pending') :
                               (p.status == 'Anulado' ? #messages.msg('label.payment.status.cancelled') : p.status))}"
                      th:class="${p.status == 'Pagado' ? 'badge badge-active' :
                               (p.status == 'Pendiente' ? 'badge badge-pending' : 'badge badge-inactive')}">
                </span>
            </td>

            <td th:text="${p.description}"></td>

            <td>
                <div class="actions">
                    <a th:href="@{/admin/payments/edit/{id}(id=${p.id})}" class="btn-secondary" th:text="#{button.edit}">Editar</a>

                    <a href="#"
                       class="btn-primary"
                       th:data-id="${p.id}"
                       onclick="confirmChangePaymentStatus(this); return false;"
                       th:text="#{button.changeStatus}">
                        Cambiar estado
                    </a>

                    <a href="#"
                       class="btn-danger"
                       th:data-id="${p.id}"
                       onclick="confirmDeletePayment(this); return false;"
                       th:text="#{button.delete}">
                        Eliminar
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:aria-label="#{pagination.payment}"
         th:with="visualTotalPages=${payments.totalPages > 0 ? payments.totalPages : 1}">
        <a th:if="${payments.hasPrevious()}"
           class="btn-secondary"
           th:href="@{/admin/payments(page=${payments.number - 1}, status=${status}, paymentMethod=${paymentMethod}, branchId=${branchId})}">
            <span th:text="#{button.previous}">Anterior</span>
        </a>
        <a th:if="${!payments.hasPrevious()}" class="btn-secondary disabled" href="#">
            <span th:text="#{button.previous}">Anterior</span>
        </a>

        <a th:each="i : ${#numbers.sequence(0, visualTotalPages - 1)}"
           th:text="${i + 1}"
           th:href="@{/admin/payments(page=${i}, status=${status}, paymentMethod=${paymentMethod}, branchId=${branchId})}"
           th:class="${i == payments.number ? 'btn-primary page-active' : 'btn-secondary'}">
        </a>

        <a th:if="${payments.hasNext()}"
           class="btn-secondary"
           th:href="@{/admin/payments(page=${payments.number + 1}, status=${status}, paymentMethod=${paymentMethod}, branchId=${branchId})}">
            <span th:text="#{button.next}">Siguiente</span>
        </a>
        <a th:if="${!payments.hasNext()}" class="btn-secondary disabled" href="#">
            <span th:text="#{button.next}">Siguiente</span>
        </a>
    </div>

</div>
</body>
</html>
