<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tablePayment">

    <table class="portal-table">
        <thead>
        <tr>
            <th>Fecha pago</th>
            <th>Cliente</th>
            <th>Sucursal</th>
            <th>Monto</th>
            <th>Método</th>
            <th>Estado</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${payments.content.size() == 0}">
            <td colspan="8">No se encontraron pagos registrados.</td>
        </tr>

        <tr th:each="p : ${payments.content}">
            <td th:text="${#temporals.format(p.paymentDate, 'dd/MM/yyyy')}"></td>
            <td th:text="${p.clientName != null ? p.clientName : 'Cliente no encontrado'}"></td>
            <td th:text="${p.branch != null ? p.branch.name : 'Sin sucursal'}"></td>
            <td th:text="${'₡' + p.amount}"></td>
            <td th:text="${p.paymentMethod}"></td>

            <td>
                <span th:text="${p.status}"
                      th:class="${p.status == 'Pagado' ? 'badge badge-active' :
                               (p.status == 'Pendiente' ? 'badge badge-pending' : 'badge badge-inactive')}">
                </span>
            </td>

            <td th:text="${p.description}"></td>

            <td>
                <div class="actions">
                    <a th:href="@{/admin/payments/edit/{id}(id=${p.id})}" class="btn-secondary">Editar</a>

                    <a href="#"
                       class="btn-primary"
                       th:data-id="${p.id}"
                       onclick="confirmChangePaymentStatus(this); return false;">
                        Cambiar estado
                    </a>

                    <a href="#"
                       class="btn-danger"
                       th:data-id="${p.id}"
                       onclick="confirmDeletePayment(this); return false;">
                        Eliminar
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:with="visualTotalPages=${payments.totalPages > 0 ? payments.totalPages : 1}">
        <a th:if="${payments.hasPrevious()}"
           class="btn-secondary"
           th:href="@{/admin/payments(page=${payments.number - 1}, status=${status}, paymentMethod=${paymentMethod}, branchId=${branchId})}">
            Anterior
        </a>
        <a th:if="${!payments.hasPrevious()}" class="btn-secondary disabled" href="#">
            Anterior
        </a>

        <a th:each="i : ${#numbers.sequence(0, visualTotalPages - 1)}"
           th:text="${i + 1}"
           th:href="@{/admin/payments(page=${i}, status=${status}, paymentMethod=${paymentMethod}, branchId=${branchId})}"
           th:class="${i == payments.number ? 'btn-primary page-active' : 'btn-secondary'}">
        </a>

        <a th:if="${payments.hasNext()}"
           class="btn-secondary"
           th:href="@{/admin/payments(page=${payments.number + 1}, status=${status}, paymentMethod=${paymentMethod}, branchId=${branchId})}">
            Siguiente
        </a>
        <a th:if="${!payments.hasNext()}" class="btn-secondary disabled" href="#">
            Siguiente
        </a>
    </div>

</div>
</body>
</html>
