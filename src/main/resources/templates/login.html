<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{login.title}">Iniciar sesión</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">

<main class="login-shell">
    <div class="login-card">
        <div class="login-logo">
            <img th:src="@{/images/logo.jpeg}" alt="Sam Gym Fitness" class="hero-logo">
        </div>

        <div class="language-selector login-language-selector" th:with="currentLang=${#locale.language}">
            <a th:href="@{/login(lang='es')}"
               th:classappend="${currentLang == 'es'} ? ' active'"
               data-lang="es">ES</a>
            |
            <a th:href="@{/login(lang='en')}"
               th:classappend="${currentLang == 'en'} ? ' active'"
               data-lang="en">EN</a>
        </div>

        <h1 th:text="#{login.title}">Iniciar sesión</h1>

        <div th:if="${messageError}" class="alert error-box" th:text="#{${messageError}}"></div>
        <div th:if="${param.logout}" class="status-active" th:text="#{login.logout}">Sesión cerrada.</div>

        <form th:action="@{/login(lang=${#locale.language})}" method="post" autocomplete="off">
            <label for="username" th:text="#{login.username}">Nombre de usuario</label>
            <input id="username"
                   type="text"
                   name="username"
                   required
                   th:placeholder="#{login.username.placeholder}">

            <label for="password" th:text="#{login.password}">Contraseña</label>
            <input id="password"
                   type="password"
                   name="password"
                   required
                   th:placeholder="#{login.password.placeholder}">

            <button type="submit" class="btn-primary" th:text="#{login.submit}">Ingresar</button>

            <div class="buttons">
                <a th:href="@{/(lang=${#locale.language})}" class="btn-secondary" th:text="#{login.back.home}">Volver al inicio</a>
            </div>
        </form>
    </div>
</main>

<script>
    function clearTransientVisualState() {
        document.body.classList.remove('menu-open', 'modal-open', 'drawer-open', 'sidebar-open', 'swal2-shown', 'swal2-height-auto');

        if (document.body.style.overflow === 'hidden') {
            document.body.style.overflow = '';
        }

        document.querySelectorAll('.swal2-container, .modal-backdrop').forEach(function (element) {
            element.remove();
        });
    }

    clearTransientVisualState();
    window.addEventListener('pageshow', clearTransientVisualState);

    function changeLanguage(lang) {
        const url = new URL(window.location.href);
        url.searchParams.set('lang', lang);
        url.searchParams.delete('logout');
        window.location.href = url.toString();
    }

    document.querySelectorAll('.language-selector [data-lang]').forEach(function (link) {
        link.addEventListener('click', function (event) {
            event.preventDefault();
            changeLanguage(link.dataset.lang);
        });
    });
</script>

</body>
</html>
