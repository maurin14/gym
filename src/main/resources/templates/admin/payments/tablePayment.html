<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="tablePayment">

    <table>
        <thead>
        <tr>
            <th>Fecha</th>
            <th>Monto</th>
            <th>Método</th>
            <th>Estado</th>
            <th>Usuario</th>
            <th>Sucursal</th>
            <th>Descripción</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${payments.content.size() == 0}">
            <td colspan="8">No se encontraron pagos registrados.</td>
        </tr>

        <tr th:each="p : ${payments.content}">
            <td th:text="${#temporals.format(p.paymentDate, 'dd/MM/yyyy')}"></td>
            <td th:text="${'₡' + p.amount}"></td>
            <td th:text="${p.paymentMethod}"></td>

            <td>
                <span th:text="${p.status}"
                      th:class="${p.status == 'Pagado' ? 'badge badge-paid' : (p.status == 'Pendiente' ? 'badge badge-pending' : 'badge badge-cancelled')}">
                </span>
            </td>

            <td th:text="${p.userId}"></td>
            <td th:text="${p.branch.name}"></td>
            <td th:text="${p.description}"></td>

            <td class="actions">
                <a th:href="@{/admin/payments/edit/{id}(id=${p.id})}" class="btn-secondary">Editar</a>

                <a href="#"
                   class="btn-danger"
                   th:data-id="${p.id}"
                   onclick="confirmDeletePayment(this); return false;">
                    Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${payments.totalPages > 1}">
        <button type="button"
                class="btn-secondary"
                th:if="${payments.hasPrevious()}"
                th:data-page="${payments.number - 1}"
                onclick="changePaymentPage(this)">
            Anterior
        </button>

        <span th:each="i : ${#numbers.sequence(0, payments.totalPages - 1)}">
            <button type="button"
                    th:text="${i + 1}"
                    th:data-page="${i}"
                    th:class="${i == payments.number ? 'btn-primary' : 'btn-secondary'}"
                    onclick="changePaymentPage(this)">
            </button>
        </span>

        <button type="button"
                class="btn-secondary"
                th:if="${payments.hasNext()}"
                th:data-page="${payments.number + 1}"
                onclick="changePaymentPage(this)">
            Siguiente
        </button>
    </div>

</div>

</body>
</html>
