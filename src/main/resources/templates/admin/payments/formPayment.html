<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de Pago</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/payment.js}"></script>
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <a th:href="@{/}">
            <img th:src="@{/images/logo.jpeg}" alt="SAM Gym Fitness" class="logo">
        </a>
        <span class="system-name">SAM Gym Fitness</span>
    </div>

    <nav class="header-nav">
        
        <a th:href="@{/logout}">Cerrar sesión</a>
    </nav>
</header>

<div class="container form-container">

    <h2 class="page-title">Formulario de Pago</h2>

    <form id="paymentForm"
          th:action="@{/admin/payments/save}"
          th:object="${payment}"
          method="post"
          novalidate>

        <input type="hidden" th:field="*{id}">

        <label>Fecha de pago</label>
        <input type="date" th:field="*{paymentDate}" required>
        <small class="error-message" th:if="${#fields.hasErrors('paymentDate')}" th:errors="*{paymentDate}"></small>
        <small class="error-message" th:unless="${#fields.hasErrors('paymentDate')}"></small>

        <label>Monto</label>
        <input type="number" th:field="*{amount}" required min="0.01" step="0.01" placeholder="Ejemplo: 15000">
        <small class="error-message" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></small>
        <small class="error-message" th:unless="${#fields.hasErrors('amount')}"></small>

        <label>Método de pago</label>
        <select th:field="*{paymentMethod}" required>
            <option value="">Seleccione</option>
            <option value="Efectivo">Efectivo</option>
            <option value="Tarjeta">Tarjeta</option>
            <option value="Sinpe">Sinpe</option>
            <option value="Transferencia">Transferencia</option>
        </select>
        <small class="error-message" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}"></small>
        <small class="error-message" th:unless="${#fields.hasErrors('paymentMethod')}"></small>

        <label>Estado</label>
        <select th:field="*{status}" required>
            <option value="">Seleccione</option>
            <option value="Pagado">Pagado</option>
            <option value="Pendiente">Pendiente</option>
            <option value="Anulado">Anulado</option>
        </select>
        <small class="error-message" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></small>
        <small class="error-message" th:unless="${#fields.hasErrors('status')}"></small>

        <label>Usuario</label>
        <input type="number" th:field="*{userId}" required min="1" placeholder="Ejemplo: 1">
        <small class="error-message" th:if="${#fields.hasErrors('userId')}" th:errors="*{userId}"></small>
        <small class="error-message" th:unless="${#fields.hasErrors('userId')}"></small>

        <label>Sucursal</label>
        <select name="branchId" required>
            <option value="">Seleccione una sucursal</option>
            <option th:each="b : ${branches}"
                    th:value="${b.id}"
                    th:text="${b.name}"
                    th:selected="${payment.branch != null and payment.branch.id == b.id}">
            </option>
        </select>
        <small class="error-message" th:if="${#fields.hasErrors('branch')}" th:errors="*{branch}"></small>
        <small class="error-message" th:unless="${#fields.hasErrors('branch')}"></small>

        <label>Descripción</label>
        <input type="text" th:field="*{description}" required minlength="5" maxlength="255" placeholder="Ejemplo: Pago de mensualidad">
        <small class="error-message" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></small>
        <small class="error-message" th:unless="${#fields.hasErrors('description')}"></small>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="confirmSavePayment()">Guardar</button>
            <button type="button" class="btn-secondary" onclick="confirmCancelPayment()">Cancelar</button>
        </div>

    </form>

</div>

</body>
</html>
