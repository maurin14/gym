<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Administración de Pagos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/payment.js}"></script>
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <a th:href="@{/}">
           <img th:src="@{/images/logo.jpeg}" alt="SAM Gym Fitness" class="logo">
        </a>
        <span class="system-name">SAM Gym Fitness</span>
    </div>

    <nav class="header-nav">
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/admin/branches}">Sucursales</a>
        <a th:href="@{/admin/payments}">Pagos</a>
        <a th:href="@{/logout}">Cerrar sesión</a>
    </nav>
</header>

<div class="container">
    <h2 class="page-title">Administración de Pagos</h2>

    <div class="filters">
        <select id="filterStatus">
            <option value="">Todos los estados</option>
            <option value="Pagado" th:selected="${status == 'Pagado'}">Pagado</option>
            <option value="Pendiente" th:selected="${status == 'Pendiente'}">Pendiente</option>
            <option value="Anulado" th:selected="${status == 'Anulado'}">Anulado</option>
        </select>

        <select id="filterPaymentMethod">
            <option value="">Todos los métodos</option>
            <option value="Efectivo" th:selected="${paymentMethod == 'Efectivo'}">Efectivo</option>
            <option value="Tarjeta" th:selected="${paymentMethod == 'Tarjeta'}">Tarjeta</option>
            <option value="Sinpe" th:selected="${paymentMethod == 'Sinpe'}">Sinpe</option>
            <option value="Transferencia" th:selected="${paymentMethod == 'Transferencia'}">Transferencia</option>
        </select>

        <select id="filterBranch">
            <option value="">Todas las sucursales</option>
            <option th:each="b : ${branches}"
                    th:value="${b.id}"
                    th:text="${b.name}"
                    th:selected="${branchId != null and branchId == b.id}">
            </option>
        </select>

        <button type="button" class="btn-primary" onclick="filterPayments()">Filtrar</button>
        <a th:href="@{/admin/payments}" class="btn-secondary">Limpiar</a>
    </div>

    <div id="payment-table-container">
        <div th:replace="admin/payments/tablePayment :: tablePayment"></div>
    </div>

    <div class="buttons">
        <a th:href="@{/admin/payments/new}" class="btn-primary">Agregar pago</a>
       <button type="button" class="btn-secondary" onclick="goBack()">Atrás</button>
    </div>
</div>

<script th:inline="javascript">
    let success = [[${param.success}]];
    if (success != null) {
        Swal.fire({
            icon: 'success',
            title: 'Acción realizada correctamente',
            confirmButtonText: 'OK'
        });
    }
</script>

</body>
</html>
