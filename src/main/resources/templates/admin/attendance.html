<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('attendance')}"></div>


<main class="container portal-card admin-page-card wide-table-card">
    <div class="buttons admin-action-row">
        <a class="btn-primary" th:href="@{/admin/attendance/form}">Nueva asistencia</a>
    </div>

    <div class="admin-title-row">
        <div>
            <h2 class="section-title">Registro de asistencias</h2>
            <p class="admin-description">
                Consulte, registre y actualice la asistencia asociada a clientes y clases.
            </p>
        </div>
    </div>

    <div class="table-responsive">
        <table class="portal-table admin-table is-wide">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Clase</th>
                    <th>Sucursal</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Observacion</th>
                    <th>Registro</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="attendancesTableBody"></tbody>
        </table>
    </div>

    <div id="attendancesPagination" class="pagination"></div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    window.attendanceBasePath = /*[[${attendanceBasePath}]]*/ "/admin/attendance";
    window.canDeleteAttendances = /*[[${session.user != null and session.user.role == 'administrator'}]]*/ false;
</script>
<script th:src="@{/js/trainer/attendances/list.js}"></script>

</body>
</html>
