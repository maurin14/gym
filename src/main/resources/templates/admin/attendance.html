<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('attendance')}"></div>

<section class="hero-section portal-head">
    <div class="hero-overlay">
        <span class="hero-badge">ASISTENCIA</span>
        <h1>Asistencia</h1>
        <p class="hero-text">Gestione el control de asistencia de usuarios y clases.</p>
    </div>
</section>

<main class="container portal-card admin-page-card">
    <div class="admin-title-row">
        <div>
            <h2 class="section-title">Registro de asistencias</h2>
            <p class="admin-description">
                Consulte, registre y actualice la asistencia asociada a clientes y clases.
            </p>
        </div>
        <div class="buttons">
            <a class="btn-primary" th:href="@{/admin/attendance/form}">Agregar asistencia</a>
        </div>
    </div>

    <div class="table-responsive">
        <table class="portal-table">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Clase</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Observacion</th>
                    <th>Registro</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="attendancesTableBody"></tbody>
        </table>
    </div>

    <div class="pagination">
        <button id="prevBtn" onclick="previousPage()">Anterior</button>
        <button id="pageInfo" disabled>Pagina 1 de 1</button>
        <button id="nextBtn" onclick="nextPage()">Siguiente</button>
    </div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:src="@{/js/trainer/attendances/list.js}"></script>

</body>
</html>
