<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Formulario de equipamiento</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('equipment')}"></div>


<main class="container form-container portal-card admin-page-card">
    <div th:if="${messageError}" class="status-cancelled" th:text="${messageError}"></div>

    <form class="portal-form"
          th:action="@{/admin/equipment/save}"
          th:object="${equipmentItem}"
          method="post"
          novalidate>

        <input type="hidden" th:field="*{id}">

        <label>Nombre</label>
        <input type="text"
               th:field="*{name}"
               maxlength="100"
               placeholder="Ejemplo: Caminadora profesional">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['name'] != null}"
               th:text="${fieldErrors['name']}"></small>

        <label>Tipo</label>
        <input type="text"
               th:field="*{type}"
               maxlength="100"
               placeholder="Ejemplo: Cardio, fuerza o accesorio">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['type'] != null}"
               th:text="${fieldErrors['type']}"></small>

        <label>Estado fisico</label>
        <input type="text"
               th:field="*{state}"
               maxlength="100"
               placeholder="Ejemplo: Nuevo, bueno o en mantenimiento">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['state'] != null}"
               th:text="${fieldErrors['state']}"></small>

        <label>Fecha de compra</label>
        <input type="date" th:field="*{purchaseDate}">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['purchaseDate'] != null}"
               th:text="${fieldErrors['purchaseDate']}"></small>

        <label>Costo</label>
        <input type="number"
               th:field="*{cost}"
               step="0.01"
               min="0"
               placeholder="Ejemplo: 250000">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['cost'] != null}"
               th:text="${fieldErrors['cost']}"></small>

        <label>Disponibilidad</label>
        <select th:field="*{available}">
            <option value="">Seleccione</option>
            <option value="true">Disponible</option>
            <option value="false">No disponible</option>
        </select>
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['available'] != null}"
               th:text="${fieldErrors['available']}"></small>

        <label>Sucursal</label>
        <select th:field="*{branch.id}">
            <option value="0">Seleccione una sucursal</option>
            <option th:each="branch : ${branches}"
                    th:value="${branch.id}"
                    th:text="${branch.name}">
                Sucursal
            </option>
        </select>
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['branch.id'] != null}"
               th:text="${fieldErrors['branch.id']}"></small>

        <div class="buttons">
            <button type="submit" class="btn-primary">Guardar</button>
            <a th:href="@{/admin/equipment}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
