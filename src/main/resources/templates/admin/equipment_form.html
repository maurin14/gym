<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{equipment.subMenu}"></title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script th:src="@{/js/admin-ui.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('equipment')}"></div>


<main class="container form-container portal-card admin-page-card">
    <div th:if="${messageError}" class="status-cancelled" th:text="${messageError}"></div>

    <form class="portal-form"
          th:action="@{/admin/equipment/save}"
          th:object="${equipmentItem}"
          method="post"
          novalidate
  
          th:data-admin-confirm="${equipmentItem.id > 0 ? #messages.msg('message.equipment.update') : #messages.msg('message.equipment.create')}"
          th:data-admin-loading="#{message.saving}">

        <input type="hidden" th:field="*{id}">

        <label th:text='#{label.gym.name}'></label>
        <input type="text"
               th:field="*{name}"
               maxlength="100"
              th:placeholder="#{text.equipment}">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['name'] != null}"
               th:text="${fieldErrors['name']}"></small>

        <label th:text='#{label.gym.type}'></label>
        <input type="text"
               th:field="*{type}"
               maxlength="100"
               th:placeholder="#{equipment.type.ejem}">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['type'] != null}"
               th:text="${fieldErrors['type']}"></small>

        <label th:text='#{label.gym.fisicalStage}'></label>
        <input type="text"
               th:field="*{state}"
               maxlength="100"
               th:placeholder="#{equipment.staje.ejem}">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['state'] != null}"
               th:text="${fieldErrors['state']}"></small>

        <label th:text='#{label.gym.purchasedate}'></label>
        <input type="date" th:value="${equipmentItem.purchaseDate}"
       name="purchaseDate">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['purchaseDate'] != null}"
               th:text="${fieldErrors['purchaseDate']}"></small>
        

        <label th:text='#{label.gym.cost}'></label>
        <input type="number"
               th:field="*{cost}"
               step="0.01"
               min="0"
               placeholder="Ejemplo: 250000">
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['cost'] != null}"
               th:text="${fieldErrors['cost']}"></small>

        <label th:text='#{label.gym.availability}'></label>
        <select th:field="*{available}">
            <option value="" th:text='#{select.select}'></option>
            <option value="true" th:text='#{status.available}'></option>
            <option value="false" th:text='#{status.unavailable}'></option>
        </select>
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['available'] != null}"
               th:text="${fieldErrors['available']}"></small>

        <label th:text='#{label.gym.branch}'></label>
        <select th:field="*{branch.id}">
            <option value="0" th:text='#{select.branch}'></option>
            <option th:each="branch : ${branches}"
                    th:value="${branch.id}"
                    th:text="${branch.name}">
                Sucursal
            </option>
        </select>
        <small class="field-error"
               th:if="${fieldErrors != null and fieldErrors['branch.id'] != null}"
               th:text="${fieldErrors['branch.id']}"></small>

        <div class="buttons">
            <button type="submit" class="btn-primary" th:text='#{button.save}'></button>
            <a th:href="@{/admin/equipment}" class="btn-secondary" th:text='#{button.cancel}'></a>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
