<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="tableBranch">

    <table>
        <thead>
        <tr>
            <th>Fecha apertura</th>
            <th>Nombre</th>
            <th>Provincia</th>
            <th>Dirección</th>
            <th>Teléfono</th>
            <th>Capacidad</th>
            <th>Correo</th>
            <th>Imagen</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${branches.content.size() == 0}">
            <td colspan="10">No se encontraron sucursales registradas.</td>
        </tr>

        <tr th:each="b : ${branches.content}">
            <td th:text="${#temporals.format(b.openingDate, 'dd/MM/yyyy')}"></td>
            <td th:text="${b.name}"></td>
            <td th:text="${b.province}"></td>
            <td th:text="${b.address}"></td>
            <td th:text="${b.phone}"></td>
            <td th:text="${b.capacity}"></td>
            <td th:text="${b.email}"></td>
            <td th:text="${b.imageUrl}"></td>
            <td>
                <span th:text="${b.active ? 'Activo' : 'Inactivo'}"
                      th:class="${b.active ? 'badge badge-active' : 'badge badge-inactive'}"></span>
            </td>
            <td class="actions">
                <a th:href="@{/admin/branches/edit/{id}(id=${b.id})}" class="btn-secondary">Editar</a>

                <a href="#"
                   th:data-id="${b.id}"
                   class="btn-primary"
                   onclick="confirmToggleBranch(this); return false;">
                    Activar/Inactivar
                </a>

                <a href="#"
                   th:data-id="${b.id}"
                   class="btn-danger"
                   onclick="confirmDeleteBranch(this); return false;">
                    Eliminar
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${branches.totalPages > 1}">
        <button type="button"
                class="btn-secondary"
                th:if="${branches.hasPrevious()}"
                th:data-page="${branches.number - 1}"
                onclick="changeBranchPage(this)">
            Anterior
        </button>

        <span th:each="i : ${#numbers.sequence(0, branches.totalPages - 1)}">
            <button type="button"
                    th:text="${i + 1}"
                    th:data-page="${i}"
                    th:class="${i == branches.number ? 'btn-primary' : 'btn-secondary'}"
                    onclick="changeBranchPage(this)">
            </button>
        </span>

        <button type="button"
                class="btn-secondary"
                th:if="${branches.hasNext()}"
                th:data-page="${branches.number + 1}"
                onclick="changeBranchPage(this)">
            Siguiente
        </button>
    </div>
</div>
</body>
</html>
