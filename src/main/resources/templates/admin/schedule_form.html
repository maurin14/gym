<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{schedule.form.title} "></title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('schedules')}"></div>


<main class="container form-container portal-card admin-page-card">
    <div th:if="${messageError}" class="status-cancelled" th:text="${messageError}"></div>

    <form class="portal-form" th:action="@{/admin/schedules/save}" th:object="${schedule}" method="post" novalidate
        th:data-admin-confirm="${schedule.id > 0 ? #messages.msg('message.schedule.update') : #messages.msg('message.schedule.create')}"
        th:data-admin-loading="#{message.saving}">
        <input type="hidden" th:field="*{id}">

        <label th:text="#{label.gym.branch}"></label>
        <select th:field="*{branch.id}">
            <option value="0" th:text="#{select.branch}"> </option>
            <option th:each="branch : ${branches}" th:value="${branch.id}" th:text="${branch.name}">Sucursal</option>
        </select>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['branch.id'] != null}" th:text="${fieldErrors['branch.id']}"></small>

        <label  th:text="#{label.gym.day}"></label>
        <select th:field="*{dayOfWeek}">
            <option value="" th:text="#{select.day}"></option>
            
            <option th:each="day : ${days}" th:value="${day}" th:text="#{'day.' + ${day.name().toLowerCase()}}"></option>
        </select>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['dayOfWeek'] != null}" th:text="${fieldErrors['dayOfWeek']}"></small>

        <label th:text="#{label.gym.hour}"></label>
        <input type="time" th:field="*{startTime}">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['startTime'] != null}" th:text="${fieldErrors['startTime']}"></small>

        <label th:text="#{label.gym.end}"></label>
        <input type="time" th:field="*{endTime}">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['endTime'] != null}" th:text="${fieldErrors['endTime']}"></small>

        <label>Tipo de horario</label>
        <input type="text" th:field="*{scheduleType}" maxlength="100" placeholder="Ejemplo: Atencion general, Yoga, CrossFit">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['scheduleType'] != null}" th:text="${fieldErrors['scheduleType']}"></small>

        <label th:text="#{label.gym.stage}"></label>
        <select th:field="*{active}">
           <option th:value="true" th:text="#{status.active}"></option>
           <option th:value="false" th:text="#{status.inactive}"></option>
        </select>

        <div class="buttons">
           <button type="submit" class="btn-primary" th:text="#{button.save}"></button>
          <a th:href="@{/admin/schedules}" class="btn-secondary" th:text="#{button.cancel}"></a>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
