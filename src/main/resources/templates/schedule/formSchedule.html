<html>
    <head>
         <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" th:href="@{/css/app.css}">
           <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </head>
    <body>
        <div class="center-form">
    <form class="glass-form"
          onsubmit="return safeFormSchedule(this)"
          th:action="@{/admin/schedules/save}"
          th:object="${schedule}"
          method="post">

        <input type="hidden" th:field="*{id}" />

        <label>Branch:</label>
        <select th:field="*{branch.id}" required>
            <option value="0" disabled selected >-- Select Branch --</option> 
            <option th:each="bra : ${branches}" 
                    th:value="${bra.id}" 
                    th:text="${bra.name}">
            </option>
        </select>

        <label>Day of Week:</label>
        <select th:field="*{dayOfWeek}" required>
            <option value="">-- Select Day --</option>
            <option value="MONDAY">Monday</option>
            <option value="TUESDAY">Tuesday</option>
            <option value="WEDNESDAY">Wednesday</option>
            <option value="THURSDAY">Thursday</option>
            <option value="FRIDAY">Friday</option>
            <option value="SATURDAY">Saturday</option>
            <option value="SUNDAY">Sunday</option>
        </select>

        <label>Start Time:</label>
        <input type="time" th:field="*{startTime}" required/>

        <label>End Time:</label>
        <input type="time" th:field="*{endTime}" required/>

        <label>Schedule Type:</label>
        <input type="text" th:field="*{scheduleType}" placeholder="e.g. CrossFit, Yoga" required/>

        <label>
            <input type="checkbox" th:field="*{active}"/> Active
        </label>

        <div class="button-group">
            <button type="submit"
                    th:text="${schedule.id != 0} ? 'Actualizar' : 'Guardar'">
            </button>

            <a href="#" onclick="backScheduleTable(); return false;" class="cancelar">
                Cancelar
            </a>
        </div>

    </form>
</div>
    </body>
</html>
