<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sucursales</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <a th:href="@{/}">
           <img th:src="@{/images/logo.jpeg}" alt="SAM Gym Fitness" class="logo">
        </a>
        <span class="system-name">SAM Gym Fitness</span>
    </div>

    <nav class="header-nav">
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/branches}">Sucursales</a>
        <a th:href="@{/payments/my-payments(userId=1)}">Mis pagos</a>
        <a th:href="@{/logout}">Cerrar sesión</a>
    </nav>
</header>

<div class="container">
    <h2 class="page-title">Sucursales disponibles</h2>

    <div class="filters">
        <input type="text" id="filterName" placeholder="Buscar sucursal por nombre" th:value="${name}">

        <select id="filterProvince">
            <option value="">Todas las provincias</option>
            <option value="San José" th:selected="${province == 'San José'}">San José</option>
            <option value="Alajuela" th:selected="${province == 'Alajuela'}">Alajuela</option>
            <option value="Cartago" th:selected="${province == 'Cartago'}">Cartago</option>
            <option value="Heredia" th:selected="${province == 'Heredia'}">Heredia</option>
            <option value="Guanacaste" th:selected="${province == 'Guanacaste'}">Guanacaste</option>
            <option value="Puntarenas" th:selected="${province == 'Puntarenas'}">Puntarenas</option>
            <option value="Limón" th:selected="${province == 'Limón'}">Limón</option>
        </select>

        <button type="button" class="btn-primary"
                onclick="window.location.href='/branches?name=' + encodeURIComponent(document.getElementById('filterName').value) + '&province=' + encodeURIComponent(document.getElementById('filterProvince').value)">
            Filtrar
        </button>

        <a th:href="@{/branches}" class="btn-secondary">Limpiar</a>
    </div>

    <div class="card-grid">
        <article class="card" th:each="b : ${branches.content}">
            <img th:src="@{'/images/branches/' + ${b.imageUrl}}" alt="Sucursal">
            <div class="card-body">
                <h3 th:text="${b.name}"></h3>
                <p th:text="${b.address}"></p>
                <p><strong>Provincia:</strong> <span th:text="${b.province}"></span></p>
                <span class="badge badge-active">Activa</span>
                <div class="buttons">
                    <a th:href="@{/branches/{id}(id=${b.id})}" class="btn-primary">Ver gimnasio</a>
                </div>
            </div>
        </article>
    </div>

    <div class="pagination" th:if="${branches.totalPages > 1}">
        <a class="btn-secondary"
           th:if="${branches.hasPrevious()}"
           th:href="@{/branches(page=${branches.number - 1}, name=${name}, province=${province})}">
            Anterior
        </a>

        <span th:each="i : ${#numbers.sequence(0, branches.totalPages - 1)}">
            <a th:text="${i + 1}"
               th:href="@{/branches(page=${i}, name=${name}, province=${province})}"
               th:class="${i == branches.number ? 'btn-primary' : 'btn-secondary'}">
            </a>
        </span>

        <a class="btn-secondary"
           th:if="${branches.hasNext()}"
           th:href="@{/branches(page=${branches.number + 1}, name=${name}, province=${province})}">
            Siguiente
        </a>
    </div>
</div>

</body>
</html>
