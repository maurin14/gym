<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Lista de Usuarios</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" th:href="@{/css/app.css}"/>
    </head>
    <body>
        <div class="container">
            <h1>Lista de Usuarios</h1> 
            
            <div th:if="${messageSuccess}" class="alert success" th:text="${messageSuccess}"></div>
            <div th:if="${messageError}" class="alert error-box" th:text="${messageError}"></div>
            
            <div class="menu">
                <a th:href="@{/}">Inicio</a>
                <a th:href="@{/users/add}">Agregar Usuario</a>
            </div>

            <form th:action="@{/users}" method="get" class="filter-form">
                <label>Nombre</label>
                <input type="text" name="fullName" th:value="${fullName}" placeholder="Buscar por nombre"/>

                <label>Rol</label>
                <select name="role">
                    <option value="">Todos</option>
                    <option value="administrator" th:selected="${role == 'administrator'}">Administrador</option>
                    <option value="trainer" th:selected="${role == 'trainer'}">Entrenador</option>
                    <option value="client" th:selected="${role == 'client'}">Cliente</option>
                </select>

                <button type="submit">Buscar</button>
                <a th:href="@{/users}">Limpiar</a>
            </form>
            
            <div class="table-container no-scroll">
                <table border="1" class="compact-table">
                    <tr>
                        <th>Nombre</th>
                        <th>Cédula</th>
                        <th>Nombre de Usuario</th>
                        <th>Rol</th>
                        <th>Estado</th>
                        <th>Fecha de Registro</th>
                        <th colspan="3">Acciones</th>
                    </tr>

                    <tr th:each="u : ${users}">
                        <td th:text="${u.fullName}"></td>
                        <td th:text="${u.idCard}"></td>
                        <td th:text="${u.username}"></td>
                        <td>
                            <span th:text="${u.role}"
                                  th:class="'badge ' + ${u.role}"></span>
                        </td>
                        <td>
                            <span th:text="${u.status}"
                                  th:class="'badge state-' + ${u.status}"></span>
                        </td>
                        <td th:text="${u.formattedRecordDate}"></td>
                        <td><a th:href="@{/users/detail(id=${u.userId})}" class="btn-view">Ver Detalles</a></td>
                        <td><a th:href="@{/users/edit(id=${u.userId})}" class="btn-edit">Editar</a></td>
                        <td>
                            <a th:if="${session.user.role == 'administrator'}"
                               th:href="@{/users/delete(id=${u.userId})}"
                               class="btn-delete"
                               onclick="return confirm('¿Desea eliminar este usuario?')">Eliminar</a>
                        </td>
                    </tr>
                </table>
                
                <div class="pagination">
                    <a th:if="${currentPage > 1}"
                       th:href="@{/users(page=${currentPage - 1})}">Anterior</a>

                    <span th:each="i : ${#numbers.sequence(1, totalPages)}">
                        <a th:href="@{/users(page=${i})}"
                           th:text="${i}"
                           th:classappend="${i == currentPage} ? 'active'"></a>
                    </span>

                    <a th:if="${currentPage < totalPages}"
                       th:href="@{/users(page=${currentPage + 1})}">Siguiente</a>
                </div>
            </div>
        </div>
    </body>
</html>
