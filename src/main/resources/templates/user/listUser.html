<!DOCTYPE html>



<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Usuarios - SAM GYM FITNESS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('users')}"></div>

<main class="container portal-card admin-page-card">
    <h1 class="page-title">Lista de Usuarios</h1>
    <p class="admin-description">
        Administre los usuarios registrados, sus roles, estados y datos principales.
    </p>

    <div th:if="${messageSuccess}" class="status-active" th:text="${messageSuccess}"></div>
    <div th:if="${messageError}" class="status-cancelled" th:text="${messageError}"></div>

    <div class="buttons">
        <a th:href="@{/users/add}" class="btn-primary">Agregar usuario</a>
    </div>

    <form th:action="@{/users}" method="get" class="filters">
        <input type="text" name="fullName" th:value="${fullName}" placeholder="Buscar por nombre">

        <select name="role">
            <option value="">Todos los roles</option>
            <option value="administrator" th:selected="${role == 'administrator'}">Administrador</option>
            <option value="trainer" th:selected="${role == 'trainer'}">Entrenador</option>
            <option value="client" th:selected="${role == 'client'}">Cliente</option>
        </select>

        <button type="submit" class="btn-primary">Buscar</button>
        <a th:href="@{/users}" class="btn-secondary">Limpiar</a>
    </form>

    <table>
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Registro</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.fullName}"></td>
            <td th:text="${u.idCard}"></td>
            <td th:text="${u.username}"></td>

            <td>
                <span th:if="${u.role == 'administrator'}" class="badge badge-active">Administrador</span>
                <span th:if="${u.role == 'trainer'}" class="badge badge-pending">Entrenador</span>
                <span th:if="${u.role == 'client'}" class="badge badge-inactive">Cliente</span>
            </td>

            <td>
                <span th:if="${u.status == 'active'}" class="status-active">Activo</span>
                <span th:if="${u.status == 'inactive'}" class="status-inactive">Inactivo</span>
            </td>

            <td th:text="${u.formattedRecordDate}"></td>

            <td>
                <div class="actions">
                    <a th:href="@{/users/detail(id=${u.userId})}" class="btn-secondary">Ver</a>
                    <a th:href="@{/users/edit(id=${u.userId})}" class="btn-primary">Editar</a>

                    <a th:if="${session.user.role == 'administrator'}"
                       th:href="@{/users/delete(id=${u.userId})}"
                       class="btn-danger"
                       onclick="return confirm('¿Desea eliminar este usuario?')">
                        Eliminar
                    </a>
                </div>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="7" class="empty-message">No hay usuarios registrados.</td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:if="${totalPages > 1}">
        <a th:if="${currentPage > 1}"
           th:href="@{/users(page=${currentPage - 1}, fullName=${fullName}, role=${role})}">
            Anterior
        </a>

        <span th:each="i : ${#numbers.sequence(1, totalPages)}">
            <a th:href="@{/users(page=${i}, fullName=${fullName}, role=${role})}"
               th:text="${i}"
               th:classappend="${i == currentPage} ? 'page-active'"></a>
        </span>

        <a th:if="${currentPage < totalPages}"
           th:href="@{/users(page=${currentPage + 1}, fullName=${fullName}, role=${role})}">
            Siguiente
        </a>
    </div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
