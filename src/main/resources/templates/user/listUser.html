<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Usuarios - SAM GYM FITNESS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('users')}"></div>


<main class="container portal-card admin-page-card">
    <div th:if="${messageSuccess}" class="status-active" th:text="${messageSuccess}"></div>
    <div th:if="${messageError}" class="status-cancelled" th:text="${messageError}"></div>

    <div class="buttons admin-action-row">
        <a th:href="@{/users/add}" class="btn-primary">Nuevo usuario</a>
    </div>

    <form th:action="@{/users}" method="get" class="admin-filter-row portal-filters">
        <input type="text" name="fullName" th:value="${fullName}" placeholder="Buscar por nombre">

        <select name="role">
            <option value="">Todos los roles</option>
            <option value="administrator" th:selected="${role == 'administrator'}">Administrador</option>
            <option value="trainer" th:selected="${role == 'trainer'}">Entrenador</option>
            <option value="client" th:selected="${role == 'client'}">Cliente</option>
        </select>

        <button type="submit" class="btn-primary">Buscar</button>
        <a th:href="@{/users}" class="btn-secondary">Limpiar</a>
    </form>

    <table class="portal-table">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Cédula</th>
            <th>Usuario</th>
            <th>Rol</th>
            <th>Estado</th>
            <th>Registro</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.fullName}"></td>
            <td th:text="${u.idCard}"></td>
            <td th:text="${u.username}"></td>

            <td>
                <span th:if="${u.role == 'administrator'}" class="badge badge-active">Administrador</span>
                <span th:if="${u.role == 'trainer'}" class="badge badge-pending">Entrenador</span>
                <span th:if="${u.role == 'client'}" class="badge badge-inactive">Cliente</span>
            </td>

            <td>
                <span th:if="${u.status == 'active'}" class="status-active">Activo</span>
                <span th:if="${u.status == 'inactive'}" class="status-inactive">Inactivo</span>
            </td>

            <td th:text="${u.formattedRecordDate}"></td>

            <td>
                <div class="actions">
                    <a th:href="@{/users/detail(id=${u.userId})}" class="btn-secondary">Ver</a>
                    <a th:href="@{/users/edit(id=${u.userId})}" class="btn-primary">Editar</a>

                    <a th:if="${session.user.role == 'administrator'}"
                       th:href="@{/users/delete(id=${u.userId})}"
                       class="btn-danger"
                       data-delete-link
                       data-delete-title="Eliminar usuario?">
                        Eliminar
                    </a>
                </div>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(users)}">
            <td colspan="7" class="empty-message">No hay usuarios registrados.</td>
        </tr>
        </tbody>
    </table>

    <nav class="pagination" aria-label="Paginacion de usuarios"
         th:with="visualTotalPages=${totalPages > 0 ? totalPages : 1}">
        <a class="btn-secondary"
           th:classappend="${currentPage == 0} ? ' disabled'"
           th:href="@{/users(page=${currentPage == 0 ? currentPage : currentPage - 1}, fullName=${fullName}, role=${role})}">
            Anterior
        </a>

        <a th:each="i : ${#numbers.sequence(0, visualTotalPages - 1)}"
           th:href="@{/users(page=${i}, fullName=${fullName}, role=${role})}"
           th:text="${i + 1}"
           th:class="${i == currentPage ? 'btn-primary page-active' : 'btn-secondary'}"></a>

        <a class="btn-secondary"
           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
           th:href="@{/users(page=${currentPage + 1 >= totalPages ? currentPage : currentPage + 1}, fullName=${fullName}, role=${role})}">
            Siguiente
        </a>
    </nav>
</main>

<script>
    document.querySelectorAll('[data-delete-link]').forEach(function (link) {
        link.addEventListener('click', function (event) {
            event.preventDefault();
            confirmAdminAction({
                title: link.dataset.deleteTitle || 'Eliminar registro?',
                text: '',
                confirmText: 'Eliminar',
                icon: 'warning'
            }).then(function (result) {
                if (result.isConfirmed) {
                    showAdminLoading('Procesando...');
                    window.location.href = link.href;
                }
            });
        });
    });
</script>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
