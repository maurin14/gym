<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle de Pago</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <a th:href="@{/}">
            <img th:src="@{/images/logo.jpeg}" alt="SAM Gym Fitness" class="logo">
        </a>
        <span class="system-name">SAM Gym Fitness</span>
    </div>

    <nav class="header-nav">
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/branches}">Sucursales</a>
        <a th:href="@{/payments/my-payments(userId=1)}">Mis pagos</a>
        <a th:href="@{/logout}">Cerrar sesión</a>
    </nav>
</header>

<div class="container form-container">
    <h2 class="page-title">Detalle del pago</h2>

    <div class="info-card">
        <p><strong>Fecha:</strong> <span th:text="${#temporals.format(payment.paymentDate, 'dd/MM/yyyy')}"></span></p>
        <p><strong>Monto:</strong> <span th:text="${'₡' + payment.amount}"></span></p>
        <p><strong>Método:</strong> <span th:text="${payment.paymentMethod}"></span></p>
        <p><strong>Estado:</strong> <span th:text="${payment.status}"></span></p>
        <p><strong>Descripción:</strong> <span th:text="${payment.description}"></span></p>
        <p><strong>Sucursal:</strong> <span th:text="${payment.branch.name}"></span></p>
    </div>

    <div class="buttons">
        <button type="button" class="btn-secondary" onclick="goBack()">Atrás</button>
    </div>
</div>

</body>
</html>
