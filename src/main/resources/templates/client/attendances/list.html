<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.attendance.my}">Mis asistencias - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeaderActive('attendances')}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('attendances')}"></div>

<main>
    <section class="client-section">
        <div class="client-table-card">
            <div class="table-responsive">
                <table class="client-table">
                    <thead>
                    <tr>
                        <th th:text="#{label.class.type}">Clase</th>
                        <th th:text="#{label.class.date}">Fecha</th>
                        <th th:text="#{label.attendance.status}">Estado</th>
                        <th th:text="#{label.attendance.observation}">Observación</th>
                        <th th:text="#{label.attendance.register}">Registro</th>
                    </tr>
                    </thead>

                    <tbody id="attendancesTableBody"></tbody>
                </table>
            </div>

            <div class="form-actions">
                <a th:href="@{/client/classes}" class="btn-secondary" th:text="#{button.view.classes}">Ver clases</a>
            </div>

            <nav id="attendancesPagination" class="client-pagination" th:aria-label="#{pagination.attendance}"></nav>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:inline="javascript">
    window.i18n = {
        loadError: /*[[#{attendance.message.loadError}]]*/ "Could not load attendances.",
        emptyAttendances: /*[[#{empty.attendances}]]*/ "No attendances available.",
        previous: /*[[#{button.previous}]]*/ "Previous",
        next: /*[[#{button.next}]]*/ "Next",
        statusPresent: /*[[#{status.present}]]*/ "Present",
        statusAbsent: /*[[#{status.absent}]]*/ "Absent",
        statusLate: /*[[#{status.late}]]*/ "Late"
    };
</script>
<script th:src="@{/js/admin-ui.js}" defer></script>
<script th:src="@{/js/client-home.js}" defer></script>
<script th:src="@{/js/client/attendances/list.js}" defer></script>

</body>
</html>
