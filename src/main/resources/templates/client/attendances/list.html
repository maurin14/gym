<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis asistencias - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('attendances')}"></div>

<main>
    <section class="client-hero compact-hero attendances-hero">
        <div>
            <span class="section-kicker">Mi cuenta</span>
            <h1>Mis asistencias</h1>
            <p>Revisa las visitas y registros asociados a tus clases dentro del gimnasio.</p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" aria-label="Ruta de navegaci&oacute;n">
            <a th:href="@{/client/home}">Inicio</a>
            <span>/</span>
            <strong>Asistencia</strong>
        </nav>

        <div class="client-table-card">
            <div class="section-heading table-heading">
                <div>
                    <span class="section-kicker">Historial</span>
                    <h2>Registros de asistencia</h2>
                    <p>Consulta el estado, observaci&oacute;n y fecha de registro de tus asistencias.</p>
                </div>
                <a th:href="@{/client/classes}" class="btn-secondary">Ver clases</a>
            </div>

            <div class="table-responsive">
                <table class="client-table">
                    <thead>
                    <tr>
                        <th>Clase</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                        <th>Observaci&oacute;n</th>
                        <th>Registro</th>
                    </tr>
                    </thead>

                    <tbody id="attendancesTableBody"></tbody>
                </table>
            </div>

            <nav id="attendancesPagination" class="client-pagination" aria-label="Paginacion de asistencias"></nav>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/admin-ui.js}" defer></script>
<script th:src="@{/js/client-home.js}" defer></script>
<script th:src="@{/js/client/attendances/list.js}" defer></script>

</body>
</html>
