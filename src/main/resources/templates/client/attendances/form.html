<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Asistencia</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body class="public-page">

<header class="main-header">
    <div class="header-left">
        <div class="brand-text">
            <span class="system-name">Gimnasio</span>
            <span class="brand-subtitle">Portal del cliente</span>
        </div>
    </div>

    <nav class="header-nav">
        <a href="/user/home">Inicio</a>
        <a href="/client/classes">Clases</a>
        <a href="/client/attendances">Mis Asistencias</a>
    </nav>
</header>

<div class="container form-container">

    <h1 class="page-title">Registrar Asistencia</h1>

    <form>
        <label>Clase</label>
        <select id="classId"></select>

        <label>Fecha de Asistencia</label>
        <input type="date" id="attendanceDate">

        <label>Observación</label>
        <textarea id="observation"></textarea>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="saveClientAttendance()">Registrar</button>
            <a class="btn-secondary" href="/client/classes">Volver</a>
        </div>
    </form>

</div>

<script src="/js/client-attendances-form.js"></script>

</body>
</html>
