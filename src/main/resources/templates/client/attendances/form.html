<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.attendance.register}">Registrar asistencia - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeaderActive('attendances')}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('attendances')}"></div>

<main>
    <section class="client-section">
        <div class="client-form-card narrow-form">
            <form class="client-form single-column">
                <div class="toolbar-field">
                    <label for="classId" th:text="#{label.class.select}">Clase</label>
                    <select id="classId" onchange="setAttendanceDate()"></select>
                    <small id="classIdError" class="field-error"></small>
                </div>

                <div class="toolbar-field">
                    <label for="attendanceDate" th:text="#{label.attendance.date}">Fecha de asistencia</label>
                    <input type="date" id="attendanceDate" readonly>
                    <small id="attendanceDateError" class="field-error"></small>
                </div>

                <div class="toolbar-field full-span">
                    <label for="observation" th:text="#{label.attendance.observation}">Observación</label>
                    <textarea id="observation" rows="5"></textarea>
                </div>

                <div class="form-actions full-span">
                    <button type="button" class="btn-primary" onclick="saveClientAttendance()" th:text="#{button.add.attendance}">Registrar</button>
                    <a class="btn-secondary" th:href="@{/client/classes}" th:text="#{button.back}">Volver</a>
                </div>
            </form>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:inline="javascript">
    window.i18n = {
        selectClass: /*[[#{label.select.class}]]*/ "Select a class",
        noBranch: /*[[#{label.no.branch}]]*/ "No branch",
        classRequired: /*[[#{attendance.validation.classRequired}]]*/ "Select a class.",
        dateRequired: /*[[#{attendance.validation.dateRequired}]]*/ "The date is required.",
        reviewFields: /*[[#{message.form.review}]]*/ "Please review the highlighted fields.",
        confirmTitle: /*[[#{confirm.default.title}]]*/ "Save changes?",
        saveButton: /*[[#{button.save}]]*/ "Save",
        loadingTitle: /*[[#{confirm.loading.save}]]*/ "Saving...",
        saveError: /*[[#{attendance.message.saveError}]]*/ "Could not save attendance.",
        saved: /*[[#{attendance.message.saved}]]*/ "Attendance saved successfully."
    };
</script>
<script th:src="@{/js/admin-ui.js}" defer></script>
<script th:src="@{/js/client-home.js}" defer></script>
<script th:src="@{/js/client/attendances/form.js}" defer></script>

</body>
</html>
