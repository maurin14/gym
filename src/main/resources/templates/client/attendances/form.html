<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar asistencia - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('attendances')}"></div>

<main>
    <section class="client-hero compact-hero attendances-hero">
        <div>
            <span class="section-kicker">Asistencia</span>
            <h1>Registrar asistencia</h1>
            <p>Confirma la clase seleccionada y agrega una observaci&oacute;n si lo necesitas.</p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" aria-label="Ruta de navegaci&oacute;n">
            <a th:href="@{/client/home}">Inicio</a>
            <span>/</span>
            <a th:href="@{/client/classes}">Clases</a>
            <span>/</span>
            <strong>Registrar asistencia</strong>
        </nav>

        <div class="client-form-card">
            <form class="client-form">
                <div class="toolbar-field">
                    <label for="classId">Clase</label>
                    <select id="classId" onchange="setAttendanceDate()"></select>
                    <small id="classIdError" class="field-error"></small>
                </div>

                <div class="toolbar-field">
                    <label for="attendanceDate">Fecha de asistencia</label>
                    <input type="date" id="attendanceDate" readonly>
                    <small id="attendanceDateError" class="field-error"></small>
                </div>

                <div class="toolbar-field full-span">
                    <label for="observation">Observaci&oacute;n</label>
                    <textarea id="observation" rows="5"></textarea>
                </div>

                <div class="form-actions full-span">
                    <button type="button" class="btn-primary" onclick="saveClientAttendance()">Registrar</button>
                    <a class="btn-secondary" th:href="@{/client/classes}">Volver</a>
                </div>
            </form>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/admin-ui.js}" defer></script>
<script th:src="@{/js/client-home.js}" defer></script>
<script th:src="@{/js/client/attendances/form.js}" defer></script>

</body>
</html>
