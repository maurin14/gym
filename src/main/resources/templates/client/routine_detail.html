<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{${title}}">Detalle de la rutina</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeaderActive('routines')}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('routines')}"></div>

<main class="detail-page">
    <nav class="client-breadcrumb" th:aria-label="#{breadcrumb.navigation}">
        <a th:href="@{/client/home}" th:text="#{label.common.home}">Inicio</a>
        <span>/</span>
        <a th:href="@{/client/routines}" th:text="#{label.routine.routines}">Rutinas</a>
        <span>/</span>
        <strong th:text="#{label.common.detail}">Detalle</strong>
    </nav>

    <section class="routine-detail-shell">
        <a th:href="@{/client/routines}" class="back-link" th:text="#{button.backRoutines}">Volver a rutinas</a>

        <div class="routine-detail-head">
            <div>
                <span class="section-kicker" th:text="${routine.routineType}">Tipo</span>
                <h1 th:text="${routine.nameRoutine}">Rutina</h1>
                <p th:text="${routine.description}">Descripción de la rutina</p>
            </div>

            <button type="button" class="btn-primary select-routine-btn" th:text="#{label.routine.doRoutine}">Realizar rutina</button>
        </div>

        <div class="detail-meta routine-meta">
            <div class="meta-item">
                <span th:text="#{label.routine.difficulty}">Dificultad</span>
                <strong th:text="${routine.difficultyLevel}">Dificultad</strong>
            </div>
            <div class="meta-item">
                <span th:text="#{label.routine.duration}">Duracion</span>
                <strong th:text="${routine.estimatedDuration + ' ' + #messages.msg('label.common.minutes')}">0 min</strong>
            </div>
            <div class="meta-item">
                <span th:text="#{label.routine.objective}">Objetivo</span>
                <strong th:text="${routine.trainingObjective}">Objetivo</strong>
            </div>
            <div class="meta-item">
                <span th:text="#{label.routine.exercises}">Ejercicios</span>
                <strong th:text="${routine.quantityExercises}">0</strong>
            </div>
        </div>

        <section class="exercise-panel">
            <h2 th:text="#{label.routine.exercises}">Ejercicios</h2>
            <p th:text="${routine.exercises}">Ejercicios de la rutina</p>
        </section>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script th:inline="javascript">
    const pendingTitle = /*[[#{message.routine.featurePending}]]*/ 'Funcion en preparacion';
    const pendingText = /*[[#{message.routine.selectionPending}]]*/ 'La selección de rutinas estará disponible cuando se habilite el inicio de sesión.';
    const acceptText = /*[[#{button.accept}]]*/ 'Aceptar';

    document.querySelector('.select-routine-btn').addEventListener('click', function () {
        Swal.fire({
            icon: 'info',
            title: pendingTitle,
            text: pendingText,
            confirmButtonText: acceptText,
            confirmButtonColor: '#d97818'
        });
    });
</script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
