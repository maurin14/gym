<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Detalle de la rutina</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<header class="client-header">
    <a th:href="@{/}" class="client-brand">
        <img th:src="@{/images/logo.jpeg}" alt="SAM GYM FITNESS">
        <span>SAM GYM FITNESS</span>
    </a>

    <nav>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/client/products}">Productos</a>
        <a th:href="@{/client/routines}" class="active">Rutinas</a>
    </nav>
</header>

<main class="detail-page">
    <section class="routine-detail-shell">
        <a th:href="@{/client/routines}" class="back-link">Volver a rutinas</a>

        <div class="routine-detail-head">
            <div>
                <span class="section-kicker" th:text="${routine.routineType}">Tipo</span>
                <h1 th:text="${routine.nameRoutine}">Rutina</h1>
                <p th:text="${routine.description}">Descripción de la rutina</p>
            </div>

            <button type="button" class="btn-primary select-routine-btn">Realizar rutina</button>
        </div>

        <div class="detail-meta routine-meta">
            <div class="meta-item">
                <span>Dificultad</span>
                <strong th:text="${routine.difficultyLevel}">Dificultad</strong>
            </div>
            <div class="meta-item">
                <span>Duración</span>
                <strong th:text="${routine.estimatedDuration + ' min'}">0 min</strong>
            </div>
            <div class="meta-item">
                <span>Objetivo</span>
                <strong th:text="${routine.trainingObjective}">Objetivo</strong>
            </div>
            <div class="meta-item">
                <span>Ejercicios</span>
                <strong th:text="${routine.quantityExercises}">0</strong>
            </div>
        </div>

        <section class="exercise-panel">
            <h2>Ejercicios</h2>
            <p th:text="${routine.exercises}">Ejercicios de la rutina</p>
        </section>
    </section>
</main>

<script>
    document.querySelector('.select-routine-btn').addEventListener('click', function () {
        Swal.fire({
            icon: 'info',
            title: 'Función en preparación',
            text: 'La selección de rutinas estará disponible cuando se habilite el inicio de sesión.',
            confirmButtonText: 'Aceptar',
            confirmButtonColor: '#d97818'
        });
    });
</script>

</body>
</html>
