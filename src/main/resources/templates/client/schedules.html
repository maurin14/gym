<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text='menu.client'></title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('schedules')}"></div>

<main>
    <section class="client-hero compact-hero">
        <div>
            <span class="section-kicker" th:text="#{label.gym.schedules}"></span>
            <h1 th:text="#{menu.schedule.titleCliente}"></h1>
            <p th:text="#{subMenu.schedule.titleCliente}"></p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" aria-label="Ruta de navegacion">
            <a th:href="@{/client/home}">Inicio</a>
            <span>/</span>
            <strong th:text="#{label.gym.schedules}"></strong>
        </nav>

        <form class="catalog-toolbar" th:action="@{/client/schedules}" method="get">
            <input type="hidden" name="size" th:value="${pageSize}">
            <div class="toolbar-field">
                <label for="branchId" th:text="#{label.gym.branch}"></label>
                <select id="branchId" name="branchId">
                    <option value="" th:text="#{label.gym.all}"></option>
                    <option th:each="branch : ${branches}"
                            th:value="${branch.id}"
                            th:selected="${selectedBranchId != null and selectedBranchId == branch.id}"
                            th:text="${branch.name}">
                        
                    </option>
                </select>
            </div>
            <button type="submit" class="btn-primary" th:text="#{button.filter}"></button>
            <a th:href="@{/client/schedules}" class="btn-secondary"th:text="#{button.cleanFilter}"></a>
        </form>

        <div class="client-table-card">
            <div class="section-heading">
             <h2 th:text="#{menu.schedule.agenda}"></h2>
             <p th:text="#{menu.schedule.description}"></p>
            </div>

            <div class="empty-state" th:if="${schedules == null or #lists.isEmpty(schedules)}" th:text="#{msn.schedule.null}">
                
            </div>

            <table class="client-table" th:if="${schedules != null and !#lists.isEmpty(schedules)}">
                <thead>
                    <tr>
                <th th:text="#{label.gym.day}"></th>
                <th th:text="#{label.gym.hour}"></th>
                <th th:text="#{label.gym.end}"></th>
                <th th:text="#{label.gym.type}"></th>
                <th th:text="#{label.gym.branch}"></th> 
                <th th:text="#{label.gym.stage}"></th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="scheduleItem : ${schedules}">
                        <td  th:text="#{${'day.' + #strings.toLowerCase(scheduleItem.dayOfWeek.name())}}"></td>
                        <td th:text="${scheduleItem.startTime != null ? #temporals.format(scheduleItem.startTime, 'HH:mm') : #messages.msg('label.gym.noTime')}"> </td>
                        <td th:text="${scheduleItem.endTime != null ? #temporals.format(scheduleItem.endTime, 'HH:mm') : #messages.msg('label.gym.noTime')}"></td>
                        <td th:text="${scheduleItem.scheduleType}"></td>
                        <td th:text="${scheduleItem.branch != null ? scheduleItem.branch.name : #messages.msg('label.gym.none')}"></td>
                
                        <td>
                            <span th:class="${scheduleItem.active} ? 'status-active' : 'status-inactive'"
                             th:text="${scheduleItem.active} ? #{status.available} : #{status.unavailable}"></span>
                           
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <nav class="client-pagination" th:if="${totalPages > 1}" aria-label="Paginacion de horarios">
            <a class="pagination-link"
               th:classappend="${currentPage == 0} ? ' disabled'"  th:text="#{button.previous}"
               th:href="@{/client/schedules(page=${currentPage == 0 ? currentPage : currentPage - 1}, size=${pageSize}, branchId=${selectedBranchId})}">
              
            </a>
            <a class="pagination-link page-number"
               th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
               th:classappend="${pageNumber == currentPage} ? ' active'"
               th:href="@{/client/schedules(page=${pageNumber}, size=${pageSize}, branchId=${selectedBranchId})}"
               th:text="${pageNumber + 1}">
                1
            </a>
            <a class="pagination-link"  th:text="#{button.next}"
               th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
               th:href="@{/client/schedules(page=${currentPage + 1 >= totalPages ? currentPage : currentPage + 1}, size=${pageSize}, branchId=${selectedBranchId})}">
              
            </a>
        </nav>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
