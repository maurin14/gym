<div th:fragment="routineResults" xmlns:th="http://www.thymeleaf.org">
    <div class="section-heading">
        <h2 th:text="#{label.routine.choose}">Elige una rutina</h2>
        <p th:text="${totalItems + ' ' + #messages.msg('label.routine.count')}">0 rutinas activas</p>
    </div>

    <div class="empty-state" th:if="${routines == null or #lists.isEmpty(routines)}" th:text="#{label.routine.noCatalogRoutines}">
        No hay rutinas disponibles con esos criterios.
    </div>

    <div class="routine-grid" th:if="${routines != null and !#lists.isEmpty(routines)}">
        <article class="routine-card" th:each="routine : ${routines}">
            <div class="routine-topline">
                <span class="tag" th:text="${routine.difficultyLevel}">Dificultad</span>
                <span class="pill" th:text="${routine.routineType}">Tipo</span>
            </div>

            <h3 th:text="${routine.nameRoutine}">Rutina</h3>
            <p class="muted-text" th:text="${routine.description}">Descripcion</p>

            <div class="routine-stats">
                <div>
                    <span th:text="#{label.routine.duration}">Duracion</span>
                    <strong th:text="${routine.estimatedDuration + ' ' + #messages.msg('label.common.minutes')}">0 min</strong>
                </div>
                <div>
                    <span th:text="#{label.routine.objective}">Objetivo</span>
                    <strong th:text="${routine.trainingObjective}">Objetivo</strong>
                </div>
                <div>
                    <span th:text="#{label.routine.exercises}">Ejercicios</span>
                    <strong th:text="${routine.quantityExercises}">0</strong>
                </div>
            </div>

            <a th:href="@{/client/routines/{id}(id=${routine.idRoutine})}" class="btn-primary full-width" th:text="#{button.viewRoutine}">Ver rutina</a>
        </article>
    </div>

    <nav class="client-pagination" th:if="${totalPages > 1}" th:aria-label="#{pagination.routine}">
        <a class="pagination-link"
           th:classappend="${currentPage == 0} ? ' disabled'"
           th:href="@{/client/routines(page=${currentPage == 0 ? currentPage : currentPage - 1}, size=${pageSize}, difficulty=${difficulty}, type=${type})}">
            <span th:text="#{button.previous}">Anterior</span>
        </a>

        <a class="pagination-link page-number"
           th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
           th:classappend="${pageNumber == currentPage} ? ' active'"
           th:href="@{/client/routines(page=${pageNumber}, size=${pageSize}, difficulty=${difficulty}, type=${type})}"
           th:text="${pageNumber + 1}">
            1
        </a>

        <a class="pagination-link"
           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
           th:href="@{/client/routines(page=${currentPage + 1 >= totalPages ? currentPage : currentPage + 1}, size=${pageSize}, difficulty=${difficulty}, type=${type})}">
            <span th:text="#{button.next}">Siguiente</span>
        </a>
    </nav>
</div>
