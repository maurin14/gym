<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{title.class.available}">Clases disponibles - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeaderActive('classes')}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('classes')}"></div>

<main>
    <section class="client-section">
        <div class="client-table-card">
            <div class="table-responsive">
                <table class="client-table">
                    <thead>
                    <tr>
                        <th th:text="#{label.class.type}">Tipo</th>
                        <th th:text="#{label.class.trainer}">Entrenador</th>
                        <th th:text="#{label.class.branch}">Sucursal</th>
                        <th th:text="#{label.class.date}">Fecha</th>
                        <th th:text="#{label.class.startTime}">Inicio</th>
                        <th th:text="#{label.class.endTime}">Final</th>
                        <th th:text="#{label.class.duration}">Duración</th>
                        <th th:text="#{label.class.capacity}">Capacidad</th>
                        <th th:text="#{label.class.difficulty}">Dificultad</th>
                        <th th:text="#{label.class.description}">Descripción</th>
                        <th th:text="#{label.class.action}">Acción</th>
                    </tr>
                    </thead>

                    <tbody id="classesTableBody"></tbody>
                </table>
            </div>

            <nav id="classesPagination" class="client-pagination" th:aria-label="#{pagination.classes}"></nav>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:inline="javascript">
    window.i18n = {
        loadError: /*[[#{message.class.loadError}]]*/ "Could not load classes.",
        emptyClasses: /*[[#{empty.classes}]]*/ "No classes available.",
        noBranch: /*[[#{label.no.branch}]]*/ "No branch",
        register: /*[[#{button.add.attendance}]]*/ "Register",
        previous: /*[[#{button.previous}]]*/ "Previous",
        next: /*[[#{button.next}]]*/ "Next",
        difficultyLow: /*[[#{difficulty.low}]]*/ "Low",
        difficultyMedium: /*[[#{difficulty.medium}]]*/ "Medium",
        difficultyHigh: /*[[#{difficulty.high}]]*/ "High"
    };
</script>
<script th:src="@{/js/admin-ui.js}" defer></script>
<script th:src="@{/js/client-home.js}" defer></script>
<script th:src="@{/js/client/classes/list.js}" defer></script>

</body>
</html>
