<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title  th:text='#{equipment.menu}'></title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('equipment')}"></div>

<main>
    <section class="client-hero compact-hero">
        <div>
            <span class="section-kicker" th:text='#{label.gym.equipment}' ></span>
            <h1  th:text='#{label.equipment.available}'></h1>
            <p  th:text='#{menu.equipment.client}'></p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" aria-label="Ruta de navegacion">
            <a th:href="@{/client/home}"  th:text='#{label.gym.start}'></a>
            <span>/</span>
            <strong   th:text='#{label.gym.equipment}'></strong>
        </nav>

        <form class="catalog-toolbar" th:action="@{/client/equipment}" method="get">
            <input type="hidden" name="size" th:value="${pageSize}">

            <div class="toolbar-field">
                <label for="branchId"  th:text='#{label.gym.branch}' ></label>
                <select id="branchId" name="branchId">
                    <option value=""  th:text='#{label.gym.all}'></option>
                    <option th:each="branch : ${branches}"
                            th:value="${branch.id}"
                            th:selected="${selectedBranchId != null and selectedBranchId == branch.id}"
                            th:text="${branch.name}">
                        
                    </option>
                </select>
            </div>

            <button type="submit" class="btn-primary"  th:text='#{button.filter}'></button>
            <a th:href="@{/client/equipment}" class="btn-secondary"  th:text='#{button.cleanFilter}'></a>
        </form>

        <div class="section-heading">
            <h2  th:text='#{Gym.Resources}'></h2>
            <p th:text="${equipment != null ? #lists.size(equipment) +' '+ #messages.msg('label.equipment.onPage') : '0 ' + #messages.msg('label.equipment')}">
                
            </p>
        </div>

        <div class="empty-state" th:if="${equipment == null or #lists.isEmpty(equipment)} "  th:text='#{equipment.noData}'>
            
        </div>

        <div class="catalog-grid" th:if="${equipment != null and !#lists.isEmpty(equipment)}">
            <article class="product-card" th:each="item : ${equipment}">
                <div class="image-placeholder"   th:text='#{label.gym.equipment}'>
                  
                </div>

                <div class="card-content" >
                    <span class="tag" th:text="${item.type}"></span>
                    <h3 th:text="${item.name}"></h3>
                    <p class="muted-text" th:text="${item.state}"></p>

                    <div class="card-footer">
                        <strong th:text="${item.branch != null ? item.branch.name : #messages.msg('label.gym.none')}"></strong>
                        <span th:class="${item.available == 'true'} ? 'status-active' : 'status-inactive'"
                              th:text="${item.available == 'true'} ?  #{status.available} : #{status.unavailable}">
                            
                        </span>
                    </div>
                </div>
            </article>
        </div>

        <nav class="client-pagination" th:if="${totalPages > 1}" aria-label="Paginacion de equipamiento">
            <a class="pagination-link"
               th:classappend="${currentPage == 0} ? ' disabled'"  th:text='#{button.previous}'
               th:href="@{/client/equipment(page=${currentPage == 0 ? currentPage : currentPage - 1}, size=${pageSize}, branchId=${selectedBranchId})}">
                
            </a>

            <a class="pagination-link page-number"
               th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
               th:classappend="${pageNumber == currentPage} ? ' active'"
               th:href="@{/client/equipment(page=${pageNumber}, size=${pageSize}, branchId=${selectedBranchId})}"
               th:text="${pageNumber + 1}">
                1
            </a>

            <a class="pagination-link"  th:text='#{button.next}'
               th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
               th:href="@{/client/equipment(page=${currentPage + 1 >= totalPages ? currentPage : currentPage + 1}, size=${pageSize}, branchId=${selectedBranchId})}">
                
            </a>
        </nav>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
