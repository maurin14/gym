<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Catálogo de productos</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
    <script th:src="@{/js/client-catalog.js}" defer></script>
</head>
<body>

<header class="client-header">
    <a th:href="@{/}" class="client-brand">
        <img th:src="@{/images/logo.jpeg}" alt="SAM GYM FITNESS">
        <span>SAM GYM FITNESS</span>
    </a>

    <nav>
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/client/products}" class="active">Productos</a>
        <a th:href="@{/client/routines}">Rutinas</a>
    </nav>
</header>

<main>
    <section class="client-hero compact-hero">
        <div>
            <span class="section-kicker">Productos</span>
            <h1>Catálogo visual</h1>
            <p>Explora productos disponibles en el gimnasio. Esta sección es informativa y no incluye carrito ni compra en línea.</p>
        </div>
    </section>

    <section class="client-section">
        <form class="catalog-toolbar"
              method="get"
              th:action="@{/client/products}"
              data-catalog-form
              data-target="#product-results"
              th:data-fragment-url="@{/client/products/fragment}">

            <input type="hidden" name="size" th:value="${pageSize}">

            <div class="toolbar-field search-field">
                <label for="productSearch">Buscar</label>
                <input id="productSearch"
                       type="search"
                       name="search"
                       th:value="${search}"
                       placeholder="Nombre o descripción">
            </div>

            <div class="toolbar-field">
                <label for="productCategory">Categoría</label>
                <select id="productCategory" name="category">
                    <option value="">Todas</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat}"
                            th:selected="${cat == category}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn-primary">Filtrar</button>
            <a th:href="@{/client/products}" class="btn-secondary">Limpiar</a>
        </form>

        <div id="product-results" class="catalog-results" aria-live="polite">
            <div th:replace="~{client/fragments/product_cards :: productResults}"></div>
        </div>
    </section>
</main>

</body>
</html>
