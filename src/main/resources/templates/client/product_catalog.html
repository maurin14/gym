<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{${title}}">Catálogo de productos</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
    <script th:src="@{/js/client-catalog.js}" defer></script>
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeaderActive('products')}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('products')}"></div>

<main>
    <section class="client-section">
        <form class="catalog-toolbar"
              method="get"
              th:action="@{/client/products}"
              data-catalog-form
              data-target="#product-results"
              th:data-fragment-url="@{/client/products/fragment}">

            <input type="hidden" name="size" th:value="${pageSize}">

            <div class="toolbar-field search-field">
                <label for="productSearch" th:text="#{label.product.search}">Buscar</label>
                <input id="productSearch"
                       type="search"
                       name="search"
                       th:value="${search}"
                       th:placeholder="#{label.product.searchPlaceholder}">
            </div>

            <div class="toolbar-field">
                <label for="productCategory" th:text="#{label.product.category}">Categoría</label>
                <select id="productCategory" name="category">
                    <option value="" th:text="#{label.product.all}">Todas</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat}"
                            th:selected="${cat == category}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn-primary" th:text="#{button.filter}">Filtrar</button>
            <a th:href="@{/client/products}" class="btn-secondary" th:text="#{button.clean}">Limpiar</a>
        </form>

        <div id="product-results" class="catalog-results" aria-live="polite">
            <div th:replace="~{client/fragments/product_cards :: productResults}"></div>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
