<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Detalle del producto</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('products')}"></div>

<main class="detail-page">
    <nav class="client-breadcrumb" aria-label="Ruta de navegación">
        <a th:href="@{/client/home}">Inicio</a>
        <span>/</span>
        <a th:href="@{/client/products}">Productos</a>
        <span>/</span>
        <strong>Detalle</strong>
    </nav>

    <section class="detail-shell">
        <div class="detail-media">
            <img th:if="${product.imagePath != null and !#strings.isEmpty(product.imagePath)}"
                 th:src="@{/{img}(img=${product.imagePath})}"
                 th:alt="${product.nameProduct}">

            <div th:if="${product.imagePath == null or #strings.isEmpty(product.imagePath)}"
                 class="image-placeholder large">
                Sin imagen
            </div>
        </div>

        <div class="detail-content">
            <a th:href="@{/client/products}" class="back-link">Volver al catálogo</a>
            <span class="tag" th:text="${product.category}">Categoría</span>
            <h1 th:text="${product.nameProduct}">Producto</h1>
            <p class="detail-description" th:text="${product.description}">Descripción del producto</p>

            <div class="detail-meta">
                <div class="meta-item price-item">
                    <span>Precio</span>
                    <strong th:text="'₡ ' + ${#numbers.formatDecimal(product.price, 1, 2)}">₡ 0.00</strong>
                </div>

                <div class="meta-item">
                    <span>Disponibilidad</span>
                    <strong th:text="${product.quantityStock > 0 ? 'Disponible' : 'Sin stock'}">Disponible</strong>
                </div>

                <div class="meta-item">
                    <span>Stock</span>
                    <strong th:text="${product.quantityStock}">0</strong>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
