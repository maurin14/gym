<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{${title}}">Rutinas disponibles</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
    <script th:src="@{/js/client-catalog.js}" defer></script>
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('routines')}"></div>

<main>
    <section class="client-hero routines-hero">
        <div>
            <span class="section-kicker" th:text="#{label.routine.training}">Entrenamiento</span>
            <h1 th:text="#{title.routine.catalog}">Rutinas disponibles</h1>
            <p th:text="#{label.routine.catalogDescription}">Consulta planes de entrenamiento preparados para distintos objetivos, niveles y tipos de actividad.</p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" th:aria-label="#{breadcrumb.navigation}">
            <a th:href="@{/client/home}" th:text="#{label.common.home}">Inicio</a>
            <span>/</span>
            <strong th:text="#{label.routine.routines}">Rutinas</strong>
        </nav>

        <form class="catalog-toolbar"
              method="get"
              th:action="@{/client/routines}"
              data-catalog-form
              data-target="#routine-results"
              th:data-fragment-url="@{/client/routines/fragment}">

            <input type="hidden" name="size" th:value="${pageSize}">

            <div class="toolbar-field">
                <label for="routineDifficulty" th:text="#{label.routine.difficulty}">Dificultad</label>
                <select id="routineDifficulty" name="difficulty">
                    <option value="" th:text="#{label.routine.all}">Todas</option>
                    <option value="Principiante" th:selected="${difficulty == 'Principiante'}" th:text="#{label.routine.beginner}">Principiante</option>
                    <option value="Intermedio" th:selected="${difficulty == 'Intermedio'}" th:text="#{label.routine.intermediate}">Intermedio</option>
                    <option value="Avanzado" th:selected="${difficulty == 'Avanzado'}" th:text="#{label.routine.advanced}">Avanzado</option>
                </select>
            </div>

            <div class="toolbar-field">
                <label for="routineType" th:text="#{label.routine.type}">Tipo</label>
                <select id="routineType" name="type">
                    <option value="" th:text="#{label.routine.allPlural}">Todos</option>
                    <option value="Cardio" th:selected="${type == 'Cardio'}" th:text="#{label.routine.cardio}">Cardio</option>
                    <option value="Fuerza" th:selected="${type == 'Fuerza'}" th:text="#{label.routine.strength}">Fuerza</option>
                    <option value="Funcional" th:selected="${type == 'Funcional'}" th:text="#{label.routine.functional}">Funcional</option>
                </select>
            </div>

            <button type="submit" class="btn-primary" th:text="#{button.filter}">Filtrar</button>
            <a th:href="@{/client/routines}" class="btn-secondary" th:text="#{button.clean}">Limpiar</a>
        </form>

        <div id="routine-results" class="catalog-results" aria-live="polite">
            <div th:replace="~{client/fragments/routine_cards :: routineResults}"></div>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
