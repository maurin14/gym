<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Rutinas disponibles</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
    <script th:src="@{/js/client-catalog.js}" defer></script>
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('routines')}"></div>

<main>
    <section class="client-hero routines-hero">
        <div>
            <span class="section-kicker">Entrenamiento</span>
            <h1>Rutinas disponibles</h1>
            <p>Consulta planes de entrenamiento preparados para distintos objetivos, niveles y tipos de actividad.</p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" aria-label="Ruta de navegación">
            <a th:href="@{/client/home}">Inicio</a>
            <span>/</span>
            <strong>Rutinas</strong>
        </nav>

        <form class="catalog-toolbar"
              method="get"
              th:action="@{/client/routines}"
              data-catalog-form
              data-target="#routine-results"
              th:data-fragment-url="@{/client/routines/fragment}">

            <input type="hidden" name="size" th:value="${pageSize}">

            <div class="toolbar-field">
                <label for="routineDifficulty">Dificultad</label>
                <select id="routineDifficulty" name="difficulty">
                    <option value="">Todas</option>
                    <option value="Principiante" th:selected="${difficulty == 'Principiante'}">Principiante</option>
                    <option value="Intermedio" th:selected="${difficulty == 'Intermedio'}">Intermedio</option>
                    <option value="Avanzado" th:selected="${difficulty == 'Avanzado'}">Avanzado</option>
                </select>
            </div>

            <div class="toolbar-field">
                <label for="routineType">Tipo</label>
                <select id="routineType" name="type">
                    <option value="">Todos</option>
                    <option value="Cardio" th:selected="${type == 'Cardio'}">Cardio</option>
                    <option value="Fuerza" th:selected="${type == 'Fuerza'}">Fuerza</option>
                    <option value="Funcional" th:selected="${type == 'Funcional'}">Funcional</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">Filtrar</button>
            <a th:href="@{/client/routines}" class="btn-secondary">Limpiar</a>
        </form>

        <div id="routine-results" class="catalog-results" aria-live="polite">
            <div th:replace="~{client/fragments/routine_cards :: routineResults}"></div>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
