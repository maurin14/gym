<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Reportes - SAM GYM FITNESS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('reports')}"></div>


<main class="container portal-card admin-page-card">
    <div th:if="${messageSuccess}" class="status-active" th:text="${messageSuccess}"></div>
    <div th:if="${messageError}" class="status-cancelled" th:text="${messageError}"></div>

    <div class="buttons admin-action-row">
        <a th:href="@{/reports/add}" class="btn-primary">Nuevo reporte</a>
    </div>

    <form th:action="@{/reports}" method="get" class="admin-filter-row portal-filters">
        <select name="reportType">
            <option value="">Todos los tipos</option>
            <option value="users" th:selected="${reportType == 'users'}">Usuarios</option>
            <option value="payments" th:selected="${reportType == 'payments'}">Pagos</option>
            <option value="attendances" th:selected="${reportType == 'attendances'}">Asistencias</option>
        </select>

        <select name="reportStatus">
            <option value="">Todos los estados</option>
            <option value="generated" th:selected="${reportStatus == 'generated'}">Generado</option>
            <option value="pending" th:selected="${reportStatus == 'pending'}">Pendiente</option>
            <option value="error" th:selected="${reportStatus == 'error'}">Error</option>
        </select>

        <button type="submit" class="btn-primary">Buscar</button>
        <a th:href="@{/reports}" class="btn-secondary">Limpiar</a>
    </form>

    <table class="portal-table">
        <thead>
        <tr>
            <th>Tipo</th>
            <th>Generacion</th>
            <th>Generado por</th>
            <th>Inicio</th>
            <th>Final</th>
            <th>Formato</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="r : ${reports}">
            <td>
                <span th:if="${r.reportType == 'users'}">Usuarios</span>
                <span th:if="${r.reportType == 'payments'}">Pagos</span>
                <span th:if="${r.reportType == 'attendances'}">Asistencias</span>
            </td>
            <td th:text="${r.formattedGenerationDate}"></td>
            <td th:text="${r.userName}"></td>
            <td th:text="${r.formattedStartDate}"></td>
            <td th:text="${r.formattedEndDate}"></td>
            <td th:text="${r.format}"></td>
            <td>
                <span th:class="'badge status-' + ${r.reportStatus}">
                    <span th:if="${r.reportStatus == 'generated'}">Generado</span>
                    <span th:if="${r.reportStatus == 'pending'}">Pendiente</span>
                    <span th:if="${r.reportStatus == 'error'}">Error</span>
                </span>
            </td>
            <td>
                <div class="actions">
                    <a th:href="@{/reports/view(id=${r.reportId})}" class="btn-secondary">Ver</a>
                    <a th:href="@{/reports/download(id=${r.reportId})}" class="btn-primary">Descargar</a>
                    <a th:href="@{/reports/edit(id=${r.reportId})}" class="btn-secondary">Editar</a>
                    <a th:href="@{/reports/delete(id=${r.reportId})}"
                       class="btn-danger"
                       data-delete-link
                       data-delete-title="Eliminar reporte?">Eliminar</a>
                </div>
            </td>
        </tr>

        <tr th:if="${#lists.isEmpty(reports)}">
            <td colspan="8" class="empty-message">No hay reportes registrados.</td>
        </tr>
        </tbody>
    </table>

    <nav class="pagination" aria-label="Paginacion de reportes"
         th:with="visualTotalPages=${totalPages > 0 ? totalPages : 1}">
        <a class="btn-secondary"
           th:classappend="${currentPage == 0} ? ' disabled'"
           th:href="@{/reports(page=${currentPage == 0 ? currentPage : currentPage - 1}, reportType=${reportType}, reportStatus=${reportStatus})}">
            Anterior
        </a>

        <a th:each="i : ${#numbers.sequence(0, visualTotalPages - 1)}"
           th:href="@{/reports(page=${i}, reportType=${reportType}, reportStatus=${reportStatus})}"
           th:text="${i + 1}"
           th:class="${i == currentPage ? 'btn-primary page-active' : 'btn-secondary'}"></a>

        <a class="btn-secondary"
           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
           th:href="@{/reports(page=${currentPage + 1 >= totalPages ? currentPage : currentPage + 1}, reportType=${reportType}, reportStatus=${reportStatus})}">
            Siguiente
        </a>
    </nav>
</main>

<script>
    document.querySelectorAll('[data-delete-link]').forEach(function (link) {
        link.addEventListener('click', function (event) {
            event.preventDefault();
            confirmAdminAction({
                title: link.dataset.deleteTitle || 'Eliminar registro?',
                text: 'Esta accion no se puede deshacer.',
                confirmText: 'Eliminar',
                icon: 'warning'
            }).then(function (result) {
                if (result.isConfirmed) {
                    showAdminLoading('Eliminando...');
                    window.location.href = link.href;
                }
            });
        });
    });
</script>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
