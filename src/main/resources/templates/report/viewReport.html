<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{title.report.view}">Vista de Reporte - SAM GYM FITNESS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('reports')}"></div>

<main class="container portal-card admin-page-card">
    <section class="detail-info">
        <div class="info-card">
            <h3 th:text="#{label.report.info}">Información del reporte</h3>

            <p>
                <strong th:text="#{label.report.type} + ':'">Tipo:</strong>
                <span th:if="${reportView.reportType == 'users'}" th:text="#{label.report.type.users}">Usuarios</span>
                <span th:if="${reportView.reportType == 'payments'}" th:text="#{label.report.type.payments}">Pagos</span>
                <span th:if="${reportView.reportType == 'attendances'}" th:text="#{label.report.type.attendances}">Asistencias</span>
            </p>

            <p>
                <strong th:text="#{label.report.generatedBy} + ':'">Generado por:</strong>
                <span th:text="${reportView.userName}"></span>
            </p>

            <p>
                <strong th:text="#{label.report.generation} + ':'">Fecha de generación:</strong>
                <span th:text="${reportView.formattedGenerationDate}"></span>
            </p>

            <p>
                <strong th:text="#{label.report.range} + ':'">Rango:</strong>
                <span th:text="${reportView.formattedStartDate + ' - ' + reportView.formattedEndDate}"></span>
            </p>

            <p>
                <strong th:text="#{label.report.description} + ':'">Descripción:</strong>
                <span th:text="${reportView.description}"></span>
            </p>
        </div>
    </section>

    <table class="portal-table" th:if="${reportData != null and !#lists.isEmpty(reportData)}">
        <thead>
        <tr>
            <th th:each="entry : ${reportData[0]}" th:text="${entry.key}"></th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="fila : ${reportData}">
            <td th:each="entry : ${fila}" th:text="${entry.value}"></td>
        </tr>
        </tbody>
    </table>

    <p th:if="${reportData == null or #lists.isEmpty(reportData)}"
       class="empty-message"
       th:text="#{label.report.noData}">
        No hay datos disponibles para este reporte.
    </p>

    <div class="buttons">
        <a th:href="@{/reports}" class="btn-secondary" th:text="#{button.back}">Volver</a>
        <a th:href="@{/reports/edit(id=${reportView.reportId})}" class="btn-primary" th:text="#{button.edit}">Editar</a>
        <a th:href="@{/reports/download(id=${reportView.reportId})}" class="btn-secondary" th:text="#{button.download}">Descargar</a>
    </div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
