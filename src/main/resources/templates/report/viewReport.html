<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Vista de Reporte - SAM GYM FITNESS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('reports')}"></div>

<main class="container portal-card admin-page-card">
    <h1 class="page-title">Reporte del Sistema</h1>
    <p class="admin-description">
        Vista previa del reporte generado con los datos disponibles en el sistema.
    </p>

    <section class="detail-info">
        <div class="info-card">
            <h3>Información del reporte</h3>

            <p><strong>Tipo:</strong>
                <span th:if="${reportView.reportType == 'users'}">Usuarios</span>
                <span th:if="${reportView.reportType == 'payments'}">Pagos</span>
                <span th:if="${reportView.reportType == 'attendances'}">Asistencias</span>
            </p>

            <p><strong>Generado por:</strong> <span th:text="${reportView.userName}"></span></p>
            <p><strong>Fecha de generación:</strong> <span th:text="${reportView.formattedGenerationDate}"></span></p>
            <p><strong>Rango:</strong>
                <span th:text="${reportView.formattedStartDate + ' - ' + reportView.formattedEndDate}"></span>
            </p>
            <p><strong>Descripción:</strong> <span th:text="${reportView.description}"></span></p>
        </div>
    </section>

    <table th:if="${reportData != null and !#lists.isEmpty(reportData)}">
        <thead>
        <tr>
            <th th:each="entry : ${reportData[0]}" th:text="${entry.key}"></th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="fila : ${reportData}">
            <td th:each="entry : ${fila}" th:text="${entry.value}"></td>
        </tr>
        </tbody>
    </table>

    <p th:if="${reportData == null or #lists.isEmpty(reportData)}" class="empty-message">
        No hay datos disponibles para este reporte.
    </p>

    <div class="buttons">
        <a th:href="@{/reports}" class="btn-secondary">Volver</a>
        <a th:href="@{/reports/edit(id=${reportView.reportId})}" class="btn-primary">Editar</a>
        <a th:href="@{/reports/download(id=${reportView.reportId})}" class="btn-secondary">Descargar</a>
    </div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
