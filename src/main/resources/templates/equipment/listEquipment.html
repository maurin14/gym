<html>
    <head>
        <title>TODO supply a title</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
         <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
                <link rel="stylesheet" th:href="@{/css/app.css}">
 
    </head>
    <body >
       
        <div class="filters">

            <select id="searchtype" onchange="changeSearch()">
        <option value="">Buscar por...</option>
        <option value="id">Sucursal (ID)</option>
        <option value="costo">Costo</option>
    </select>


    <div id="searchId" style="display:none;">
        <input type="number" id="inputId" placeholder="Ingrese ID">
        <button onclick="searchById()">Buscar</button>
    </div>

    <div id="searchCost" style="display:none;">
        <input type="number" id="minCosto" placeholder="Costo mínimo">
        <input type="number" id="maxCosto" placeholder="Costo máximo">
        <button onclick="searchByCost()">Buscar</button>
    </div>

</div>
    <div th:fragment="tableContainer">

    <div id="tableContent" th:fragment="tableContent">
        <table class="portal-table admin-table is-wide">
            <tr>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Costo</th>
                <th>Disponible</th>
                <th>Sucursal</th>
                <th th:if="${isAdmin}" >Acciones</th>
            </tr>
            <tr th:each="equi : ${equipment}">
                <td th:text="${equi.name}"></td>
                <td th:text="${equi.type}"></td>
                <td th:text="${equi.state}"></td>
                <td th:text="${equi.purchaseDate}"></td>
                <td th:text="${equi.cost}"></td>
                        <td>
                            <span th:class="${equi.available} ? 'status-active' : 'status-inactive'"
                                  th:text="${equi.available} ? 'Sí' : 'No'">
                            </span>
                        </td>
                <td th:text="${equi.branch != null ? equi.branch.name : 'Sin sucursal'}"></td>
                <td>
           
                    <button class="edit-btn" th:if="${isAdmin}"
                                th:attr="data-id=${equi.id}"
                                onclick="loadEdit(this); return false;">
                            Editar
                        </button>

                        <button class="delete-btn" th:if="${isAdmin}"
                                th:attr="data-id=${equi.id}"
                                onclick="confirmDelete(this); return false;">
                            Eliminar
                        </button>
                </td>
            </tr>
        </table>
    </div>

    <br>

 
    <select onchange="changeSize(this.value)">
         <option value="0" disabled selected>Tamaño</option>
        <option value="5">5</option>
        <option value="10">10</option>
        <option value="20">20</option>
    </select>

    <!-- PAGINACIÓN -->
    <div class="pagination">

        <button th:if="${currentPage > 0}"
                th:attr="data-page=${currentPage - 1}"
                onclick="loadpage(this.getAttribute('data-page'))">
            ←
        </button>

        <span>
            Página <span th:text="${currentPage + 1}"></span>
            de <span th:text="${totalPages}"></span>
        </span>

        <button th:if="${currentPage + 1 < totalPages}"
                th:attr="data-page=${currentPage + 1}"
                onclick="loadpage(this.getAttribute('data-page'))">
            →
        </button>

    </div>

</div>
        
    </body>
</html>
