<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{${title}}">Detalle rutina</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('routines')}"></div>


<main class="container portal-card admin-page-card">
    <div class="breadcrumb">
        <a th:href="${routineBasePath}" th:text="#{label.routine.routines}">Rutinas</a>
        <span>/</span>
        <span th:text="#{label.common.detail}">Detalle</span>
    </div>

    <section class="detail-title">
        <p th:text="#{label.routine.routine}">Rutina</p>
        <h1 th:text="#{${title}}">Detalle rutina</h1>
    </section>

    <section class="detail-layout">
        <div class="detail-info">
            <article class="info-card highlight">
                <h3 th:text="${routine.nameRoutine}">Rutina</h3>
                <p th:text="${routine.description}">Descripción de la rutina</p>
            </article>

            <article class="info-card">
                <h3 th:text="#{label.routine.generalInfo}">Información general</h3>
                <p><strong th:text="|#{label.routine.difficulty}:|">Dificultad:</strong> <span th:text="${routine.difficultyLevel}"></span></p>
                <p><strong th:text="|#{label.routine.duration}:|">Duracion:</strong> <span th:text="${routine.estimatedDuration + ' ' + #messages.msg('label.common.minutes')}"></span></p>
                <p><strong th:text="|#{label.routine.objective}:|">Objetivo:</strong> <span th:text="${routine.trainingObjective}"></span></p>
                <p><strong th:text="|#{label.routine.type}:|">Tipo:</strong> <span th:text="${routine.routineType}"></span></p>
                <p><strong th:text="|#{label.routine.quantityExercisesShort}:|">Cantidad ejercicios:</strong> <span th:text="${routine.quantityExercises}"></span></p>
            </article>
        </div>

        <div class="detail-info">
            <article class="info-card">
                <h3 th:text="#{label.routine.status}">Estado</h3>
                <span th:class="${routine.state} ? 'badge badge-active' : 'badge badge-inactive'"
                      th:text="${routine.state} ? #{label.status.activeFemale} : #{label.status.inactiveFemale}"></span>
            </article>

            <article class="info-card">
                <h3 th:text="#{label.routine.exercises}">Ejercicios</h3>
                <p th:text="${routine.exercises}"></p>
            </article>

            <div class="buttons">
                <a th:if="${canManageRoutines}" th:href="${routineBasePath + '/edit/' + routine.idRoutine}" class="btn-primary" th:text="#{button.update}">Editar</a>
                <a th:href="${routineBasePath}" class="btn-secondary" th:text="#{button.back}">Volver</a>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
