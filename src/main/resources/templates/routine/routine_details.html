<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Detalle rutina</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('routines')}"></div>


<main class="container portal-card admin-page-card">
    <div class="breadcrumb">
        <a th:href="${routineBasePath}">Rutinas</a>
        <span>/</span>
        <span>Detalle</span>
    </div>

    <section class="detail-title">
        <p>Rutina</p>
        <h1 th:text="${title}">Detalle rutina</h1>
    </section>

    <section class="detail-layout">
        <div class="detail-info">
            <article class="info-card highlight">
                <h3 th:text="${routine.nameRoutine}">Rutina</h3>
                <p th:text="${routine.description}">Descripci&oacute;n de la rutina</p>
            </article>

            <article class="info-card">
                <h3>Informaci&oacute;n general</h3>
                <p><strong>Dificultad:</strong> <span th:text="${routine.difficultyLevel}"></span></p>
                <p><strong>Duraci&oacute;n:</strong> <span th:text="${routine.estimatedDuration + ' min'}"></span></p>
                <p><strong>Objetivo:</strong> <span th:text="${routine.trainingObjective}"></span></p>
                <p><strong>Tipo:</strong> <span th:text="${routine.routineType}"></span></p>
                <p><strong>Cantidad ejercicios:</strong> <span th:text="${routine.quantityExercises}"></span></p>
            </article>
        </div>

        <div class="detail-info">
            <article class="info-card">
                <h3>Estado</h3>
                <span th:class="${routine.state} ? 'badge badge-active' : 'badge badge-inactive'"
                      th:text="${routine.state ? 'Activa' : 'Inactiva'}"></span>
            </article>

            <article class="info-card">
                <h3>Ejercicios</h3>
                <p th:text="${routine.exercises}"></p>
            </article>

            <div class="buttons">
                <a th:if="${canManageRoutines}" th:href="${routineBasePath + '/edit/' + routine.idRoutine}" class="btn-primary">Editar</a>
                <a th:href="${routineBasePath}" class="btn-secondary">Volver</a>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
