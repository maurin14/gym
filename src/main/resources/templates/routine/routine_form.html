<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Formulario rutina</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<header class="main-header portal-header">
    <div class="header-left portal-brand">
        <a th:href="@{/admin/home}">
            <img th:src="@{/images/logo.jpeg}" alt="SAM GYM FITNESS" class="logo portal-logo">
        </a>
        <div class="brand-text">
            <span class="system-name portal-title">SAM GYM FITNESS</span>
            <span class="brand-subtitle portal-subtitle">PANEL ADMINISTRADOR</span>
        </div>
    </div>

    <nav class="header-nav portal-nav">
        <a th:href="@{/admin/home}">Inicio</a>
        <a th:href="@{/admin/branches}">Sucursales</a>
        <a th:href="@{/admin/payments}">Pagos</a>
        <a th:href="@{/admin/routines}">Rutinas</a>
        <a th:href="@{/trainer/classes}">Clases</a>
        <a th:href="@{/admin/products}">Productos</a>
        <a th:href="@{/schedules}">Horarios</a>
        <a th:href="@{/logout}">Cerrar sesi&oacute;n</a>
    </nav>
</header>

<section class="hero-section portal-head">
    <div class="hero-overlay">
        <span class="hero-badge">RUTINA</span>
        <h1 th:text="${title}">Formulario rutina</h1>
        <p class="hero-text">Completa la informaci&oacute;n de la rutina.</p>
    </div>
</section>

<main class="container form-container portal-card">
    <div th:if="${error != null}" class="error-message">
        <span th:text="${error}"></span>
    </div>

    <form class="portal-form" th:action="@{/admin/routines/save}" th:object="${routine}" method="post">
        <input type="hidden" th:field="*{idRoutine}" />

        <label>Nombre</label>
        <input type="text" th:field="*{nameRoutine}" required />

        <label>Dificultad</label>
        <select th:field="*{difficultyLevel}" required>
            <option value="" disabled selected>Seleccione</option>
            <option value="Principiante">Principiante</option>
            <option value="Intermedio">Intermedio</option>
            <option value="Avanzado">Avanzado</option>
        </select>

        <label>Duraci&oacute;n (minutos)</label>
        <input type="number" th:field="*{estimatedDuration}" min="1" required />

        <label>Cantidad de ejercicios</label>
        <input type="number" th:field="*{quantityExercises}" min="1" required />

        <label>Objetivo</label>
        <select th:field="*{trainingObjective}" required>
            <option value="" disabled selected>Seleccione</option>
            <option value="Fuerza">Fuerza</option>
            <option value="Resistencia">Resistencia</option>
            <option value="Pérdida de peso">Pérdida de peso</option>
            <option value="Hipertrofia">Hipertrofia</option>
        </select>

        <label>Tipo de rutina</label>
        <select th:field="*{routineType}" required>
            <option value="" disabled selected>Seleccione</option>
            <option value="Cardio">Cardio</option>
            <option value="Fuerza">Fuerza</option>
            <option value="Funcional">Funcional</option>
        </select>

        <label>Descripci&oacute;n</label>
        <textarea th:field="*{description}" required></textarea>

        <label>Ejercicios</label>
        <textarea rows="6" th:field="*{exercises}" required></textarea>

        <label>Estado</label>
        <select th:field="*{state}">
            <option value="true">Activa</option>
            <option value="false">Inactiva</option>
        </select>

        <div class="buttons">
            <button type="submit" class="btn-primary">Guardar</button>
            <a th:href="@{/admin/routines}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</main>

</body>
</html>
