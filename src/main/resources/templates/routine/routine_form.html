<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Formulario rutina</title>
    <link rel="stylesheet" th:href="@{/css/product.css}">
</head>
<body>

<div class="page-container">

    <h1 class="page-title" th:text="${title}">Formulario rutina</h1>

    <div class="card">

        <div th:if="${error != null}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{/routine/save}" th:object="${routine}" method="post">

            <input type="hidden" th:field="*{idRoutine}" />

            <div class="form-grid">

                <div class="form-group">
                    <label class="form-label">Nombre</label>
                    <input class="form-control" type="text" th:field="*{nameRoutine}" required />
                </div>

                <div class="form-group">
                    <label class="form-label">Dificultad</label>
                    <select class="form-control" th:field="*{difficultyLevel}" required>
                        <option value="" disabled selected>Seleccione</option>
                        <option value="Principiante">Principiante</option>
                        <option value="Intermedio">Intermedio</option>
                        <option value="Avanzado">Avanzado</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Duración (minutos)</label>
                    <input class="form-control" type="number" th:field="*{estimatedDuration}" min="1" required />
                </div>

                <div class="form-group">
                    <label class="form-label">Cantidad de ejercicios</label>
                    <input class="form-control" type="number" th:field="*{quantityExercises}" min="1" required />
                </div>

                <div class="form-group">
                    <label class="form-label">Objetivo</label>
                    <select class="form-control" th:field="*{trainingObjective}" required>
                        <option value="" disabled selected>Seleccione</option>
                        <option value="Fuerza">Fuerza</option>
                        <option value="Resistencia">Resistencia</option>
                        <option value="Pérdida de peso">Pérdida de peso</option>
                        <option value="Hipertrofia">Hipertrofia</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Tipo de rutina</label>
                    <select class="form-control" th:field="*{routineType}" required>
                        <option value="" disabled selected>Seleccione</option>
                        <option value="Cardio">Cardio</option>
                        <option value="Fuerza">Fuerza</option>
                        <option value="Funcional">Funcional</option>
                    </select>
                </div>

                <div class="form-group form-group-full">
                    <label class="form-label">Descripción</label>
                    <textarea class="form-control" th:field="*{description}" required></textarea>
                </div>

                <div class="form-group form-group-full">
                    <label class="form-label">Ejercicios</label>
                    <textarea class="form-control" rows="6" th:field="*{exercises}" required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Estado</label>
                    <select class="form-control" th:field="*{state}">
                        <option value="true">Activa</option>
                        <option value="false">Inactiva</option>
                    </select>
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/routine/list}" class="btn btn-secondary">Cancelar</a>
            </div>

        </form>

    </div>

</div>

</body>
</html>
