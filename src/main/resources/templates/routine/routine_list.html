<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Lista de rutinas</title>
    <link rel="stylesheet" th:href="@{/css/product.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

<div class="page-container">

    <h1 class="page-title" th:text="${title}">Lista de rutinas</h1>

    <div class="card">

        <div class="top-bar">

            <form method="get" th:action="@{/routines}" style="display:flex; gap:10px; align-items:center;">

                <span style="font-weight:bold; margin-right:5px;">Filtrar por:</span>

                <select name="difficultyLevel" class="form-control" style="width:180px;">
                    <option value="">Dificultad</option>
                    <option value="Principiante" th:selected="${difficultyLevel == 'Principiante'}">Principiante</option>
                    <option value="Intermedio" th:selected="${difficultyLevel == 'Intermedio'}">Intermedio</option>
                    <option value="Avanzado" th:selected="${difficultyLevel == 'Avanzado'}">Avanzado</option>
                </select>

                <select name="routineType" class="form-control" style="width:180px;">
                    <option value="">Tipo</option>
                    <option value="Cardio" th:selected="${routineType == 'Cardio'}">Cardio</option>
                    <option value="Fuerza" th:selected="${routineType == 'Fuerza'}">Fuerza</option>
                    <option value="Funcional" th:selected="${routineType == 'Funcional'}">Funcional</option>
                </select>

                <button type="submit" class="btn btn-primary">Filtrar</button>

                <a th:href="@{/routines}" class="btn btn-secondary">Limpiar</a>

            </form>

            <a th:href="@{/routines/form}" class="btn btn-success">Nueva rutina</a>

        </div>

        <div class="table-container">
            <table class="product-table">

                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Dificultad</th>
                        <th>Duración</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:if="${#lists.isEmpty(routines)}">
                        <td colspan="6" style="text-align:center;">No hay rutinas registradas</td>
                    </tr>

                    <tr th:each="routine : ${routines}">

                        <td th:text="${routine.nameRoutine}"></td>
                        <td th:text="${routine.difficultyLevel}"></td>
                        <td th:text="${routine.estimatedDuration + ' min'}"></td>
                        <td th:text="${routine.routineType}"></td>

                        <td>
                            <span th:class="${routine.state} ? 'badge badge-active' : 'badge badge-inactive'">
                                <span th:text="${routine.state ? 'Activa' : 'Inactiva'}"></span>
                            </span>
                        </td>

                        <td>
                            <div class="actions">
                                <a class="btn btn-info" th:href="@{/routines/details/{id}(id=${routine.idRoutine})}">Ver</a>
                                <a class="btn btn-warning" th:href="@{/routines/edit/{id}(id=${routine.idRoutine})}">Editar</a>
                                <a class="btn btn-danger" th:href="@{/routines/delete/{id}(id=${routine.idRoutine})}" data-delete-link>Eliminar</a>
                            </div>
                        </td>

                    </tr>

                </tbody>

            </table>
        </div>

        <div class="form-actions" th:if="${totalPages > 1}">

            <a class="btn btn-secondary"
               th:if="${currentPage > 0}"
               th:href="@{/routines(page=${currentPage - 1}, difficultyLevel=${difficultyLevel}, routineType=${routineType})}">
                Anterior
            </a>

            <span class="btn btn-info"
                  th:text="${'Página ' + (currentPage + 1) + ' de ' + totalPages}">
            </span>

            <a class="btn btn-secondary"
               th:if="${currentPage + 1 < totalPages}"
               th:href="@{/routines(page=${currentPage + 1}, difficultyLevel=${difficultyLevel}, routineType=${routineType})}">
                Siguiente
            </a>

        </div>

    </div>

</div>

<script th:inline="javascript">
    const successMessage = /*[[${successMessage}]]*/ null;

    if (successMessage) {
        Swal.fire({
            icon: 'success',
            title: 'Operación realizada',
            text: successMessage,
            confirmButtonText: 'Aceptar'
        });
    }

    document.querySelectorAll('[data-delete-link]').forEach(function (link) {
        link.addEventListener('click', function (event) {
            event.preventDefault();

            Swal.fire({
                icon: 'warning',
                title: '¿Desea eliminar este elemento?',
                text: 'Esta acción no se puede deshacer.',
                showCancelButton: true,
                confirmButtonText: 'Confirmar',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#dc2626'
            }).then(function (result) {
                if (result.isConfirmed) {
                    window.location.href = link.href;
                }
            });
        });
    });
</script>

</body>
</html>
