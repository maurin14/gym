<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Lista de rutinas</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/admin-ui.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('routines')}"></div>


<main class="container portal-card admin-page-card">
    <div class="buttons admin-action-row">
        <a th:href="@{/admin/routines/form}" class="btn-primary">Nueva rutina</a>
    </div>

    <form class="admin-filter-row portal-filters" method="get" th:action="@{/admin/routines}">
        <select name="difficultyLevel">
            <option value="">Todas las dificultades</option>
            <option value="Principiante" th:selected="${difficultyLevel == 'Principiante'}">Principiante</option>
            <option value="Intermedio" th:selected="${difficultyLevel == 'Intermedio'}">Intermedio</option>
            <option value="Avanzado" th:selected="${difficultyLevel == 'Avanzado'}">Avanzado</option>
        </select>

        <select name="routineType">
            <option value="">Todos los tipos</option>
            <option value="Cardio" th:selected="${routineType == 'Cardio'}">Cardio</option>
            <option value="Fuerza" th:selected="${routineType == 'Fuerza'}">Fuerza</option>
            <option value="Funcional" th:selected="${routineType == 'Funcional'}">Funcional</option>
        </select>

        <button type="submit" class="btn-primary">Buscar</button>
        <a th:href="@{/admin/routines}" class="btn-secondary">Limpiar filtros</a>
    </form>

    <table class="portal-table">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Dificultad</th>
            <th>Duraci&oacute;n</th>
            <th>Tipo</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${#lists.isEmpty(routines)}">
            <td colspan="6" class="empty-message">No hay rutinas registradas.</td>
        </tr>

        <tr th:each="routine : ${routines}">
            <td th:text="${routine.nameRoutine}"></td>
            <td th:text="${routine.difficultyLevel}"></td>
            <td th:text="${routine.estimatedDuration + ' min'}"></td>
            <td th:text="${routine.routineType}"></td>

            <td>
                <span th:class="${routine.state} ? 'badge badge-active' : 'badge badge-inactive'">
                    <span th:text="${routine.state ? 'Activa' : 'Inactiva'}"></span>
                </span>
            </td>

            <td>
                <div class="actions">
                    <a class="btn-secondary" th:href="@{/admin/routines/details/{id}(id=${routine.idRoutine})}">Ver</a>
                    <a class="btn-primary" th:href="@{/admin/routines/edit/{id}(id=${routine.idRoutine})}">Editar</a>
                    <a class="btn-danger" th:href="@{/admin/routines/delete/{id}(id=${routine.idRoutine})}" data-delete-link>Eliminar</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <nav class="pagination" aria-label="Paginacion de rutinas"
         th:with="visualTotalPages=${totalPages > 0 ? totalPages : 1}">
        <a class="btn-secondary"
           th:classappend="${currentPage == 0} ? ' disabled'"
           th:href="@{/admin/routines(page=${currentPage == 0 ? currentPage : currentPage - 1}, difficultyLevel=${difficultyLevel}, routineType=${routineType})}">
            Anterior
        </a>

        <a th:each="i : ${#numbers.sequence(0, visualTotalPages - 1)}"
           th:href="@{/admin/routines(page=${i}, difficultyLevel=${difficultyLevel}, routineType=${routineType})}"
           th:text="${i + 1}"
           th:class="${i == currentPage ? 'btn-primary page-active' : 'btn-secondary'}"></a>

        <a class="btn-secondary"
           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
           th:href="@{/admin/routines(page=${currentPage + 1 >= totalPages ? currentPage : currentPage + 1}, difficultyLevel=${difficultyLevel}, routineType=${routineType})}">
            Siguiente
        </a>
    </nav>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    const successMessage = /*[[${successMessage}]]*/ null;
    const errorMessage = /*[[${errorMessage}]]*/ null;

    if (successMessage) {
        showAdminSuccess(successMessage);
    }

    if (errorMessage) {
        showAdminError('No se pudo eliminar', errorMessage);
    }

    document.querySelectorAll('[data-delete-link]').forEach(function (link) {
        link.addEventListener('click', function (event) {
            event.preventDefault();

            confirmAdminAction({
                icon: 'warning',
                title: 'Desea eliminar este elemento?',
                text: 'Esta acción no se puede deshacer.',
                showCancelButton: true,
                confirmButtonText: 'Confirmar',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#dc2626'
            }).then(function (result) {
                if (result.isConfirmed) {
                    showAdminLoading('Eliminando...');
                    window.location.href = link.href;
                }
            });
        });
    });
</script>

</body>
</html>
