<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de sucursal</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/branch.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('branches')}"></div>


<main class="container form-container portal-card admin-page-card">
    <div th:if="${messageError}" class="status-cancelled" th:text="${messageError}"></div>

    <form id="branchForm"
          class="portal-form"
          th:action="@{/admin/branches/save}"
          th:object="${branch}"
          method="post"
          novalidate>

        <input type="hidden" th:field="*{id}">

        <label>Imagen</label>
        <input type="text"
               th:field="*{imageUrl}"
               required
               maxlength="255"
               placeholder="Ejemplo: central.jpg">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['imageUrl'] != null}" th:text="${fieldErrors['imageUrl']}"></small>

        <label>Fecha de apertura</label>
        <input type="date" th:field="*{openingDate}" required>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['openingDate'] != null}" th:text="${fieldErrors['openingDate']}"></small>

        <label>Nombre de la sucursal</label>
        <input type="text"
               th:field="*{name}"
               required
               maxlength="100"
               placeholder="Ejemplo: SAM Gym Central">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['name'] != null}" th:text="${fieldErrors['name']}"></small>

        <label>Dirección</label>
        <input type="text"
               th:field="*{address}"
               required
               maxlength="150"
               placeholder="Ejemplo: San Jose centro">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['address'] != null}" th:text="${fieldErrors['address']}"></small>

        <label>Teléfono</label>
        <input type="text"
               th:field="*{phone}"
               required
               maxlength="8"
               pattern="[0-9]{8}"
               placeholder="Ejemplo: 88887777"
               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['phone'] != null}" th:text="${fieldErrors['phone']}"></small>

        <label>Capacidad máxima</label>
        <input type="number"
               th:field="*{capacity}"
               required
               min="1"
               placeholder="Ejemplo: 150">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['capacity'] != null}" th:text="${fieldErrors['capacity']}"></small>

        <label>Estado</label>
        <select th:field="*{active}" required>
            <option value="">Seleccione</option>
            <option th:value="true">Activa</option>
            <option th:value="false">Inactiva</option>
        </select>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['active'] != null}" th:text="${fieldErrors['active']}"></small>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="confirmSaveBranch()">Guardar</button>
            <button type="button" class="btn-secondary" onclick="confirmCancelBranch()">Cancelar</button>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
