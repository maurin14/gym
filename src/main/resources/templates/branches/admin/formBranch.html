<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="#{title.branch.form}">Formulario de sucursal</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
    <script th:src="@{/js/branch.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('branches')}"></div>

<main class="container form-container portal-card admin-page-card">
    <div th:if="${messageError}" class="status-cancelled" th:text="#{${messageError}}"></div>

    <form id="branchForm"
          class="portal-form"
          th:action="@{/admin/branches/save}"
          th:object="${branch}"
          method="post"
          novalidate>

        <input type="hidden" th:field="*{id}">

        <label th:text="#{label.branch.image}">Imagen</label>
        <input type="text"
               th:field="*{imageUrl}"
               required
               maxlength="255"
               th:placeholder="#{placeholder.branch.image}">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['imageUrl'] != null}" th:text="#{${fieldErrors['imageUrl']}}"></small>

        <label th:text="#{label.branch.openingDate}">Fecha de apertura</label>
        <input type="date" th:field="*{openingDate}" required>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['openingDate'] != null}" th:text="#{${fieldErrors['openingDate']}}"></small>

        <label th:text="#{label.branch.nameFull}">Nombre de la sucursal</label>
        <input type="text"
               th:field="*{name}"
               required
               maxlength="100"
               th:placeholder="#{placeholder.branch.name}">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['name'] != null}" th:text="#{${fieldErrors['name']}}"></small>

        <label th:text="#{label.branch.address}">Direccion</label>
        <input type="text"
               th:field="*{address}"
               required
               maxlength="150"
               th:placeholder="#{placeholder.branch.address}">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['address'] != null}" th:text="#{${fieldErrors['address']}}"></small>

        <label th:text="#{label.branch.phone}">Telefono</label>
        <input type="text"
               th:field="*{phone}"
               required
               maxlength="8"
               pattern="[0-9]{8}"
               th:placeholder="#{placeholder.branch.phone}"
               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['phone'] != null}" th:text="#{${fieldErrors['phone']}}"></small>

        <label th:text="#{label.branch.capacityMax}">Capacidad maxima</label>
        <input type="number"
               th:field="*{capacity}"
               required
               min="1"
               th:placeholder="#{placeholder.branch.capacity}">
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['capacity'] != null}" th:text="#{${fieldErrors['capacity']}}"></small>

        <label th:text="#{label.branch.status}">Estado</label>
        <select th:field="*{active}" required>
            <option value="" th:text="#{select.select}">Seleccione</option>
            <option th:value="true" th:text="#{label.status.activeFemale}">Activa</option>
            <option th:value="false" th:text="#{label.status.inactiveFemale}">Inactiva</option>
        </select>
        <small class="field-error" th:if="${fieldErrors != null and fieldErrors['active'] != null}" th:text="#{${fieldErrors['active']}}"></small>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="confirmSaveBranch()" th:text="#{button.save}">Guardar</button>
            <button type="button" class="btn-secondary" onclick="confirmCancelBranch()" th:text="#{button.cancel}">Cancelar</button>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    window.branchMessages = {
        saveTitle: /*[[#{confirm.branch.save}]]*/ "Guardar sucursal?",
        saveConfirm: /*[[#{button.save}]]*/ "Guardar",
        saveLoading: /*[[#{confirm.loading.save}]]*/ "Guardando...",
        cancelTitle: /*[[#{confirm.cancel.title}]]*/ "Cancelar cambios?",
        cancelText: /*[[#{confirm.cancel.text}]]*/ "Los cambios no guardados se perderan.",
        yes: /*[[#{button.yes}]]*/ "Si"
    };
</script>

</body>
</html>
