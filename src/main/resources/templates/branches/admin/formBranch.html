<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario de sucursal</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/branch.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('branches')}"></div>

<section class="hero-section portal-head">
    <div class="hero-overlay">
        <span class="hero-badge">SUCURSAL</span>
        <h1 th:text="${branch.id == 0 ? 'Agregar sucursal' : 'Editar sucursal'}">Formulario de sucursal</h1>
        <p class="hero-text">Completa la informacion de la sucursal.</p>
    </div>
</section>

<main class="container form-container portal-card admin-page-card">
    <form id="branchForm"
          class="portal-form"
          th:action="@{/admin/branches/save}"
          th:object="${branch}"
          method="post"
          novalidate>

        <input type="hidden" th:field="*{id}">

        <label>Imagen</label>
        <input type="text"
               th:field="*{imageUrl}"
               required
               maxlength="255"
               placeholder="Ejemplo: central.jpg">
        <small class="error-message" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></small>

        <label>Fecha de apertura</label>
        <input type="date" th:field="*{openingDate}" required>
        <small class="error-message" th:if="${#fields.hasErrors('openingDate')}" th:errors="*{openingDate}"></small>

        <label>Nombre de la sucursal</label>
        <input type="text"
               th:field="*{name}"
               required
               maxlength="100"
               placeholder="Ejemplo: SAM Gym Central">
        <small class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></small>

        <label>Direccion</label>
        <input type="text"
               th:field="*{address}"
               required
               maxlength="150"
               placeholder="Ejemplo: San Jose centro">
        <small class="error-message" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></small>

        <label>Telefono</label>
        <input type="text"
               th:field="*{phone}"
               required
               maxlength="8"
               pattern="[0-9]{8}"
               placeholder="Ejemplo: 88887777"
               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        <small class="error-message" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></small>

        <label>Capacidad maxima</label>
        <input type="number"
               th:field="*{capacity}"
               required
               min="1"
               placeholder="Ejemplo: 150">
        <small class="error-message" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></small>

        <label>Estado</label>
        <select th:field="*{active}" required>
            <option value="">Seleccione</option>
            <option th:value="true">Activa</option>
            <option th:value="false">Inactiva</option>
        </select>
        <small class="error-message" th:if="${#fields.hasErrors('active')}" th:errors="*{active}"></small>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="confirmSaveBranch()">Guardar</button>
            <button type="button" class="btn-secondary" onclick="confirmCancelBranch()">Cancelar</button>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
