<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.branch.admin}">Administracion de sucursales</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
    <script th:src="@{/js/branch.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('branches')}"></div>

<main class="container portal-card admin-page-card">
    <div th:if="${successMessage}" class="status-active" th:text="#{${successMessage}}"></div>
    <div th:if="${errorMessage}" class="status-cancelled" th:text="#{${errorMessage}}"></div>

    <div class="buttons admin-action-row">
        <a th:href="@{/admin/branches/new}" class="btn-primary" th:text="#{button.newBranch}">Nueva sucursal</a>
    </div>

    <form class="admin-filter-row portal-filters" th:action="@{/admin/branches}" method="get">
        <input type="text"
               id="filterName"
               name="name"
               th:placeholder="#{label.branch.searchPlaceholder}"
               th:value="${name}">

        <select id="filterActive" name="active">
            <option value="" th:text="#{label.branch.allStatus}">Todos los estados</option>
            <option value="true" th:selected="${active == 'true'}" th:text="#{label.status.activeFemale}">Activa</option>
            <option value="false" th:selected="${active == 'false'}" th:text="#{label.status.inactiveFemale}">Inactiva</option>
        </select>

        <button type="submit" class="btn-primary" th:text="#{button.search}">Buscar</button>
        <a th:href="@{/admin/branches}" class="btn-secondary" th:text="#{button.cleanFilters}">Limpiar filtros</a>
    </form>

    <div id="branch-table-container">
        <div th:replace="branches/admin/tableBranch :: tableBranch"></div>
    </div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    window.branchMessages = {
        deleteTitle: /*[[#{confirm.branch.delete}]]*/ "Eliminar sucursal?",
        deleteText: /*[[#{confirm.delete.text}]]*/ "Esta accion no se puede deshacer.",
        deleteConfirm: /*[[#{button.delete}]]*/ "Eliminar",
        deleteLoading: /*[[#{confirm.loading.delete}]]*/ "Eliminando...",
        statusTitle: /*[[#{confirm.status.change}]]*/ "Cambiar estado?",
        yes: /*[[#{button.yes}]]*/ "Si",
        processing: /*[[#{message.processing}]]*/ "Procesando..."
    };

    const success = [[${param.success}]];

    if (success != null) {
        let message = /*[[#{message.action.success}]]*/ "Accion realizada correctamente.";

        if (success[0] === "save") message = /*[[#{message.branch.saved}]]*/ "Sucursal registrada correctamente.";
        if (success[0] === "edit") message = /*[[#{message.branch.updated}]]*/ "Sucursal actualizada correctamente.";
        if (success[0] === "delete") message = /*[[#{message.branch.deleted}]]*/ "Sucursal eliminada correctamente.";
        if (success[0] === "status") message = /*[[#{message.branch.statusUpdated}]]*/ "Estado de la sucursal actualizado correctamente.";

        showAdminSuccess(message);
    }

    const successMessage = /*[[${successMessage != null ? #messages.msg(successMessage) : null}]]*/ null;
    const errorMessage = /*[[${errorMessage != null ? #messages.msg(errorMessage) : null}]]*/ null;

    if (successMessage != null) {
        showAdminSuccess(successMessage);
    }

    if (errorMessage != null) {
        showAdminError(errorMessage);
    }
</script>

</body>
</html>
