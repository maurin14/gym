<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="tableBranch">

    <table class="portal-table">
        <thead>
        <tr>
            <th>Imagen</th>
            <th>Fecha apertura</th>
            <th>Nombre</th>
            <th>Dirección</th>
            <th>Teléfono</th>
            <th>Capacidad</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${branches.content.size() == 0}">
            <td colspan="8" class="empty-message">No se encontraron sucursales registradas.</td>
        </tr>

        <tr th:each="b : ${branches.content}">
            <td>
                <img th:src="@{'/images/branches/' + ${b.imageUrl}}"
                     alt="Sucursal"
                     class="branch-image-preview">
            </td>

            <td th:text="${#temporals.format(b.openingDate, 'dd/MM/yyyy')}"></td>
            <td th:text="${b.name}"></td>
            <td th:text="${b.address}"></td>
            <td th:text="${b.phone}"></td>
            <td th:text="${b.capacity}"></td>

            <td>
                <span th:text="${b.active ? 'Activa' : 'Inactiva'}"
                      th:class="${b.active ? 'badge badge-active' : 'badge badge-inactive'}"></span>
            </td>

            <td>
                <div class="actions">
                    <a th:href="@{/admin/branches/edit/{id}(id=${b.id})}" class="btn-secondary">
                        Editar
                    </a>

                    <a href="#"
                       th:data-id="${b.id}"
                       class="btn-primary"
                       onclick="confirmChangeBranchStatus(this); return false;">
                        Cambiar estado
                    </a>

                    <a href="#"
                       th:data-id="${b.id}"
                       class="btn-danger"
                       onclick="confirmDeleteBranch(this); return false;">
                        Eliminar
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <div class="pagination" th:with="visualTotalPages=${branches.totalPages > 0 ? branches.totalPages : 1}">

        <button type="button"
                th:class="${branches.hasPrevious() ? 'btn-secondary' : 'btn-secondary disabled'}"
                th:disabled="${!branches.hasPrevious()}"
                th:data-page="${branches.hasPrevious() ? branches.number - 1 : branches.number}"
                onclick="changeBranchPage(this)">
            Anterior
        </button>

        <button type="button"
                th:each="i : ${#numbers.sequence(0, visualTotalPages - 1)}"
                th:text="${i + 1}"
                th:data-page="${i}"
                th:class="${i == branches.number ? 'btn-primary page-active' : 'btn-secondary'}"
                onclick="changeBranchPage(this)">
        </button>

        <button type="button"
                th:class="${branches.hasNext() ? 'btn-secondary' : 'btn-secondary disabled'}"
                th:disabled="${!branches.hasNext()}"
                th:data-page="${branches.hasNext() ? branches.number + 1 : branches.number}"
                onclick="changeBranchPage(this)">
            Siguiente
        </button>

    </div>

</div>

</body>
</html>
