<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sucursales - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('branches')}"></div>

<main>
    <section class="client-hero compact-hero branches-hero">
        <div>
            <span class="section-kicker">Sedes</span>
            <h1>Sucursales disponibles</h1>
            <p>Consulta las sedes activas del gimnasio, su ubicaci&oacute;n, capacidad y datos generales.</p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" aria-label="Ruta de navegaci&oacute;n">
            <a th:href="@{/client/home}">Inicio</a>
            <span>/</span>
            <strong>Sucursales</strong>
        </nav>

        <form class="catalog-toolbar branch-toolbar" method="get" th:action="@{/client/branches}">
            <div class="toolbar-field search-field">
                <label for="filterName">Buscar</label>
                <input type="search" id="filterName" name="name" placeholder="Buscar por nombre" th:value="${name}">
            </div>

            <button type="submit" class="btn-primary">Buscar</button>
            <a th:href="@{/client/branches}" class="btn-secondary">Limpiar</a>
        </form>

        <div class="branch-grid" th:if="${branches.content.size() > 0}">
            <article class="branch-card" th:each="b : ${branches.content}">
                <a th:href="@{/client/branches/{id}(id=${b.id})}" class="branch-image-link">
                    <img th:src="@{'/images/branches/' + ${b.imageUrl}}" th:alt="${b.name}">
                </a>

                <div class="branch-card-body">
                    <span class="status-badge status-paid">Activa</span>
                    <h3 th:text="${b.name}">Sucursal</h3>
                    <p th:text="${b.address}">Direcci&oacute;n</p>

                    <div class="card-footer">
                        <span class="muted-text" th:text="${'Capacidad: ' + b.capacity}">Capacidad</span>
                        <a th:href="@{/client/branches/{id}(id=${b.id})}" class="btn-primary">Ver clases</a>
                    </div>
                </div>
            </article>
        </div>

        <p class="empty-state" th:if="${branches.content.size() == 0}">No hay sucursales disponibles.</p>

        <div class="client-pagination" th:if="${branches.totalPages > 1}">
            <a class="pagination-link"
               th:if="${branches.hasPrevious()}"
               th:href="@{/client/branches(page=${branches.number - 1}, name=${name})}">
                Anterior
            </a>

            <a th:each="i : ${#numbers.sequence(0, branches.totalPages - 1)}"
               th:text="${i + 1}"
               th:href="@{/client/branches(page=${i}, name=${name})}"
               th:class="${i == branches.number ? 'pagination-link active' : 'pagination-link'}">
            </a>

            <a class="pagination-link"
               th:if="${branches.hasNext()}"
               th:href="@{/client/branches(page=${branches.number + 1}, name=${name})}">
                Siguiente
            </a>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
