<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Detalle de Sucursal - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<header class="portal-header">
    <div class="portal-brand">
        <a th:href="@{/client/home}">
            <img th:src="@{/images/logo.jpeg}" alt="SAM GYM FITNESS" class="portal-logo">
        </a>
        <div>
            <span class="portal-title">SAM GYM FITNESS</span>
            <span class="portal-subtitle">Portal cliente</span>
        </div>
    </div>

    <nav class="portal-nav">
        <a th:href="@{/client/home}">Inicio</a>
        <a th:href="@{/branches}">Sucursales</a>
        <a th:href="@{/payments}">Mis pagos</a>
        <a th:href="@{/logout}">Cerrar sesión</a>
    </nav>
</header>

<main class="portal-main">

    <section class="portal-head">
        <span class="portal-tag">Detalle de sucursal</span>
        <h1 th:text="${branch.name}"></h1>
        <p>Información general de la sede seleccionada.</p>
    </section>

    <section class="portal-card">

        <div class="detail-layout">
            <div>
                <img th:src="@{'/images/branches/' + ${branch.imageUrl}}"
                     alt="Sucursal"
                     class="branch-detail-image">
            </div>

            <div class="info-card">
                <p>
                    <strong>Fecha apertura:</strong>
                    <span th:text="${#temporals.format(branch.openingDate, 'dd/MM/yyyy')}"></span>
                </p>

                <p>
                    <strong>Nombre:</strong>
                    <span th:text="${branch.name}"></span>
                </p>

                <p>
                    <strong>Dirección:</strong>
                    <span th:text="${branch.address}"></span>
                </p>

                <p>
                    <strong>Teléfono:</strong>
                    <span th:text="${branch.phone}"></span>
                </p>

                <p>
                    <strong>Capacidad:</strong>
                    <span th:text="${branch.capacity}"></span>
                </p>

                <p>
                    <strong>Estado:</strong>
                    <span class="badge badge-active">Activa</span>
                </p>

                <div class="buttons">
                    <a th:href="@{/branches}" class="btn-secondary">Volver</a>
                </div>
            </div>
        </div>

    </section>

</main>

</body>
</html>
