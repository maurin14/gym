<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de sucursal - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('branches')}"></div>

<main class="detail-page">
    <nav class="client-breadcrumb" aria-label="Ruta de navegaci&oacute;n">
        <a th:href="@{/client/home}">Inicio</a>
        <span>/</span>
        <a th:href="@{/branches}">Sucursales</a>
        <span>/</span>
        <strong>Detalle</strong>
    </nav>

    <section class="detail-shell branch-detail-shell">
        <div class="detail-media">
            <img th:src="@{'/images/branches/' + ${branch.imageUrl}}" th:alt="${branch.name}">
        </div>

        <div class="detail-content">
            <a th:href="@{/branches}" class="back-link">Volver a sucursales</a>
            <span class="section-kicker">Detalle de sucursal</span>
            <h1 th:text="${branch.name}">Sucursal</h1>
            <p class="detail-description" th:text="${branch.address}">Direcci&oacute;n de la sucursal</p>

            <div class="detail-meta stacked-meta">
                <div class="meta-item">
                    <span>Fecha apertura</span>
                    <strong th:text="${#temporals.format(branch.openingDate, 'dd/MM/yyyy')}">Fecha</strong>
                </div>
                <div class="meta-item">
                    <span>Tel&eacute;fono</span>
                    <strong th:text="${branch.phone}">Teléfono</strong>
                </div>
                <div class="meta-item">
                    <span>Capacidad</span>
                    <strong th:text="${branch.capacity}">0</strong>
                </div>
                <div class="meta-item">
                    <span>Estado</span>
                    <strong>Activa</strong>
                </div>
            </div>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
