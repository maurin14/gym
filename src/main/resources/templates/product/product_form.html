<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Formulario de producto</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('products')}"></div>

<section class="hero-section portal-head">
    <div class="hero-overlay">
        <span class="hero-badge">PRODUCTO</span>
        <h1 th:text="${title}">Formulario de producto</h1>
        <p class="hero-text">Completa la informaci&oacute;n del producto.</p>
    </div>
</section>

<main class="container form-container portal-card admin-page-card">
    <div th:if="${error != null and !#strings.isEmpty(error)}" class="error-message" th:text="${error}">
        Error
    </div>

    <form class="portal-form" th:action="@{${action}}" th:object="${product}" method="post" enctype="multipart/form-data">
        <input type="hidden" th:field="*{idProduct}">
        <input type="hidden" th:field="*{registerDate}">
        <input type="hidden" th:field="*{imagePath}">

        <label for="nameProduct">Nombre del producto</label>
        <input type="text"
               id="nameProduct"
               th:field="*{nameProduct}"
               placeholder="Digite el nombre del producto">
        <small class="error-message" th:if="${fieldErrors != null and fieldErrors['nameProduct'] != null}" th:text="${fieldErrors['nameProduct']}"></small>

        <label for="category">Categor&iacute;a</label>
        <input type="text"
               id="category"
               th:field="*{category}"
               placeholder="Digite la categoria">
        <small class="error-message" th:if="${fieldErrors != null and fieldErrors['category'] != null}" th:text="${fieldErrors['category']}"></small>

        <label for="price">Precio</label>
        <input type="number"
               step="0.01"
               min="0"
               id="price"
               th:field="*{price}"
               placeholder="Digite el precio">
        <small class="error-message" th:if="${fieldErrors != null and fieldErrors['price'] != null}" th:text="${fieldErrors['price']}"></small>

        <label for="quantityStock">Cantidad en stock</label>
        <input type="number"
               min="0"
               id="quantityStock"
               th:field="*{quantityStock}"
               placeholder="Digite la cantidad en stock">
        <small class="error-message" th:if="${fieldErrors != null and fieldErrors['quantityStock'] != null}" th:text="${fieldErrors['quantityStock']}"></small>

        <label for="state">Estado</label>
        <select id="state" th:field="*{state}">
            <option th:value="true">Activo</option>
            <option th:value="false">Inactivo</option>
        </select>

        <label for="description">Descripci&oacute;n</label>
        <textarea id="description"
                  th:field="*{description}"
                  placeholder="Digite la descripcion del producto"></textarea>
        <small class="error-message" th:if="${fieldErrors != null and fieldErrors['description'] != null}" th:text="${fieldErrors['description']}"></small>

        <label for="imageFile">Imagen del producto</label>
        <input type="file" id="imageFile" name="imageFile" accept="image/*">
        <small class="error-message" th:if="${fieldErrors != null and fieldErrors['imagePath'] != null}" th:text="${fieldErrors['imagePath']}"></small>

        <div class="image-preview-container"
             th:if="${product.imagePath != null and !#strings.isEmpty(product.imagePath)}">
            <label>Vista previa actual</label>
            <img th:src="@{/{img}(img=${product.imagePath})}"
                 alt="Vista previa de la imagen">
        </div>

        <div class="buttons">
            <button type="submit" class="btn-primary">Guardar</button>
            <a th:href="@{/admin/products}" class="btn-secondary">Cancelar</a>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
