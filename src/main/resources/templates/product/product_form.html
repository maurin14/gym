<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Formulario de producto</title>
    <link rel="stylesheet" th:href="@{/css/product.css}">
</head>
<body>

<div class="page-container">
    <h1 class="page-title" th:text="${title}">Formulario de producto</h1>

    <div class="card">

        <div th:if="${error != null and !#strings.isEmpty(error)}" class="alert alert-error" th:text="${error}">
            Error
        </div>

        <form th:action="@{${action}}" th:object="${product}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{idProduct}">
            <input type="hidden" th:field="*{registerDate}">
            <input type="hidden" th:field="*{imagePath}">

            <div class="form-grid">

                <div class="form-group">
                    <label class="form-label" for="nameProduct">Nombre del producto</label>
                    <input class="form-control" type="text" id="nameProduct" th:field="*{nameProduct}" placeholder="Digite el nombre del producto">
                </div>

                <div class="form-group">
                    <label class="form-label" for="category">Categoría</label>
                    <input class="form-control" type="text" id="category" th:field="*{category}" placeholder="Digite la categoría">
                </div>

                <div class="form-group">
                    <label class="form-label" for="price">Precio</label>
                    <input class="form-control" type="number" step="0.01" id="price" th:field="*{price}" placeholder="Digite el precio">
                </div>

                <div class="form-group">
                    <label class="form-label" for="quantityStock">Cantidad en stock</label>
                    <input class="form-control" type="number" id="quantityStock" th:field="*{quantityStock}" placeholder="Digite la cantidad en stock">
                </div>

                <div class="form-group">
                    <label class="form-label" for="state">Estado</label>
                    <select class="form-control" id="state" th:field="*{state}">
                        <option th:value="true">Activo</option>
                        <option th:value="false">Inactivo</option>
                    </select>
                </div>

                <div class="form-group form-group-full">
                    <label class="form-label" for="description">Descripción</label>
                    <textarea class="form-control" id="description" th:field="*{description}" placeholder="Digite la descripción del producto"></textarea>
                </div>

                <div class="form-group form-group-full">
                    <label class="form-label" for="imageFile">Imagen del producto</label>
                    <input class="form-control" type="file" id="imageFile" name="imageFile" accept="image/*">
                </div>

                <div class="form-group form-group-full"
                     th:if="${product.imagePath != null and !#strings.isEmpty(product.imagePath)}">
                    <label class="form-label">Vista previa actual</label>
                    <img th:src="@{/{img}(img=${product.imagePath})}"
                         alt="Vista previa de la imagen"
                         class="details-image"
                         style="max-width: 220px; height: 220px;">
                </div>

            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-success">Guardar</button>
                <a th:href="@{/products/}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
