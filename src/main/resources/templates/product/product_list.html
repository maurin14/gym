<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{${title}}">Lista de productos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/admin-ui.js}"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('products')}"></div>


<main class="container portal-card admin-page-card">

    <div th:if="${error != null and !#strings.isEmpty(error)}"
         class="error-message"
         th:text="#{${error}}">
    </div>

    <div class="buttons admin-action-row">
        <a th:href="@{/admin/products/create}" class="btn-primary" th:text="#{button.newProduct}">Nuevo producto</a>
    </div>

    <form class="admin-filter-row portal-filters" th:action="@{/admin/products}" method="get">
        <select name="category">
            <option value="" th:text="#{label.product.allCategories}">Todas las categorías</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat}"
                    th:text="${cat}"
                    th:selected="${cat == category}">
            </option>
        </select>

        <input type="number"
               step="0.01"
               name="minPrice"
               th:value="${minPrice != null ? minPrice : minProductPrice}"
               th:placeholder="#{label.product.minPrice}">

        <input type="number"
               step="0.01"
               name="maxPrice"
               th:value="${maxPrice != null ? maxPrice : maxProductPrice}"
               th:placeholder="#{label.product.maxPrice}">

        <button type="submit" class="btn-primary" th:text="#{button.search}">Buscar</button>
        <a th:href="@{/admin/products}" class="btn-secondary" th:text="#{button.cleanFilters}">Limpiar filtros</a>
    </form>

    <table class="portal-table admin-table">
        <thead>
        <tr>
            <th th:text="#{label.product.image}">Imagen</th>
            <th th:text="#{label.product.name}">Nombre</th>
            <th th:text="#{label.product.category}">Categoría</th>
            <th th:text="#{label.product.price}">Precio</th>
            <th th:text="#{label.product.stock}">Stock</th>
            <th th:text="#{label.product.status}">Estado</th>
            <th th:text="#{label.product.actions}">Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${products == null or #lists.isEmpty(products)}">
            <td colspan="7" class="empty-message" th:text="#{label.product.noProducts}">No hay productos registrados.</td>
        </tr>

        <tr th:each="product : ${products}">
            <td>
                <img th:if="${product.imagePath != null and !#strings.isEmpty(product.imagePath)}"
                     th:src="@{/{img}(img=${product.imagePath})}"
                     th:alt="#{label.product.imageFull}"
                     class="branch-image-preview">

                <div th:if="${product.imagePath == null or #strings.isEmpty(product.imagePath)}"
                     class="no-image">
                    <span th:text="#{label.product.noImage}">Sin imagen</span>
                </div>
            </td>

            <td th:text="${product.nameProduct}"></td>
            <td th:text="${product.category}"></td>
            <td th:utext="'&#8353; ' + ${#numbers.formatDecimal(product.price, 1, 2)}"></td>
            <td th:text="${product.quantityStock}"></td>

            <td>
                <span th:class="${product.state} ? 'badge badge-active' : 'badge badge-inactive'">
                    <span th:text="${product.state} ? #{label.status.active} : #{label.status.inactive}"></span>
                </span>
            </td>

            <td>
                <div class="actions">
                    <a class="btn-secondary" th:href="@{/admin/products/details/{id}(id=${product.idProduct})}" th:text="#{button.view}">Ver</a>
                    <a class="btn-primary" th:href="@{/admin/products/edit/{id}(id=${product.idProduct})}" th:text="#{button.update}">Editar</a>
                    <a class="btn-danger"
                       th:href="@{/admin/products/delete/{id}(id=${product.idProduct})}"
                       data-delete-link
                       th:text="#{button.delete}">
                        Eliminar
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <nav class="pagination" th:aria-label="#{pagination.product}"
         th:with="visualTotalPages=${totalPages > 0 ? totalPages : 1}">
        <a class="btn-secondary"
           th:classappend="${currentPage == 0} ? ' disabled'"
           th:href="@{/admin/products(page=${currentPage == 0 ? currentPage : currentPage - 1}, category=${category}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
            <span th:text="#{button.previous}">Anterior</span>
        </a>

        <a th:each="i : ${#numbers.sequence(0, visualTotalPages - 1)}"
           th:href="@{/admin/products(page=${i}, category=${category}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
           th:text="${i + 1}"
           th:class="${i == currentPage ? 'btn-primary page-active' : 'btn-secondary'}"></a>

        <a class="btn-secondary"
           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
           th:href="@{/admin/products(page=${currentPage + 1 >= totalPages ? currentPage : currentPage + 1}, category=${category}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
            <span th:text="#{button.next}">Siguiente</span>
        </a>
    </nav>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    const successMessage = /*[[${successMessage != null ? #messages.msg(successMessage) : null}]]*/ null;
    const deleteTitle = /*[[#{confirm.product.delete.title}]]*/ 'Eliminar producto?';
    const deleteText = /*[[#{confirm.delete.text}]]*/ 'Esta acción no se puede deshacer.';
    const deleteConfirmText = /*[[#{button.delete}]]*/ 'Eliminar';
    const deleteLoadingText = /*[[#{confirm.loading.delete}]]*/ 'Eliminando...';

    if (successMessage) {
        showAdminSuccess(successMessage);
    }

    document.querySelectorAll('[data-delete-link]').forEach(function (link) {
        link.addEventListener('click', function (event) {
            event.preventDefault();

            confirmAdminAction({
                title: deleteTitle,
                text: deleteText,
                confirmText: deleteConfirmText,
                icon: 'warning'
            }).then(function (result) {
                if (result.isConfirmed) {
                    showAdminLoading(deleteLoadingText);
                    window.location.href = link.href;
                }
            });
        });
    });
</script>

</body>
</html>
