<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Lista de productos</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('products')}"></div>


<main class="container portal-card admin-page-card">

    <div th:if="${error != null and !#strings.isEmpty(error)}"
         class="error-message"
         th:text="${error}">
    </div>

    <div class="buttons admin-action-row">
        <a th:href="@{/admin/products/create}" class="btn-primary">Nuevo producto</a>
    </div>

    <form class="admin-filter-row portal-filters" th:action="@{/admin/products}" method="get">
        <select name="category">
            <option value="">Todas las categor&iacute;as</option>
            <option th:each="cat : ${categories}"
                    th:value="${cat}"
                    th:text="${cat}"
                    th:selected="${cat == category}">
            </option>
        </select>

        <input type="number"
               step="0.01"
               name="minPrice"
               th:value="${minPrice != null ? minPrice : minProductPrice}"
               placeholder="Menor precio">

        <input type="number"
               step="0.01"
               name="maxPrice"
               th:value="${maxPrice != null ? maxPrice : maxProductPrice}"
               placeholder="Mayor precio">

        <button type="submit" class="btn-primary">Buscar</button>
        <a th:href="@{/admin/products}" class="btn-secondary">Limpiar filtros</a>
    </form>

    <table class="portal-table">
        <thead>
        <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Categor&iacute;a</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:if="${products == null or #lists.isEmpty(products)}">
            <td colspan="7" class="empty-message">No hay productos registrados.</td>
        </tr>

        <tr th:each="product : ${products}">
            <td>
                <img th:if="${product.imagePath != null and !#strings.isEmpty(product.imagePath)}"
                     th:src="@{/{img}(img=${product.imagePath})}"
                     alt="Imagen del producto"
                     class="branch-image-preview">

                <div th:if="${product.imagePath == null or #strings.isEmpty(product.imagePath)}"
                     class="no-image">
                    Sin imagen
                </div>
            </td>

            <td th:text="${product.nameProduct}"></td>
            <td th:text="${product.category}"></td>
            <td th:text="'₡ ' + ${#numbers.formatDecimal(product.price, 1, 2)}"></td>
            <td th:text="${product.quantityStock}"></td>

            <td>
                <span th:class="${product.state} ? 'badge badge-active' : 'badge badge-inactive'">
                    <span th:text="${product.state ? 'Activo' : 'Inactivo'}"></span>
                </span>
            </td>

            <td>
                <div class="actions">
                    <a class="btn-secondary" th:href="@{/admin/products/details/{id}(id=${product.idProduct})}">Ver</a>
                    <a class="btn-primary" th:href="@{/admin/products/edit/{id}(id=${product.idProduct})}">Editar</a>
                    <a class="btn-danger"
                       th:href="@{/admin/products/delete/{id}(id=${product.idProduct})}"
                       data-delete-link>
                        Eliminar
                    </a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <nav class="pagination" aria-label="Paginacion de productos"
         th:with="visualTotalPages=${totalPages > 0 ? totalPages : 1}">
        <a class="btn-secondary"
           th:classappend="${currentPage == 0} ? ' disabled'"
           th:href="@{/admin/products(page=${currentPage == 0 ? currentPage : currentPage - 1}, category=${category}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
            Anterior
        </a>

        <a th:each="i : ${#numbers.sequence(0, visualTotalPages - 1)}"
           th:href="@{/admin/products(page=${i}, category=${category}, minPrice=${minPrice}, maxPrice=${maxPrice})}"
           th:text="${i + 1}"
           th:class="${i == currentPage ? 'btn-primary page-active' : 'btn-secondary'}"></a>

        <a class="btn-secondary"
           th:classappend="${currentPage + 1 >= totalPages} ? ' disabled'"
           th:href="@{/admin/products(page=${currentPage + 1 >= totalPages ? currentPage : currentPage + 1}, category=${category}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
            Siguiente
        </a>
    </nav>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    const successMessage = /*[[${successMessage}]]*/ null;

    if (successMessage) {
        Swal.fire({
            icon: 'success',
            title: 'Operacion realizada',
            text: successMessage,
            confirmButtonText: 'Aceptar'
        });
    }

    document.querySelectorAll('[data-delete-link]').forEach(function (link) {
        link.addEventListener('click', function (event) {
            event.preventDefault();

            Swal.fire({
                icon: 'warning',
                title: 'Desea eliminar este elemento?',
                text: 'Esta acción no se puede deshacer.',
                showCancelButton: true,
                confirmButtonText: 'Confirmar',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#dc2626'
            }).then(function (result) {
                if (result.isConfirmed) {
                    window.location.href = link.href;
                }
            });
        });
    });
</script>

</body>
</html>
