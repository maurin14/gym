<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Lista de productos</title>
    <link rel="stylesheet" th:href="@{/css/product.css}">
</head>
<body>

<div class="page-container">

    <h1 class="page-title" th:text="${title}">Lista de productos</h1>

    <div class="card">

        <div class="top-bar">

            <form th:action="@{/products/}" method="get" style="display:flex; gap:10px; align-items:center;">

                <span style="font-weight:bold; margin-right:5px;">Filtrar por:</span>

                <select class="form-control" name="category" style="width:180px;">
                    <option value="">Categoría</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat}"
                            th:text="${cat}"
                            th:selected="${cat == category}">
                    </option>
                </select>

                <input class="form-control"
                       type="number"
                       step="0.01"
                       name="minPrice"
                       th:value="${minPrice != null ? minPrice : minProductPrice}"
                       placeholder="Menor precio"
                       style="width:160px;">

                <input class="form-control"
                       type="number"
                       step="0.01"
                       name="maxPrice"
                       th:value="${maxPrice != null ? maxPrice : maxProductPrice}"
                       placeholder="Mayor precio"
                       style="width:160px;">

                <button type="submit" class="btn btn-primary">Filtrar</button>

                <a th:href="@{/products/}" class="btn btn-secondary">Limpiar</a>

            </form>

            <a th:href="@{/products/create}" class="btn btn-success">Agregar producto</a>

        </div>

        <div th:if="${error != null and !#strings.isEmpty(error)}"
             class="alert alert-error"
             th:text="${error}">
        </div>

        <div class="table-container">
            <table class="product-table">

                <thead>
                    <tr>
                        <th>Imagen</th>
                        <th>Nombre</th>
                        <th>Categoría</th>
                        <th>Precio</th>
                        <th>Stock</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:if="${products == null or #lists.isEmpty(products)}">
                        <td colspan="7">No hay productos registrados.</td>
                    </tr>

                    <tr th:each="product : ${products}">

                        <td>
                            <img th:if="${product.imagePath != null and !#strings.isEmpty(product.imagePath)}"
                                 th:src="@{/{img}(img=${product.imagePath})}"
                                 class="product-image-thumb">

                            <div th:if="${product.imagePath == null or #strings.isEmpty(product.imagePath)}"
                                 class="no-image">
                                Sin imagen
                            </div>
                        </td>

                        <td th:text="${product.nameProduct}"></td>
                        <td th:text="${product.category}"></td>
                        <td th:text="'₡ ' + ${#numbers.formatDecimal(product.price, 1, 2)}"></td>
                        <td th:text="${product.quantityStock}"></td>

                        <td>
                            <span th:class="${product.state} ? 'badge badge-active' : 'badge badge-inactive'">
                                <span th:text="${product.state ? 'Activo' : 'Inactivo'}"></span>
                            </span>
                        </td>

                        <td>
                            <div class="actions">
                                <a class="btn btn-info" th:href="@{/products/details/{id}(id=${product.idProduct})}">Ver</a>
                                <a class="btn btn-warning" th:href="@{/products/edit/{id}(id=${product.idProduct})}">Editar</a>
                                <a class="btn btn-danger"
                                   th:href="@{/products/delete/{id}(id=${product.idProduct})}"
                                   onclick="return confirm('¿Está seguro de eliminar este producto?');">
                                   Eliminar
                                </a>
                            </div>
                        </td>

                    </tr>

                </tbody>

            </table>
        </div>

        <div class="form-actions" th:if="${totalPages > 1}">

            <a class="btn btn-secondary"
               th:if="${currentPage > 0}"
               th:href="@{/products/(page=${currentPage - 1}, category=${category}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                Anterior
            </a>

            <span class="btn btn-info"
                  th:text="${'Página ' + (currentPage + 1) + ' de ' + totalPages}">
            </span>

            <a class="btn btn-secondary"
               th:if="${currentPage + 1 < totalPages}"
               th:href="@{/products/(page=${currentPage + 1}, category=${category}, minPrice=${minPrice}, maxPrice=${maxPrice})}">
                Siguiente
            </a>

        </div>

    </div>

</div>

</body>
</html>
