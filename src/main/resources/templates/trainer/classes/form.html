<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de clase</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('classes')}"></div>

<section class="hero-section portal-head">
    <div class="hero-overlay">
        <span class="hero-badge">CLASE</span>
        <h1 id="formTitle">Agregar clase</h1>
        <p class="hero-text">Completa la informacion de la clase.</p>
    </div>
</section>

<main class="container form-container portal-card admin-page-card">
    <input type="hidden" id="idClass">

    <form class="portal-form">
        <label>Tipo de clase</label>
        <input type="text" id="classType">

        <label>Fecha</label>
        <input type="date" id="classDate">

        <label>Hora inicio</label>
        <input type="time" id="startTime">

        <label>Hora final</label>
        <input type="time" id="endTime">

        <label>Capacidad maxima</label>
        <input type="number" id="maxCapacity">

        <label>Entrenador</label>
        <select id="trainerId">
            <option value="">Seleccione un entrenador</option>
        </select>

        <label>Cantidad inscritos</label>
        <input type="number" id="enrolledCount" value="0" readonly>

        <label>Dificultad</label>
        <select id="difficultyLevel">
            <option value="Bajo">Bajo</option>
            <option value="Medio">Medio</option>
            <option value="Alto">Alto</option>
        </select>

        <label>Descripcion</label>
        <textarea id="description"></textarea>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="saveClass()">Guardar</button>
            <a class="btn-secondary" th:href="@{/trainer/classes}">Volver</a>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:src="@{/js/trainer/classes/form.js}"></script>

</body>
</html>
