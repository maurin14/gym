<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.class.form}">Formulario de clase</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>

<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('classes')}"></div>

<main class="container form-container portal-card admin-page-card">
    <h1 class="page-title" id="formTitle" th:text="#{title.class.add}">Agregar clase</h1>
    <input type="hidden" id="idClass">
    <small id="formError" class="field-error"></small>

    <form class="portal-form">
        <label th:text="#{label.class.type}">Tipo de clase</label>
        <input type="text" id="classType">
        <small id="classTypeError" class="field-error"></small>

        <label th:text="#{label.class.date}">Fecha</label>
        <input type="date" id="classDate">
        <small id="classDateError" class="field-error"></small>

        <label th:text="#{label.class.startTime}">Hora inicio</label>
        <input type="time" id="startTime">
        <small id="startTimeError" class="field-error"></small>

        <label th:text="#{label.class.endTime}">Hora final</label>
        <input type="time" id="endTime">
        <small id="endTimeError" class="field-error"></small>

        <label th:text="#{label.class.capacity}">Capacidad máxima</label>
        <input type="number" id="maxCapacity" min="1">
        <small id="maxCapacityError" class="field-error"></small>

        <label th:text="#{label.class.branch}">Sucursal</label>
        <select id="branchId">
            <option value="" th:text="#{label.select.branch}">Seleccione una sucursal</option>
        </select>
        <small id="branchIdError" class="field-error"></small>

        <label th:text="#{label.class.trainer}">Entrenador</label>
        <select id="trainerId">
            <option value="" th:text="#{label.select.trainer}">Seleccione un entrenador</option>
        </select>
        <small id="trainerIdError" class="field-error"></small>

        <label th:text="#{label.class.enrolled}">Cantidad inscritos</label>
        <input type="number" id="enrolledCount" value="0" min="0" readonly>
        <small id="enrolledCountError" class="field-error"></small>

        <label th:text="#{label.class.difficulty}">Dificultad</label>
        <select id="difficultyLevel">
            <option value="Bajo" th:text="#{difficulty.low}">Bajo</option>
            <option value="Medio" th:text="#{difficulty.medium}">Medio</option>
            <option value="Alto" th:text="#{difficulty.high}">Alto</option>
        </select>
        <small id="difficultyLevelError" class="field-error"></small>

        <label th:text="#{label.class.description}">Descripción</label>
        <textarea id="description"></textarea>
        <small id="descriptionError" class="field-error"></small>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="saveClass()" th:text="#{button.add.class}">Guardar</button>
            <a class="btn-secondary" th:href="${classBasePath}" th:text="#{button.back}">Volver</a>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    window.classBasePath = /*[[${classBasePath}]]*/ "/trainer/classes";
</script>
<script th:src="@{/js/trainer/classes/form.js}"></script>

</body>
</html>
