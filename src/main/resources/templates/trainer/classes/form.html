<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.class.form}">Class Form</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>

<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('classes')}"></div>

<main class="container form-container portal-card admin-page-card">
    <h1 class="page-title" id="formTitle" th:text="#{title.class.add}">Add Class</h1>
    <input type="hidden" id="idClass">
    <small id="formError" class="field-error"></small>

    <form class="portal-form">
        <label th:text="#{label.class.type}">Class Type</label>
        <input type="text" id="classType">
        <small id="classTypeError" class="field-error"></small>

        <label th:text="#{label.class.date}">Date</label>
        <input type="date" id="classDate">
        <small id="classDateError" class="field-error"></small>

        <label th:text="#{label.class.startTime}">Start Time</label>
        <input type="time" id="startTime">
        <small id="startTimeError" class="field-error"></small>

        <label th:text="#{label.class.endTime}">End Time</label>
        <input type="time" id="endTime">
        <small id="endTimeError" class="field-error"></small>

        <label th:text="#{label.class.capacity}">Max Capacity</label>
        <input type="number" id="maxCapacity" min="1">
        <small id="maxCapacityError" class="field-error"></small>

        <label th:text="#{label.class.branch}">Branch</label>
        <select id="branchId">
            <option value="" th:text="#{label.select.branch}">Select a branch</option>
        </select>
        <small id="branchIdError" class="field-error"></small>

        <label th:text="#{label.class.trainer}">Trainer</label>
        <select id="trainerId">
            <option value="" th:text="#{label.select.trainer}">Select a trainer</option>
        </select>
        <small id="trainerIdError" class="field-error"></small>

        <label th:text="#{label.class.enrolled}">Enrolled</label>
        <input type="number" id="enrolledCount" value="0" min="0" readonly>
        <small id="enrolledCountError" class="field-error"></small>

        <label th:text="#{label.class.difficulty}">Difficulty</label>
        <select id="difficultyLevel">
            <option value="Bajo" th:text="#{difficulty.low}">Low</option>
            <option value="Medio" th:text="#{difficulty.medium}">Medium</option>
            <option value="Alto" th:text="#{difficulty.high}">High</option>
        </select>
        <small id="difficultyLevelError" class="field-error"></small>

        <label th:text="#{label.class.description}">Description</label>
        <textarea id="description"></textarea>
        <small id="descriptionError" class="field-error"></small>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="saveClass()" th:text="#{button.add.class}">Save</button>
            <a class="btn-secondary" th:href="${classBasePath}" th:text="#{button.back}">Back</a>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<!-- JS -->
<script th:inline="javascript">
    window.classBasePath = /*[[${classBasePath}]]*/ "/trainer/classes";
</script>
<script th:src="@{/js/trainer/classes/form.js}"></script>

</body>
</html>
