<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Clase</title>

    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('classes')}"></div>

<main class="container form-container portal-card admin-page-card">

    <h1 class="page-title"
        id="formTitle">

        Agregar Clase

    </h1>

    <input type="hidden"
           id="idClass">

    <form>

        <label>Tipo de Clase</label>

        <input type="text"
               id="classType">

        <label>Fecha</label>

        <input type="date"
               id="classDate">

        <label>Hora Inicio</label>

        <input type="time"
               id="startTime">

        <label>Hora Final</label>

        <input type="time"
               id="endTime">

        <label>Capacidad Máxima</label>

        <input type="number"
               id="maxCapacity">

        <label>Entrenador</label>

        <select id="trainerId">

            <option value="">
                Seleccione un entrenador
            </option>

        </select>

        <label>Cantidad Inscritos</label>

        <input type="number"
               id="enrolledCount"
               value="0"
               readonly>

        <label>Dificultad</label>

        <select id="difficultyLevel">

            <option value="Bajo">
                Bajo
            </option>

            <option value="Medio">
                Medio
            </option>

            <option value="Alto">
                Alto
            </option>

        </select>

        <label>Descripción</label>

        <textarea id="description"></textarea>

        <div class="buttons">

            <button type="button"
                    class="btn-primary"
                    onclick="saveClass()">

                Guardar

            </button>

            <a class="btn-secondary"
               th:href="@{/trainer/classes}">

                Volver

            </a>

        </div>

    </form>

</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:src="@{/js/trainer/classes/form.js}"></script>

</body>
</html>
