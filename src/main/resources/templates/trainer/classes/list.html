<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Administracion de clases</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('classes')}"></div>

<section class="hero-section portal-head">
    <div class="hero-overlay">
        <span class="hero-badge">GESTION ADMINISTRATIVA</span>
        <h1>Administracion de clases</h1>
        <p class="hero-text">
            Administra clases, entrenadores, horarios, cupos y niveles de dificultad desde un panel unificado.
        </p>

        <div class="hero-buttons centered">
            <a class="btn-primary" th:href="@{/trainer/classes/form}">Agregar clase</a>
        </div>
    </div>
</section>

<main class="container portal-card admin-page-card">

    <table class="portal-table">
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Entrenador</th>
                <th>Fecha</th>
                <th>Inicio</th>
                <th>Final</th>
                <th>Duracion</th>
                <th>Capacidad</th>
                <th>Inscritos</th>
                <th>Dificultad</th>
                <th>Descripcion</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="classesTableBody"></tbody>
    </table>

    <div class="pagination">
        <button id="pageInfo" disabled>Pagina 1 de 1</button>
        <button id="prevBtn" onclick="previousPage()">Anterior</button>
        <button id="nextBtn" onclick="nextPage()">Siguiente</button>
    </div>

</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:src="@{/js/trainer/classes/list.js}"></script>

</body>
</html>
