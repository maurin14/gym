<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Clases</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <div class="brand-text">
            <span class="system-name">Gimnasio</span>
            <span class="brand-subtitle">Panel de entrenador / administrador</span>
        </div>
    </div>

    <nav class="header-nav">
        <a href="/admin/home">Inicio</a>
        <a href="/trainer/classes">Clases</a>
        <a href="/trainer/attendances">Asistencias</a>
    </nav>
</header>

<div class="container">

    <h1 class="page-title">Listado de Clases</h1>

    <p class="admin-description">
        Administración de clases disponibles en el gimnasio.
    </p>

    <div class="buttons">
        <a class="btn-primary" href="/trainer/classes/form">Agregar Clase</a>
        <a class="btn-secondary" href="/admin/home">Volver</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Tipo</th>
                <th>Entrenador</th>
                <th>Fecha</th>
                <th>Inicio</th>
                <th>Final</th>
                <th>Duración</th>
                <th>Capacidad</th>
                <th>Inscritos</th>
                <th>Dificultad</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="classesTableBody"></tbody>
    </table>

</div>

<script th:src="@{/js/trainer/classes/list.js}"></script>

</body>
</html>
