<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.class.list}">Administración de clases</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>

<body class="page-portal">

    <div th:replace="~{admin/fragments/admin_layout :: adminHeader('classes')}"></div>

    <main class="container portal-card admin-page-card">

        <div class="buttons admin-action-row" th:if="${canManageClasses}">
            <a class="btn-primary" th:href="${classBasePath + '/form'}" th:text="#{button.add.class}">
                Nueva clase
            </a>
        </div>

        <div class="admin-filter-row portal-filters branch-filter-container">
            <label for="branchFilter" class="branch-filter-label" th:text="#{label.class.branch}">
                Sucursal:
            </label>
            <select id="branchFilter" onchange="filterClassesByBranch()">
                <option value="" th:text="#{label.class.branch.all}">Todas las sucursales</option>
            </select>
        </div>

        <div class="table-responsive">
        <table class="portal-table admin-table is-wide">
            <thead>
                <tr>
                    <th th:text="#{label.class.type}">Tipo</th>
                    <th th:text="#{label.class.trainer}">Entrenador</th>
                    <th th:text="#{label.class.branch}">Sucursal</th>
                    <th th:text="#{label.class.date}">Fecha</th>
                    <th th:text="#{label.class.startTime}">Inicio</th>
                    <th th:text="#{label.class.endTime}">Final</th>
                    <th th:text="#{label.class.duration}">Duración</th>
                    <th th:text="#{label.class.capacity}">Capacidad</th>
                    <th th:text="#{label.class.enrolled}">Inscritos</th>
                    <th th:text="#{label.class.status}">Estado</th>
                    <th th:text="#{label.class.difficulty}">Dificultad</th>
                    <th th:text="#{label.class.description}">Descripción</th>
                    <th th:if="${canManageClasses}" th:text="#{label.class.actions}">Acciones</th>
                </tr>
            </thead>

            <tbody id="classesTableBody"></tbody>
        </table>
        </div>

        <div id="classesPagination" class="pagination"></div>

    </main>

    <div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

    <script th:inline="javascript">
        window.classBasePath = /*[[${classBasePath}]]*/ "/trainer/classes";
        window.canManageClasses = /*[[${canManageClasses}]]*/ false;

        window.i18n = {
            edit: /*[[#{button.edit}]]*/ "Editar",
            delete: /*[[#{button.delete}]]*/ "Eliminar",
            branchAll: /*[[#{label.class.branch.all}]]*/ "Todas las sucursales",
            statusActive: /*[[#{status.active}]]*/ "Activa",
            statusInactive: /*[[#{status.inactive}]]*/ "Inactiva",
            previous: /*[[#{button.previous}]]*/ "Anterior",
            next: /*[[#{button.next}]]*/ "Siguiente",
            deleteConfirmation: /*[[#{message.delete.confirmation}]]*/ "Esta acción no se puede deshacer.",
            deleting: /*[[#{message.deleting}]]*/ "Eliminando...",
            deleteError: /*[[#{message.delete.error}]]*/ "No se pudo eliminar.",
            deleteSuccess: /*[[#{message.class.deleted}]]*/ "Clase eliminada correctamente.",
            emptyClasses: /*[[#{empty.classes}]]*/ "No hay clases disponibles.",
            noBranch: /*[[#{label.no.branch}]]*/ "Sin sucursal",
            difficultyLow: /*[[#{difficulty.low}]]*/ "Bajo",
            difficultyMedium: /*[[#{difficulty.medium}]]*/ "Medio",
            difficultyHigh: /*[[#{difficulty.high}]]*/ "Alto"
        };
    </script>

    <script th:src="@{/js/trainer/classes/list.js}"></script>

</body>
</html>
