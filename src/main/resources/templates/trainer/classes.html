<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clases</title>

    <link rel="stylesheet" href="/css/classes.css">
</head>

<body>

    <div class="container">

        <h1>Gestión de Clases</h1>

        <input type="hidden" id="idClass">

        <div class="form-group">
            <label>Tipo de Clase</label>
            <input type="text" id="classType">
        </div>

        <div class="form-group">
            <label>Fecha</label>
            <input type="date" id="classDate">
        </div>

        <div class="form-group">
            <label>Hora Inicio</label>
            <input type="time" id="startTime">
        </div>

        <div class="form-group">
            <label>Hora Final</label>
            <input type="time" id="endTime">
        </div>

        <div class="form-group">
            <label>Capacidad Máxima</label>
            <input type="number" id="maxCapacity">
        </div>

        <div class="form-group">
            <label>Entrenador</label>
            <select id="trainerId"></select>
        </div>

        <div class="form-group">
            <label>Cantidad Inscritos</label>
            <input type="number" id="enrolledCount">
        </div>

        <div class="form-group">
            <label>Dificultad</label>
            <select id="difficultyLevel">
                <option value="Bajo">Bajo</option>
                <option value="Medio">Medio</option>
                <option value="Alto">Alto</option>
            </select>
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <textarea id="description"></textarea>
        </div>

        <button class="btn-save" type="button" onclick="saveClass()">Guardar</button>
        <button class="btn-clear" type="button" onclick="clearForm()">Limpiar</button>

        <table>
            <thead>
                <tr>
                    <th>Tipo de Clase</th>
                    <th>Entrenador</th>
                    <th>Fecha</th>
                    <th>Hora Inicio</th>
                    <th>Hora Final</th>
                    <th>Duración</th>
                    <th>Capacidad</th>
                    <th>Inscritos</th>
                    <th>Dificultad</th>
                    <th>Descripción</th>
                    <th>Acciones</th>
                </tr>
            </thead>

            <tbody id="classesTableBody"></tbody>
        </table>

    </div>

    <script src="/js/classes.js"></script>

</body>
</html>
