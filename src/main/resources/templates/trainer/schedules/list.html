<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{menu.trainer}">Mis horarios - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('schedules')}"></div>

<main class="container portal-card admin-page-card">
    <div class="admin-title-row">
        <div>
            <h2 class="section-title" th:text="#{menu.trainer.title}"></h2>
            <p class="admin-description" th:text="#{menu.trainer.subTitle}"></p>
        </div>
    </div>

    <div class="table-responsive">
        <table class="portal-table admin-table">
            <thead>
                <tr>
                    <th th:text="#{label.gym.class}"></th>
                    <th th:text="#{label.gym.branch}"></th>
                    <th th:text="#{label.gym.date}"></th>
                    <th th:text="#{label.gym.day}"></th>
                    <th th:text="#{label.gym.hour}"></th>
                    <th th:text="#{label.gym.end}"></th>
                    <th th:text="#{label.gym.stage}"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${classes == null or #lists.isEmpty(classes)}">
                    <td colspan="7" class="empty-message" th:text="#{msn.schedule.null}"></td>
                </tr>
                <tr th:each="gymClass : ${classes}">
                    <td th:text="${gymClass.classType}"></td>
                    <td th:text="${gymClass.branch != null ? gymClass.branch.name : #messages.msg('label.gym.none')}"></td>                  
                    <td th:text="${gymClass.classDate}"></td>
                    <td th:text="${gymClass.classDate != null ? #messages.msg('day.' + #strings.toLowerCase(gymClass.classDate.dayOfWeek.name())) : #messages.msg('msn.trainer.null')}"></td>
                    <td th:text="${gymClass.startTime != null ? #temporals.format(gymClass.startTime, 'HH:mm') : #messages.msg('label.gym.noTime')}"></td>
                    <td th:text="${gymClass.endTime != null ? #temporals.format(gymClass.endTime, 'HH:mm') : #messages.msg('label.gym.noTime')}"></td>
                    <td th:text="${gymClass.status ? #messages.msg('status.active') : #messages.msg('status.inactive')}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
