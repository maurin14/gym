<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis horarios - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('schedules')}"></div>

<main class="container portal-card admin-page-card">
    <div class="admin-title-row">
        <div>
            <h2 class="section-title">Mis horarios</h2>
            <p class="admin-description">Horarios generados desde las clases asignadas al entrenador.</p>
        </div>
    </div>

    <div class="table-responsive">
        <table class="portal-table admin-table">
            <thead>
                <tr>
                    <th>Clase</th>
                    <th>Sucursal</th>
                    <th>Fecha</th>
                    <th>D&iacute;a</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${classes == null or #lists.isEmpty(classes)}">
                    <td colspan="7" class="empty-message">No tienes horarios asignados.</td>
                </tr>
                <tr th:each="gymClass : ${classes}">
                    <td th:text="${gymClass.classType}">Clase</td>
                    <td th:text="${gymClass.branch != null ? gymClass.branch.name : 'Sin sucursal'}">Sucursal</td>
                    <td th:text="${gymClass.classDate}">Fecha</td>
                    <td th:text="${gymClass.classDate != null ? gymClass.classDate.dayOfWeek : 'Sin d&iacute;a'}">Dia</td>
                    <td th:text="${gymClass.startTime != null ? #temporals.format(gymClass.startTime, 'HH:mm') : 'Sin hora'}">Inicio</td>
                    <td th:text="${gymClass.endTime != null ? #temporals.format(gymClass.endTime, 'HH:mm') : 'Sin hora'}">Fin</td>
                    <td th:text="${gymClass.status ? 'Activa' : 'Inactiva'}">Estado</td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

</body>
</html>
