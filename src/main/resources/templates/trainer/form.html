<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Asistencia</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <div class="brand-text">
            <span class="system-name">Gimnasio</span>
            <span class="brand-subtitle">Gestión de asistencias</span>
        </div>
    </div>

    <nav class="header-nav">
        <a href="/admin/home">Inicio</a>
        <a href="/trainer/attendances">Asistencias</a>
    </nav>
</header>

<div class="container form-container">

    <h1 class="page-title" id="formTitle">Agregar Asistencia</h1>

    <input type="hidden" id="idAttendance">

    <form>
        <label>Cliente</label>
        <select id="clientId"></select>

        <label>Clase</label>
        <select id="classId"></select>

        <label>Fecha de Asistencia</label>
        <input type="date" id="attendanceDate">

        <label>Estado de Asistencia</label>
        <select id="attendanceStatus">
            <option value="Presente">Presente</option>
            <option value="Ausente">Ausente</option>
            <option value="Tarde">Tarde</option>
        </select>

        <label>Observación</label>
        <textarea id="observation"></textarea>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="saveAttendance()">Guardar</button>
            <a class="btn-secondary" href="/trainer/attendances">Volver</a>
        </div>
    </form>

</div>

<script src="/js/trainer-attendances-form.js"></script>

</body>
</html>
