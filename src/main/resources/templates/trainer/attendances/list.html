<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de asistencias</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>

<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('attendance')}"></div>

<main class="container portal-card admin-page-card">
    <div class="buttons admin-action-row">
        <a class="btn-primary" th:href="${attendanceBasePath + '/form'}">Nueva asistencia</a>
    </div>

    <table class="portal-table">
        <thead>
        <tr>
            <th>Cliente</th>
            <th>Clase</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Observaci&oacute;n</th>
            <th>Registro</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody id="attendancesTableBody"></tbody>
    </table>

    <div id="attendancesPagination" class="pagination"></div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    window.attendanceBasePath = /*[[${attendanceBasePath}]]*/ "/trainer/attendances";
</script>
<script th:src="@{/js/trainer/attendances/list.js}"></script>

</body>
</html>
