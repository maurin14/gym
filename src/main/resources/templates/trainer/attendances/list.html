<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.attendance.list}">Listado de asistencias</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>

<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('attendance')}"></div>

<main class="container portal-card admin-page-card wide-table-card">
    <div class="buttons admin-action-row">
        <a class="btn-primary" th:href="${attendanceBasePath + '/form'}"
           th:text="#{button.add.attendance}">Nueva asistencia</a>
    </div>

    <table class="portal-table admin-table is-wide">
        <thead>
        <tr>
            <th th:text="#{label.attendance.client}">Cliente</th>
            <th th:text="#{label.attendance.class}">Clase</th>
            <th th:text="#{label.attendance.branch}">Sucursal</th>
            <th th:text="#{label.attendance.date}">Fecha</th>
            <th th:text="#{label.attendance.status}">Estado</th>
            <th th:text="#{label.attendance.observation}">Observación</th>
            <th th:text="#{label.attendance.register}">Registro</th>
            <th th:text="#{label.attendance.actions}">Acciones</th>
        </tr>
        </thead>

        <tbody id="attendancesTableBody"></tbody>
    </table>

    <div id="attendancesPagination" class="pagination"></div>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    window.attendanceBasePath = /*[[${attendanceBasePath}]]*/ "/trainer/attendances";
    window.canDeleteAttendances = /*[[${session.user != null and session.user.role == 'administrator'}]]*/ false;
</script>
<script th:src="@{/js/trainer/attendances/list.js}"></script>

</body>
</html>
