<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="#{title.attendance.form}">Formulario de asistencia</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:src="@{/js/admin-ui.js}"></script>
</head>

<body class="page-portal">

<div th:replace="~{admin/fragments/admin_layout :: adminHeader('attendance')}"></div>

<main class="container form-container portal-card admin-page-card">
    <h1 class="page-title" id="formTitle" th:text="#{title.attendance.add}">Agregar asistencia</h1>
    <input type="hidden" id="idAttendance">
    <small id="formError" class="field-error"></small>

    <form class="portal-form" novalidate>
        <label for="clientId" th:text="#{label.attendance.client}">Cliente</label>
        <select id="clientId">
            <option value="" th:text="#{label.select.client}">Seleccione un cliente</option>
        </select>
        <small id="clientIdError" class="field-error"></small>

        <label for="classId" th:text="#{label.attendance.class}">Clase</label>
        <select id="classId" onchange="setAttendanceDate()">
            <option value="" th:text="#{label.select.class}">Seleccione una clase</option>
        </select>
        <small id="classIdError" class="field-error"></small>

        <label for="attendanceDate" th:text="#{label.attendance.date}">Fecha de asistencia</label>
        <input type="date" id="attendanceDate" readonly>
        <small id="attendanceDateError" class="field-error"></small>

        <label for="attendanceStatus" th:text="#{label.attendance.status}">Estado de asistencia</label>
        <select id="attendanceStatus">
            <option value="Presente" th:text="#{status.present}">Presente</option>
            <option value="Ausente" th:text="#{status.absent}">Ausente</option>
            <option value="Tarde" th:text="#{status.late}">Tarde</option>
        </select>
        <small id="attendanceStatusError" class="field-error"></small>

        <label for="observation" th:text="#{label.attendance.observation}">Observación</label>
        <textarea id="observation"></textarea>

        <div class="buttons">
            <button type="button" class="btn-primary" onclick="saveAttendance()" th:text="#{button.add.attendance}">Guardar</button>
            <a class="btn-secondary" th:href="${attendanceBasePath}" th:text="#{button.back}">Volver</a>
        </div>
    </form>
</main>

<div th:replace="~{admin/fragments/admin_layout :: adminFooter}"></div>

<script th:inline="javascript">
    window.attendanceBasePath = /*[[${attendanceBasePath}]]*/ "/trainer/attendances";
    window.i18n = {
        selectClient: /*[[#{label.select.client}]]*/ "Select a client",
        selectClass: /*[[#{label.select.class}]]*/ "Select a class",
        noBranch: /*[[#{label.no.branch}]]*/ "No branch",
        errorTitle: /*[[#{sweetalert.error.title}]]*/ "Error",
        clientsLoadError: /*[[#{attendance.message.clientsLoadError}]]*/ "Could not load clients.",
        classesLoadError: /*[[#{attendance.message.classesLoadError}]]*/ "Could not load classes.",
        loadError: /*[[#{attendance.message.loadError}]]*/ "Could not load attendance.",
        formTitleEdit: /*[[#{title.attendance.edit}]]*/ "Edit Attendance",
        clientRequired: /*[[#{attendance.validation.clientRequired}]]*/ "Select a client.",
        classRequired: /*[[#{attendance.validation.classRequired}]]*/ "Select a class.",
        dateRequired: /*[[#{attendance.validation.dateRequired}]]*/ "The date is required.",
        statusRequired: /*[[#{attendance.validation.statusRequired}]]*/ "Select a status.",
        incompleteTitle: /*[[#{attendance.validation.incompleteTitle}]]*/ "Incomplete data",
        incompleteText: /*[[#{attendance.validation.incompleteText}]]*/ "Complete the required fields.",
        saving: /*[[#{attendance.loading.save}]]*/ "Saving attendance...",
        saved: /*[[#{attendance.message.saved}]]*/ "Attendance saved successfully.",
        updated: /*[[#{attendance.message.updated}]]*/ "Attendance updated successfully.",
        saveError: /*[[#{attendance.message.saveError}]]*/ "Could not save attendance."
    };
</script>
<script th:src="@{/js/trainer/attendances/form.js}"></script>

</body>
</html>
