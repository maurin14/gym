<!DOCTYPE html>
<html th:lang="${#locale.language}" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{client.profile.passwordTitle}">Cambiar contraseña - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('password')}"></div>

<main>
    <section class="client-hero compact-hero account-hero">
        <div>
            <span class="section-kicker" th:text="#{nav.client.account}">Mi cuenta</span>
            <h1 th:text="#{client.profile.changePassword}">Cambiar contraseña</h1>
            <p th:text="#{client.profile.passwordDescription}">Actualiza tus credenciales para mantener segura tu cuenta dentro del portal cliente.</p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" th:aria-label="#{breadcrumb.navigation}">
            <a th:href="@{/client/home}" th:text="#{label.common.home}">Inicio</a>
            <span>/</span>
            <strong th:text="#{client.profile.changePassword}">Cambiar contraseña</strong>
        </nav>

        <div class="client-form-card narrow-form">
            <div th:if="${messageSuccess}" class="alert-message alert-success" th:text="${messageSuccess}"></div>
            <div th:if="${messageError}" class="alert-message alert-error" th:text="${messageError}"></div>

            <form class="client-form single-column"
                  th:action="@{/profile/password}"
                  method="post"
                  autocomplete="off">

                <div class="toolbar-field">
                    <label for="currentPassword" th:text="#{client.profile.currentPassword}">Contraseña actual</label>
                    <input id="currentPassword" type="password" name="currentPassword" required autocomplete="current-password">
                </div>

                <div class="toolbar-field">
                    <label for="newPassword" th:text="#{client.profile.newPassword}">Nueva contraseña</label>
                    <input id="newPassword" type="password" name="newPassword" required autocomplete="new-password">
                </div>

                <div class="toolbar-field">
                    <label for="confirmPassword" th:text="#{client.profile.confirmPassword}">Confirmar contraseña</label>
                    <input id="confirmPassword" type="password" name="confirmPassword" required autocomplete="new-password">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary" th:text="#{client.profile.updatePassword}">Actualizar contraseña</button>
                    <a th:href="@{/client/home}" class="btn-secondary" th:text="#{button.back}">Volver</a>
                </div>
            </form>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
