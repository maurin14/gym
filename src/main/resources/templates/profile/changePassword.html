<!DOCTYPE html>





<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title>Cambiar contraseña</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" type="text/css" th:href="@{/css/style.css}"/>
    </head>
    <body>
        <div class="container">
            <h1>Cambiar contraseña</h1>

            <div th:if="${messageSuccess}" class="alert success" th:text="${messageSuccess}"></div>
            <div th:if="${messageError}" class="alert error-box" th:text="${messageError}"></div>

            <form th:action="@{/profile/password}" method="post" autocomplete="off">
                
                <label>Contraseña actual</label>
                <input type="password" name="currentPassword" required autocomplete="current-password"/>

                <label>Nueva contraseña</label>
                <input type="password" name="newPassword" required autocomplete="new-password"/>

                <label>Confirmar contraseña</label>
                <input type="password" name="confirmPassword" required autocomplete="new-password"/>

                <button type="submit">Actualizar contraseña</button>
            </form>

            <div class="menu">
                <a th:href="@{/}">Volver</a>
            </div>
        </div>
    </body>
</html>
