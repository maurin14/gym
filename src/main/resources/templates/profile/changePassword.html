<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cambiar contraseña</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>

<body class="page-with-background">

    <header class="main-header">

        <div class="header-left">
            <a th:href="@{/client/home}">
                <img th:src="@{/images/logo.jpeg}" class="logo" alt="SAM GYM FITNESS">
            </a>

            <span class="system-name">SAM GYM FITNESS</span>
        </div>

        <nav class="header-nav">
            <a th:href="@{/client/home}">Inicio</a>
            <a th:href="@{/logout}">Cerrar sesión</a>
        </nav>

    </header>

    <main>

        <div class="container form-container">

            <h1 class="page-title">Cambiar contraseña</h1>

            <p class="admin-description">
                Actualiza tu contraseña para mantener segura tu cuenta.
            </p>

            <div th:if="${messageSuccess}"
                 class="badge badge-active"
                 th:text="${messageSuccess}">
            </div>

            <div th:if="${messageError}"
                 class="badge badge-inactive"
                 th:text="${messageError}">
            </div>

            <form th:action="@{/profile/password}" 
                  method="post"
                  autocomplete="off">

                <label>Contraseña actual</label>
                <input type="password"
                       name="currentPassword"
                       required
                       autocomplete="current-password"/>

                <label>Nueva contraseña</label>
                <input type="password"
                       name="newPassword"
                       required
                       autocomplete="new-password"/>

                <label>Confirmar contraseña</label>
                <input type="password"
                       name="confirmPassword"
                       required
                       autocomplete="new-password"/>

                <div class="buttons">

                    <button type="submit" class="btn-primary">
                        Actualizar contraseña
                    </button>

                    <a th:href="@{/client/home}" class="btn-secondary">
                        Volver
                    </a>

                </div>

            </form>

        </div>

    </main>

</body>
</html>
