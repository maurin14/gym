<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contrase&ntilde;a - SAM GYM FITNESS</title>
    <link rel="stylesheet" th:href="@{/css/client.css}">
</head>
<body>

<div th:replace="~{client/fragments/client_layout :: clientHeader}"></div>
<div th:replace="~{client/fragments/client_layout :: clientMenuDrawer('password')}"></div>

<main>
    <section class="client-hero compact-hero account-hero">
        <div>
            <span class="section-kicker">Mi cuenta</span>
            <h1>Cambiar contrase&ntilde;a</h1>
            <p>Actualiza tus credenciales para mantener segura tu cuenta dentro del portal cliente.</p>
        </div>
    </section>

    <section class="client-section">
        <nav class="client-breadcrumb" aria-label="Ruta de navegaci&oacute;n">
            <a th:href="@{/client/home}">Inicio</a>
            <span>/</span>
            <strong>Cambiar contrase&ntilde;a</strong>
        </nav>

        <div class="client-form-card narrow-form">
            <div th:if="${messageSuccess}" class="alert-message alert-success" th:text="${messageSuccess}"></div>
            <div th:if="${messageError}" class="alert-message alert-error" th:text="${messageError}"></div>

            <form class="client-form single-column"
                  th:action="@{/profile/password}"
                  method="post"
                  autocomplete="off">

                <div class="toolbar-field">
                    <label for="currentPassword">Contrase&ntilde;a actual</label>
                    <input id="currentPassword" type="password" name="currentPassword" required autocomplete="current-password">
                </div>

                <div class="toolbar-field">
                    <label for="newPassword">Nueva contrase&ntilde;a</label>
                    <input id="newPassword" type="password" name="newPassword" required autocomplete="new-password">
                </div>

                <div class="toolbar-field">
                    <label for="confirmPassword">Confirmar contrase&ntilde;a</label>
                    <input id="confirmPassword" type="password" name="confirmPassword" required autocomplete="new-password">
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn-primary">Actualizar contrase&ntilde;a</button>
                    <a th:href="@{/client/home}" class="btn-secondary">Volver</a>
                </div>
            </form>
        </div>
    </section>
</main>

<div th:replace="~{client/fragments/client_layout :: clientFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:src="@{/js/client-home.js}" defer></script>

</body>
</html>
